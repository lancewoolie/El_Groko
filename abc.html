<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alpha Base Camp - Lance Woolie</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body { background: url('/img/moonsaloon/moonsurface.jpg') center/cover no-repeat fixed !important; color: #e0e0e0; font-family: 'Georgia', serif; }
    .content-overlay { background: rgba(0, 0, 0, 0.75); min-height: 100vh; padding-top: 90px; }
    .admin-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.7);
      position: relative;
    }
    .admin-card h2 { color: #00ffcc; text-shadow: 0 0 25px #00ffcc; }
    .add-log-btn, .copy-logs-btn {
      position: absolute; top: 20px; right: 20px;
      background: #ff00aa; color: white; border: none; padding: 8px 16px;
      border-radius: 8px; cursor: pointer; margin-right: 10px;
    }
    .copy-logs-btn { background: #00ccff; right: 160px; }
    .log-entry {
      background: rgba(0,0,0,0.5); border-left: 5px solid #ff00aa;
      padding: 1.2rem; margin-bottom: 1rem; border-radius: 0 8px 8px 0;
      cursor: pointer;
    }
    .log-entry:hover { background: rgba(0,0,0,0.7); }
    .log-content { display: none; margin-top: 1rem; line-height: 1.7; }
    .log-entry.expanded .log-content { display: block; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="content-overlay">
    <div class="container py-5">
      <h1 class="text-center mb-5" style="color:#ff00aa; text-shadow: 0 0 40px #ff00aa;">ALPHA BASE CAMP</h1>

      <!-- Login Modal -->
      <div class="modal fade" id="loginModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content bg-dark text-light" style="border: 3px solid #00ffcc;">
            <div class="modal-header border-0">
              <h5 class="modal-title">🔒 Alpha Base Camp Security Checkpoint</h5>
            </div>
            <div class="modal-body">
              <input type="email" id="admin-email" class="form-control mb-3" placeholder="Email Address">
              <input type="password" id="admin-password" class="form-control" placeholder="Password">
              <div id="login-error" class="text-danger mt-2" style="display:none;"></div>
            </div>
            <div class="modal-footer border-0">
              <button type="button" id="login-btn" class="btn btn-success w-100">Enter Base Camp</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Dashboard -->
      <div id="dashboard-content" style="display: none;">
        <div class="admin-card">
          <h2>Captain's Log Archive</h2>
          <button class="add-log-btn" onclick="showAddLogModal()">+ Add New Log</button>
          <button class="copy-logs-btn" onclick="copyAllLogs()">Copy All Logs</button>
          <div id="log-summary">Loading entries...</div>
        </div>

        <div class="admin-card">
          <h2>Recent Firebase Activity</h2>
          <div id="activity-placeholder">Loading activity...</div>
        </div>

        <div class="admin-card">
          <h2>Visitor Demographics</h2>
          <div id="stats-placeholder">Demographics tracking coming soon.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add New Log Modal -->
  <div class="modal fade" id="addLogModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light" style="border: 3px solid #00ffcc;">
        <div class="modal-header border-0">
          <h5 class="modal-title">Add New Grok-Generated Log</h5>
        </div>
        <div class="modal-body">
          <textarea id="new-log-content" class="form-control" rows="16" placeholder="Paste the full Grok-generated Captain's Log here..."></textarea>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" onclick="saveNewLog()">Save to Firestore</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    const ADMIN_PASSWORD = "moon2026";

    function attemptLogin() {
      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value.trim();
      const errorDiv = document.getElementById('login-error');
      const loginBtn = document.getElementById('login-btn');

      errorDiv.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Checking...';

      if (password === ADMIN_PASSWORD && email.length > 5) {
        localStorage.setItem('alphaBaseCampLoggedIn', 'true');
        bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
        document.getElementById('dashboard-content').style.display = 'block';
        loadCaptainsLog();
      } else {
        errorDiv.textContent = "Incorrect password or email.";
        errorDiv.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Enter Base Camp';
      }
    }

    async function loadCaptainsLog() {
      const container = document.getElementById('log-summary');
      container.innerHTML = 'Loading entries...';

      try {
        const response = await fetch(
          "https://firestore.googleapis.com/v1/projects/lance-woolie-webfarm/databases/(default)/documents/captainsLog?key=AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ"
        );

        if (!response.ok) throw new Error("Failed to fetch");

        const data = await response.json();
        const documents = data.documents || [];

        let html = '';
        documents.sort((a, b) => {
          const orderA = a.fields.order ? parseInt(a.fields.order.integerValue) : 0;
          const orderB = b.fields.order ? parseInt(b.fields.order.integerValue) : 0;
          return orderB - orderA; // newest first
        });

        documents.forEach(doc => {
          const fields = doc.fields || {};
          const title = fields.title ? fields.title.stringValue : 'Untitled';
          const content = fields.content ? fields.content.stringValue : 'No content';
          const stardate = fields.stardate ? fields.stardate.stringValue : 'Unknown Date';

          html += `
            <div class="log-entry" onclick="this.classList.toggle('expanded')">
              <div class="log-title">${stardate} — ${title}</div>
              <div class="log-content">${content.replace(/\n/g, '<br>')}</div>
            </div>`;
        });

        container.innerHTML = html || '<p>No entries found.</p>';
      } catch (e) {
        container.innerHTML = `<p style="color:#ffaa00;">Could not load entries.<br>${e.message}</p>`;
      }
    }

    function copyAllLogs() {
      const entries = document.querySelectorAll('.log-entry');
      let text = "=== CAPTAIN'S LOG ARCHIVE ===\n\n";

      entries.forEach(entry => {
        const title = entry.querySelector('.log-title').textContent.trim();
        const content = entry.querySelector('.log-content').textContent.trim();
        text += `${title}\n`;
        text += `${content}\n\n`;
        text += "─".repeat(80) + "\n\n";
      });

      navigator.clipboard.writeText(text).then(() => {
        alert("✅ All logs copied! Paste them here for me.");
      });
    }

    function showAddLogModal() {
      document.getElementById('new-log-content').value = '';
      new bootstrap.Modal(document.getElementById('addLogModal')).show();
    }

    async function saveNewLog() {
      const content = document.getElementById('new-log-content').value.trim();
      if (!content) {
        alert("Please paste the log content.");
        return;
      }

      try {
        await fetch(
          "https://firestore.googleapis.com/v1/projects/lance-woolie-webfarm/databases/(default)/documents/captainsLog?key=AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              fields: {
                stardate: { stringValue: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) },
                title: { stringValue: "Grok Update" },
                content: { stringValue: content },
                timestamp: { timestampValue: new Date().toISOString() },
                order: { integerValue: Date.now() }
              }
            })
          }
        );

        alert("✅ New Grok log saved!");
        bootstrap.Modal.getInstance(document.getElementById('addLogModal')).hide();
        loadCaptainsLog();
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('alphaBaseCampLoggedIn') === 'true') {
        document.getElementById('dashboard-content').style.display = 'block';
        loadCaptainsLog();
      } else {
        new bootstrap.Modal(document.getElementById('loginModal')).show();
      }

      document.getElementById('admin-password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') attemptLogin();
      });

      document.getElementById('login-btn').addEventListener('click', attemptLogin);
    });
  </script>
</body>
</html>
