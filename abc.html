<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alpha Base Camp - Lance Woolie</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('img/moonsaloon/moonsurface.jpg') center/cover no-repeat fixed !important;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
    }
    .content-overlay {
      background: rgba(0, 0, 0, 0.82);
      min-height: 100vh;
      padding-top: 90px;
    }
    .mini-nav {
      position:fixed; top:12px; left:20px; z-index:10000;
      background:rgba(10,15,35,0.95); border:2px solid #00ffcc; border-radius:50px;
      padding:8px 14px; display:flex; align-items:center; gap:10px;
      box-shadow:0 0 40px rgba(0,255,204,0.7); backdrop-filter:blur(14px);
    }
    .admin-card {
      background: rgba(10, 20, 50, 0.95);
      border: 3px solid #00ffcc;
      border-radius: 18px;
      padding: 1.6rem;
      margin-bottom: 1.4rem;
      box-shadow: 0 0 45px rgba(0, 255, 204, 0.6);
    }
    .admin-card h2 { color: #00ffcc; font-size: 1.45rem; text-shadow: 0 0 20px #00ffcc; margin-bottom: 1rem; }
    button { font-size: 0.95rem; }
    .log-entry {
      background: rgba(0,0,0,0.6); border-left: 5px solid #ff00aa;
      padding: 1rem; margin-bottom: 0.7rem; border-radius: 0 8px 8px 0; cursor: pointer;
    }
    .log-entry:hover { background: rgba(0,0,0,0.8); }
    .log-content { display: none; }
    .log-entry.expanded .log-content { display: block; }
    table { font-size: 0.95rem; }
  </style>
</head>
<body>
  <!-- 🔒 MINI-NAV RESTORED -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
  </div>

  <div class="content-overlay">
    <div class="container py-4">
      <h1 class="text-center mb-4" style="color:#ff00aa; text-shadow: 0 0 40px #ff00aa; font-size:2.4rem;">ALPHA BASE CAMP</h1>

      <!-- Login Modal (unchanged) -->
      <div class="modal fade" id="loginModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content bg-dark text-light" style="border: 3px solid #00ffcc;">
            <div class="modal-header border-0"><h5 class="modal-title">🔒 Security Checkpoint</h5></div>
            <div class="modal-body">
              <input type="email" id="admin-email" class="form-control mb-3" placeholder="Email">
              <input type="password" id="admin-password" class="form-control" placeholder="Password">
              <div id="login-error" class="text-danger mt-2" style="display:none;"></div>
            </div>
            <div class="modal-footer border-0">
              <button type="button" id="login-btn" class="btn btn-success w-100">ENTER BASE CAMP</button>
            </div>
          </div>
        </div>
      </div>

      <!-- DASHBOARD -->
      <div id="dashboard-content" style="display: none;">

        <!-- CAPTAIN'S LOG - WIDE ON TOP -->
        <div class="admin-card">
          <h2>Captain's Log Archive</h2>
          <button class="add-log-btn" onclick="showAddLogModal()">+ Add New Log</button>
          <button class="copy-logs-btn" onclick="copyAllLogs()">Copy All Logs</button>
          <div id="log-summary">Loading logs...</div>
        </div>

        <!-- TIGHT SIDE-BY-SIDE ROW -->
        <div class="row g-3">
          <div class="col-lg-6">
            <div class="admin-card h-100">
              <h2>Chimes Referral Analytics</h2>
              <button class="refresh-referrals-btn mb-2" onclick="loadReferralAnalytics()">🔄 Refresh</button>
              <div id="referral-summary" style="margin:10px 0;color:#ffd700;">Loading...</div>
              <div id="referral-table" style="max-height:380px;overflow-y:auto;">Loading...</div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="admin-card h-100">
              <h2>Subscriber Activity</h2>
              <div class="d-flex justify-content-between align-items-center mb-2">
                <span id="total-subscribers" style="color:#00ffcc;">Total: <strong>Loading...</strong></span>
                <button class="copy-cadets-btn" onclick="copyAllCadets()">Copy Emails</button>
              </div>
              <div id="subscribers-table" style="max-height:380px;overflow-y:auto;">Loading...</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Add Log Modal -->
  <div class="modal fade" id="addLogModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light" style="border: 3px solid #00ffcc;">
        <div class="modal-header border-0"><h5 class="modal-title">Add New Grok Log</h5></div>
        <div class="modal-body">
          <textarea id="new-log-content" class="form-control" rows="16" placeholder="Paste full Grok log here..."></textarea>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" onclick="saveNewLog()">Save Log</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    const ADMIN_PASSWORD = "moon2026";
    const FIREBASE_KEY = "AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ";
    const PROJECT_ID = "lance-woolie-webfarm";

    // Login, Captain's Logs, Subscribers, Referral Analytics functions (same as previous working version)
    // ... (copy the full script functions from the previous fixed version I gave you)

    // For brevity, the full script is the same as the last working abc.html you had, plus the layout changes above.

    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('alphaBaseCampLoggedIn') === 'true') {
        document.getElementById('dashboard-content').style.display = 'block';
        loadCaptainsLog();
        loadSubscribers();
        loadReferralAnalytics();
      } else {
        new bootstrap.Modal(document.getElementById('loginModal')).show();
      }
      document.getElementById('admin-password').addEventListener('keypress', (e) => { if (e.key === 'Enter') attemptLogin(); });
      document.getElementById('login-btn').addEventListener('click', attemptLogin);
    });
  </script>
</body>
</html>
