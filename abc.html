<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alpha Base Camp - Lance Woolie</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body { background: url('img/moonsaloon/moonsurface.jpg') center/cover no-repeat fixed !important; color: #e0e0e0; font-family: 'Georgia', serif; }
    .content-overlay { background: rgba(0, 0, 0, 0.82); min-height: 100vh; padding-top: 85px; }
    .mini-nav {
      position:fixed; top:12px; left:20px; z-index:10000;
      background:rgba(10,15,35,0.95); border:2px solid #00ffcc; border-radius:50px;
      padding:8px 14px; display:flex; align-items:center; gap:10px;
      box-shadow:0 0 30px rgba(0,255,204,0.6);
    }
    .admin-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 18px;
      padding: 1.3rem;
      margin-bottom: 1.3rem;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
    }
    .admin-card h2 { color: #00ffcc; font-size: 1.35rem; text-shadow: 0 0 20px #00ffcc; margin-bottom: 0.9rem; }
    .log-entry {
      background: rgba(0,0,0,0.6); border-left: 5px solid #ff00aa;
      padding: 0.9rem; margin-bottom: 0.7rem; border-radius: 0 8px 8px 0; cursor: pointer;
    }
    .log-entry:hover { background: rgba(0,0,0,0.75); }
    .log-content { display: none; }
    .log-entry.expanded .log-content { display: block; }
    table { font-size: 0.92rem; }
  </style>
</head>
<body>
  <!-- MINI-NAV (normal size) -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
  </div>

  <div class="content-overlay">
    <div class="container py-3">
      <h1 class="text-center mb-4" style="color:#ff00aa; text-shadow:0 0 30px #ff00aa;">ALPHA BASE CAMP</h1>

      <div id="dashboard-content" style="display:none;">

        <!-- CAPTAIN'S LOG - WIDE TOP -->
        <div class="admin-card">
          <h2>Captain's Log Archive</h2>
          <button class="add-log-btn btn-sm me-2" onclick="showAddLogModal()">+ Add New Log</button>
          <button class="copy-logs-btn btn-sm" onclick="copyAllLogs()">Copy All Logs</button>
          <div id="log-summary" class="mt-3">Loading logs...</div>
        </div>

        <!-- TIGHT SIDE-BY-SIDE -->
        <div class="row g-3">
          <div class="col-lg-6">
            <div class="admin-card h-100">
              <h2>Chimes Referral Analytics</h2>
              <button class="refresh-referrals-btn btn-sm mb-2" onclick="loadReferralAnalytics()">🔄 Refresh</button>
              <div id="referral-summary" style="color:#ffd700;margin:8px 0;">Loading...</div>
              <div id="referral-table" style="max-height:320px;overflow-y:auto;">Loading...</div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="admin-card h-100">
              <h2>Subscriber Activity</h2>
              <div class="d-flex justify-content-between mb-2">
                <span id="total-subscribers" style="color:#00ffcc;">Total: <strong>Loading...</strong></span>
                <button class="copy-cadets-btn btn-sm" onclick="copyAllCadets()">Copy Emails</button>
              </div>
              <div id="subscribers-table" style="max-height:320px;overflow-y:auto;">Loading...</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Modals (unchanged) -->
  <!-- Add Log Modal here (same as before) -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    // Paste your full working script here (attemptLogin, loadCaptainsLog, loadReferralAnalytics, loadSubscribers, etc.)
    // Use the script from the previous working version.
  </script>
</body>
</html>
