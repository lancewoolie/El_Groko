<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alpha Base Camp - Lance Woolie</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/moonsurface.jpg') center/cover no-repeat fixed !important;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
    }
    .content-overlay {
      background: rgba(0, 0, 0, 0.65);
      min-height: 100vh;
      padding-top: 90px;
    }
    .admin-card {
      background: rgba(10, 20, 50, 0.88);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.7),
                  inset 0 0 40px rgba(255, 0, 170, 0.4);
    }
    .admin-card h2 {
      color: #00ffcc;
      text-shadow: 0 0 25px #00ffcc;
      margin-bottom: 1.5rem;
    }
    .log-entry {
      background: rgba(0, 0, 0, 0.5);
      border-left: 5px solid #ff00aa;
      padding: 1.2rem;
      margin-bottom: 1rem;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .log-entry:hover {
      background: rgba(0, 0, 0, 0.7);
      transform: translateX(8px);
    }
    .log-title {
      color: #00ffcc;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .log-content {
      display: none;
      margin-top: 1rem;
      line-height: 1.7;
      color: #ddd;
    }
    .log-entry.expanded .log-content {
      display: block;
    }
    .expand-icon {
      float: right;
      font-size: 1.4rem;
      transition: transform 0.3s;
    }
    .log-entry.expanded .expand-icon {
      transform: rotate(180deg);
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="content-overlay">
    <div class="container py-5">
      <h1 class="text-center mb-5" style="color:#ff00aa; text-shadow: 0 0 40px #ff00aa;">ALPHA BASE CAMP</h1>

      <!-- Recent Captain's Log -->
      <div class="admin-card">
        <h2>Captain's Log Archive</h2>
        <div id="log-summary">Loading entries from Firestore...</div>
      </div>

      <!-- Placeholder Sections -->
      <div class="admin-card">
        <h2>Visitor Demographics & Stats</h2>
        <div id="stats-placeholder">Tracking data will appear here once enabled.</div>
      </div>

      <div class="admin-card">
        <h2>Recent Firebase Activity</h2>
        <div id="activity-placeholder">Subscribers and messages will appear here.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ",
      authDomain: "lance-woolie-webfarm.firebaseapp.com",
      projectId: "lance-woolie-webfarm",
      storageBucket: "lance-woolie-webfarm.firebasestorage.app",
      messagingSenderId: "278461194969",
      appId: "1:278461194969:web:a2a03c9d27ccbb670814c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadCaptainsLog() {
      const container = document.getElementById('log-summary');
      container.innerHTML = 'Loading Captain\'s Log...';

      try {
        const q = query(collection(db, "captainsLog"), orderBy("order", "asc"));
        const snapshot = await getDocs(q);

        let html = '';

        snapshot.forEach(doc => {
          const data = doc.data();
          html += `
            <div class="log-entry" onclick="this.classList.toggle('expanded')">
              <div class="log-title">
                ${data.stardate} — ${data.title}
                <span class="expand-icon">▼</span>
              </div>
              <div class="log-content">
                ${data.content.replace(/\n/g, '<br>')}
              </div>
            </div>`;
        });

        container.innerHTML = html || '<p>No entries found yet.</p>';
      } catch (e) {
        container.innerHTML = `<p style="color:#ff3366;">Error loading log: ${e.message}</p>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadCaptainsLog);
  </script>
</body>
</html>
