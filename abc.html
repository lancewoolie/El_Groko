<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alpha Base Camp - Lance Woolie</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/moonsurface.jpg') center/cover no-repeat fixed !important;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
    }
    .content-overlay {
      background: rgba(0, 0, 0, 0.65);
      min-height: 100vh;
      padding-top: 90px;
    }
    .admin-card {
      background: rgba(10, 20, 50, 0.85);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.6),
                  inset 0 0 30px rgba(255, 0, 170, 0.3);
      transition: all 0.3s ease;
    }
    .admin-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 0 60px rgba(0, 255, 204, 0.8);
    }
    .admin-card h2 {
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc;
      margin-bottom: 1.5rem;
    }
    .log-entry {
      background: rgba(0, 0, 0, 0.4);
      padding: 1rem;
      margin-bottom: 1rem;
      border-left: 4px solid #ff00aa;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="content-overlay">
    <div class="container py-5">
      <h1 class="text-center mb-5" style="color:#ff00aa; text-shadow: 0 0 30px #ff00aa;">ALPHA BASE CAMP</h1>

      <!-- Recent Captain's Log -->
      <div class="admin-card">
        <h2>Recent Captain's Log Entries</h2>
        <div id="log-summary">Loading log entries...</div>
      </div>

      <!-- Visitor Stats Placeholder -->
      <div class="admin-card">
        <h2>Visitor Statistics</h2>
        <div id="stats-placeholder">Visitor data will appear here once tracking is enabled.</div>
      </div>

      <!-- Firebase Activity -->
      <div class="admin-card">
        <h2>Recent Firebase Activity</h2>
        <div id="activity-placeholder">Subscriber & message activity will appear here.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ",
      authDomain: "lance-woolie-webfarm.firebaseapp.com",
      projectId: "lance-woolie-webfarm",
      storageBucket: "lance-woolie-webfarm.firebasestorage.app",
      messagingSenderId: "278461194969",
      appId: "1:278461194969:web:a2a03c9d27ccbb670814c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Load recent log entries
    async function loadRecentLog() {
      try {
        const q = query(collection(db, "captainsLog"), orderBy("order"), limit(8));
        const snapshot = await getDocs(q);
        let html = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          html += `
            <div class="log-entry">
              <strong>${data.stardate} — ${data.title}</strong><br>
              <small>${data.content.substring(0, 180)}...</small>
            </div>`;
        });
        document.getElementById('log-summary').innerHTML = html || 'No entries yet.';
      } catch (e) {
        document.getElementById('log-summary').innerHTML = 'Error loading log: ' + e.message;
      }
    }

    document.addEventListener('DOMContentLoaded', loadRecentLog);
  </script>
</body>
</html>
