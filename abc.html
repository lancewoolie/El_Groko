<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alpha Base Camp - Lance Woolie</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('img/moonsaloon/moonsurface.jpg') center/cover no-repeat fixed !important;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
    }
    .content-overlay {
      background: rgba(0, 0, 0, 0.78);
      min-height: 100vh;
      padding-top: 100px;
    }
    .mini-nav {
      position:fixed; top:12px; left:20px; z-index:10000;
      background:rgba(10,15,35,0.95); border:2px solid #00ffcc; border-radius:50px;
      padding:10px 14px; display:flex; align-items:center; gap:10px;
      box-shadow:0 0 30px rgba(0,255,204,0.6);
    }
    .admin-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 1.8rem;
      margin-bottom: 1.8rem;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.7);
    }
    .admin-card h2 { color: #00ffcc; text-shadow: 0 0 25px #00ffcc; }
  </style>
</head>
<body>
  <!-- MINI NAV RESTORED -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
  </div>

  <div class="content-overlay">
    <div class="container py-5">
      <h1 class="text-center mb-5" style="color:#ff00aa; text-shadow: 0 0 40px #ff00aa;">ALPHA BASE CAMP</h1>

      <!-- DASHBOARD -->
      <div id="dashboard-content" style="display: none;">

        <!-- REFERRAL + SUBSCRIBER AT TOP -->
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="admin-card">
              <h2>Chimes Referral Analytics</h2>
              <button class="btn btn-warning btn-sm mb-2" onclick="loadReferralAnalytics()">🔄 Refresh</button>
              <div id="referral-summary" style="margin:12px 0;color:#ffd700;">Loading referral data...</div>
              <div id="referral-table" style="max-height:380px;overflow-y:auto;">Loading...</div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="admin-card">
              <h2>Subscriber Activity</h2>
              <div class="d-flex justify-content-between align-items-center mb-3">
                <span id="total-subscribers" style="font-size:1.3rem;color:#00ffcc;">Total: <strong>Loading...</strong></span>
                <button class="btn btn-success btn-sm" onclick="copyAllCadets()">Copy Emails</button>
              </div>
              <div id="subscribers-table">Loading subscribers...</div>
            </div>
          </div>
        </div>

        <!-- CAPTAIN'S LOG BELOW -->
        <div class="admin-card">
          <h2>Captain's Log Archive</h2>
          <button class="add-log-btn" onclick="showAddLogModal()">+ Add New Log</button>
          <button class="copy-logs-btn" onclick="copyAllLogs()">Copy All Logs</button>
          <div id="log-summary">Loading entries...</div>
        </div>

      </div>
    </div>
  </div>

  <!-- Modals (Add Log + Login) - keep your existing ones -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    // Paste your full working script here (login, loadCaptainsLog, loadReferralAnalytics, loadSubscribers, etc.)
    // Use the script from the version before the size changes.
  </script>
</body>
</html>
