<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alpha Base Camp - Lance Woolie</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body { background: url('/img/moonsaloon/moonsurface.jpg') center/cover no-repeat fixed !important; color: #e0e0e0; font-family: 'Georgia', serif; }
    .content-overlay { background: rgba(0, 0, 0, 0.7); min-height: 100vh; padding-top: 90px; }
    .admin-card {
      background: rgba(10, 20, 50, 0.9);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.7);
      position: relative;
    }
    .admin-card h2 { color: #00ffcc; text-shadow: 0 0 25px #00ffcc; }
    .add-log-btn {
      position: absolute; top: 20px; right: 20px;
      background: #ff00aa; color: white; border: none; padding: 8px 16px;
      border-radius: 8px; cursor: pointer;
    }
    .log-entry {
      background: rgba(0,0,0,0.5); border-left: 5px solid #ff00aa;
      padding: 1.2rem; margin-bottom: 1rem; border-radius: 0 8px 8px 0;
      cursor: pointer;
    }
    .log-entry:hover { background: rgba(0,0,0,0.7); }
    .log-content { display: none; margin-top: 1rem; }
    .log-entry.expanded .log-content { display: block; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="content-overlay">
    <div class="container py-5">
      <h1 class="text-center mb-5" style="color:#ff00aa; text-shadow: 0 0 40px #ff00aa;">ALPHA BASE CAMP</h1>

      <!-- Login Modal -->
      <div class="modal fade" id="loginModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content bg-dark text-light" style="border: 3px solid #00ffcc;">
            <div class="modal-header border-0">
              <h5 class="modal-title">🔑 Alpha Base Camp Access</h5>
            </div>
            <div class="modal-body">
              <input type="email" id="admin-email" class="form-control mb-3" value="lancewoolie@gmail.com" readonly>
              <input type="password" id="admin-password" class="form-control" placeholder="Password" autocomplete="current-password">
              <div id="login-error" class="text-danger mt-2" style="display:none;"></div>
            </div>
            <div class="modal-footer border-0">
              <button type="button" id="login-btn" class="btn btn-success w-100">Enter Base Camp</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Dashboard Content -->
      <div id="dashboard-content" style="display: none;">
        <div class="admin-card">
          <h2>Captain's Log Archive</h2>
          <button class="add-log-btn" onclick="showAddLogModal()">+ Add New Log</button>
          <div id="log-summary">Loading entries...</div>
        </div>

        <div class="admin-card">
          <h2>Recent Firebase Activity</h2>
          <div id="activity-placeholder">Loading activity...</div>
        </div>

        <div class="admin-card">
          <h2>Visitor Demographics</h2>
          <div id="stats-placeholder">Demographics tracking coming soon.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add New Log Modal -->
  <div class="modal fade" id="addLogModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header">
          <h5 class="modal-title">Add New Log Entry</h5>
        </div>
        <div class="modal-body">
          <input type="text" id="new-log-title" class="form-control mb-3" placeholder="Title">
          <textarea id="new-log-content" class="form-control" rows="12" placeholder="Paste full log entry here..."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" onclick="saveNewLog()">Save Entry</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ",
      authDomain: "lance-woolie-webfarm.firebaseapp.com",
      projectId: "lance-woolie-webfarm",
      storageBucket: "lance-woolie-webfarm.firebasestorage.app",
      messagingSenderId: "278461194969",
      appId: "1:278461194969:web:a2a03c9d27ccbb670814c8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Auto-check if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user && user.uid === "lNRpsSjHaub5CxnT2otZhWuXyvr2") {
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('dashboard-content').style.display = 'block';
        loadCaptainsLog();
      }
    });

    async function attemptLogin() {
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;
      const errorDiv = document.getElementById('login-error');
      const loginBtn = document.getElementById('login-btn');

      errorDiv.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        if (userCredential.user.uid === "lNRpsSjHaub5CxnT2otZhWuXyvr2") {
          bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
          document.getElementById('dashboard-content').style.display = 'block';
          loadCaptainsLog();
        } else {
          errorDiv.textContent = "Access Denied - Not authorized.";
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        errorDiv.textContent = "Login failed: " + error.message;
        errorDiv.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Enter Base Camp';
      }
    }

    async function loadCaptainsLog() {
      const container = document.getElementById('log-summary');
      container.innerHTML = 'Loading Captain\'s Log...';

      try {
        const q = query(collection(db, "captainsLog"), orderBy("order", "asc"));
        const snapshot = await getDocs(q);
        let html = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          html += `
            <div class="log-entry" onclick="this.classList.toggle('expanded')">
              <div class="log-title">${data.stardate} — ${data.title}</div>
              <div class="log-content">${data.content.replace(/\n/g, '<br>')}</div>
            </div>`;
        });
        container.innerHTML = html || 'No entries found.';
      } catch (e) {
        container.innerHTML = 'Error loading log.';
      }
    }

    function showAddLogModal() {
      document.getElementById('new-log-title').value = '';
      document.getElementById('new-log-content').value = '';
      new bootstrap.Modal(document.getElementById('addLogModal')).show();
    }

    async function saveNewLog() {
      const title = document.getElementById('new-log-title').value.trim();
      const content = document.getElementById('new-log-content').value.trim();

      if (!title || !content) {
        alert("Title and content are required.");
        return;
      }

      try {
        await addDoc(collection(db, "captainsLog"), {
          stardate: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }),
          title: title,
          content: content,
          timestamp: serverTimestamp(),
          order: Date.now()
        });
        alert("✅ New log entry saved!");
        bootstrap.Modal.getInstance(document.getElementById('addLogModal')).hide();
        loadCaptainsLog();
      } catch (err) {
        alert("Error saving: " + err.message);
      }
    }

    // Show login modal on load
    document.addEventListener('DOMContentLoaded', () => {
      new bootstrap.Modal(document.getElementById('loginModal')).show();

      // Allow pressing Enter in password field to submit
      document.getElementById('admin-password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') attemptLogin();
      });
    });
  </script>
</body>
</html>
