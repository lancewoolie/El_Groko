<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { margin:0 !important; padding:0 !important; width:100% !important; height:100% !important; overflow:hidden; }
    .hero {
      height: 100vh !important;
      width: 100vw !important;
      background: url('/img/moonsaloon/moon-saloon-base-wide.jpg?v=3') center/cover no-repeat fixed !important;
      position: relative;
      overflow: hidden;
      padding-top: 92px;
      margin: 0 !important;
    }
    #saloon-svg {
      position: absolute; top:0; left:0;
      width: 100% !important; height: 100% !important;
      z-index: 2; pointer-events: none;
    }
    #saloon-svg .moonsaloon-prop {
      pointer-events: auto; cursor: crosshair;
      transition: filter 0.12s ease, transform 0.2s ease;
    }
    #raccoon-subscribe:hover { transform: translateX(14px) scale(1.08) !important; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <section class="hero">
    <div id="game-hud">
      <div class="hud-item">SCORE <span id="score-value">000000</span></div>
      <div class="hud-item">HEALTH <div id="health-bar"><div id="health-progress"></div></div></div>
      <div class="hud-item">TIMER <span id="lunar-timer">30</span></div>
      <button id="restart-btn" onclick="location.reload()">RESTART GAME</button>
    </div>

    <svg id="saloon-svg" width="100%" height="100%" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
      <image id="hourglass-origins" href="/img/moonsaloon/hourglass-origins-nav.png" x="586" y="712" width="179" height="245" class="moonsaloon-prop" data-link="origins.html" data-score="125" data-max-hits="1" />
      <image id="holo-calendar-events" href="/img/moonsaloon/holo-calendar-events-nav.png" x="740" y="781" width="175" height="193" class="moonsaloon-prop" data-link="events.html" data-score="150" data-max-hits="1" />
      <image id="cowboy-hat-merch" href="/img/moonsaloon/cowboy-hat-merch-nav.png" x="555" y="331" width="314" height="280" class="moonsaloon-prop" data-link="merch.html" data-score="150" data-max-hits="1" />
      <!-- Music & Video — simple direct link (no transition code) -->
      <image id="music-video-neon" href="/img/moonsaloon/music-video-neon-nav.png" x="1089" y="474" width="205" height="158" class="moonsaloon-prop" data-link="music.html" data-score="175" data-max-hits="1" />
      <image id="raccoon-subscribe" href="/img/moonsaloon/raccoon-subscribe-nav.png" x="669" y="617" width="132" height="165" class="moonsaloon-prop" data-link="contact.html#email-subscribe" data-score="500" data-max-hits="1" />
      <image id="contact-earth-trophy" href="/img/moonsaloon/contact-earth-trophy-nav.png" x="882" y="752" width="199" height="178" class="moonsaloon-prop" data-link="contact.html" data-score="200" data-max-hits="1" />
    </svg>
  </section>

  <div class="pointingjs"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
