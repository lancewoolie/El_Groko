<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      height: 100vh !important;
      position: relative;
      overflow: hidden;
      padding-top: 92px; /* keeps nav in the exact spot */
    }
    #saloon-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    #saloon-svg .moonsaloon-prop {
      pointer-events: auto;
      cursor: crosshair;
      transition: filter 0.12s ease, transform 0.2s ease;
    }
    /* SQUEEZED + CENTERED TOP NAV */
    #nav-placeholder nav,
    #nav-placeholder .navbar,
    #nav-placeholder .nav-table {
      max-width: 920px !important;
      margin: 0 auto !important;
      padding: 0 30px;
    }
    #nav-placeholder .nav-link,
    #nav-placeholder .navbar-nav {
      justify-content: center !important;
      gap: 18px;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <section class="hero">
    <!-- Compact Neon HUD (stays on top) -->
    <div id="game-hud">
      <div class="hud-item">SCORE <span id="score-value">000000</span></div>
      <div class="hud-item">HEALTH <div id="health-bar"><div id="health-progress"></div></div></div>
      <div class="hud-item">TIMER <span id="lunar-timer">30</span></div>
      <button id="restart-btn" onclick="location.reload()">RESTART GAME</button>
    </div>

    <!-- FULL SVG OVERLAY – PERFECT ALIGNMENT FOREVER -->
    <svg id="saloon-svg" width="100%" height="100%" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
      <!-- Background image (scales perfectly on every device) -->
      <image href="/img/moonsaloon/moon-saloon-base.jpg" width="1920" height="1080" />

      <!-- SHOOTABLE PROPS – calibrated to your Grok Example Layout -->
      <!-- Merch Hat -->
      <image id="cowboy-hat-merch" href="/img/moonsaloon/cowboy-hat-merch-nav.png"
             x="533" y="351" width="157" height="140"
             class="moonsaloon-prop" data-link="merch.html" data-score="150" data-max-hits="1" />

      <!-- Music & Video Neon -->
      <image id="music-video-neon" href="/img/moonsaloon/music-video-neon-nav.png"
             x="1079" y="254" width="271" height="210"
             class="moonsaloon-prop" data-link="music.html" data-score="175" data-max-hits="1" />

      <!-- Raccoon Subscribe -->
      <image id="raccoon-subscribe" href="/img/moonsaloon/raccoon-subscribe-nav.png"
             x="484" y="592" width="132" height="165"
             class="moonsaloon-prop" data-link="contact.html#email-subscribe" data-score="500" data-max-hits="1" />

      <!-- Origins Hourglass -->
      <image id="hourglass-origins" href="/img/moonsaloon/hourglass-origins-nav.png"
             x="515" y="756" width="109" height="148"
             class="moonsaloon-prop" data-link="origins.html" data-score="125" data-max-hits="1" />

      <!-- Events Calendar -->
      <image id="holo-calendar-events" href="/img/moonsaloon/holo-calendar-events-nav.png"
             x="931" y="707" width="152" height="168"
             class="moonsaloon-prop" data-link="events.html" data-score="150" data-max-hits="1" />

      <!-- Contact Earth Trophy -->
      <image id="contact-earth-trophy" href="/img/moonsaloon/contact-earth-trophy-nav.png"
             x="1277" y="700" width="159" height="142"
             class="moonsaloon-prop" data-link="contact.html" data-score="200" data-max-hits="1" />

      <!-- FUTURE PROPS GO HERE (just copy-paste a line) -->
      <!-- Example NPC: 
      <image id="moon-mouse-1" href="/img/moonsaloon/moon-mouse.png"
             x="720" y="620" width="85" height="95"
             class="moonsaloon-prop npc-prop" data-score="300" data-max-hits="4" />
      -->
    </svg>
  </section>

  <!-- FOOTER, OLD SECTIONS & MODAL ALL REMOVED -->

  <div class="pointingjs">
    <!-- YOUR OLD POINTINGJS SVG HERE -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
