<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lance Woolie’s Moon Saloon</title>
  
  <!-- Moon Favicon -->
  <link rel="icon" type="image/png" href="/img/moon-favicon.png"> <!-- upload your moon icon here -->

  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  
  <!-- MOON SALOON HERO + NEW HUD -->
  <style>
    .hero {
      height: 100vh;
      background: url('/img/moonsaloon/moon-saloon-base.jpg') center/cover no-repeat fixed;
      position: relative;
      overflow: hidden;
    }
    .props-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    .moonsaloon-prop {
      position: absolute;
      pointer-events: auto;
      cursor: crosshair;
      user-select: none;
      transition: filter 0.08s ease, transform 0.15s ease;
      z-index: 6;
    }
    .moonsaloon-prop.hit {
      filter: brightness(2.8) saturate(2.5) hue-rotate(15deg);
      transform: scale(1.12) rotate(4deg);
    }
    .moonsaloon-prop.destroyed {
      opacity: 0.25;
      filter: grayscale(0.9);
      pointer-events: none;
    }

    /* NEW LONG NEON HUD BAR */
    #game-hud {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 1280px;
      background: rgba(11, 20, 38, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 50px;
      padding: 12px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
      z-index: 25;
      font-family: 'Courier New', monospace;
    }
    #game-hud .hud-item {
      color: #00ffcc;
      font-size: 1.15rem;
      font-weight: bold;
    }
    #restart-btn {
      display: none;
      background: #ffd700;
      color: #001f3f;
      border: none;
      padding: 8px 24px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }
    #restart-btn:hover {
      background: #e6c200;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Dynamic Nav (menu only – small icons) -->
  <div id="nav-placeholder"></div>

  <!-- MOON SALOON SHOOTING GALLERY HERO -->
  <section class="hero">
    <!-- NEW GAME HUD BAR -->
    <div id="game-hud">
      <div class="hud-item">SCORE <span id="score-value" style="color:#ffd700;">000000</span></div>
      
      <div class="hud-item">
        HEALTH 
        <div id="health-bar" style="display:inline-block;width:120px;height:18px;background:#111;border:2px solid #00ffcc;border-radius:10px;overflow:hidden;margin:0 10px;">
          <div id="health-progress" style="height:100%;background:#00ffcc;width:100%;"></div>
        </div>
      </div>
      
      <div class="hud-item">TIMER <span id="lunar-timer" style="color:#00ffcc;">30</span></div>
      
      <button id="restart-btn" onclick="location.reload()">RESTART GAME</button>
    </div>

    <!-- Props Container -->
    <div class="props-container">
      <!-- 1. Music & Video Neon -->
      <img id="music-video-neon" src="/img/moonsaloon/music-video-neon.png" class="moonsaloon-prop"
           data-link="music.html" data-score="175" data-max-hits="4"
           style="top:15%; left:49%; width:31%;">

      <!-- 2. Contact Earth Trophy -->
      <img id="contact-earth-trophy" src="/img/moonsaloon/contact-earth-trophy.png" class="moonsaloon-prop"
           data-link="contact.html" data-score="200" data-max-hits="3"
           style="top:46%; left:7%; width:19%;">

      <!-- 3. Cowboy Hat Merch -->
      <img id="cowboy-hat-merch" src="/img/moonsaloon/cowboy-hat-merch.png" class="moonsaloon-prop"
           data-link="merch.html" data-score="150" data-max-hits="5"
           style="top:33%; left:72%; width:23%;">

      <!-- 4. Hourglass Origins -->
      <img id="hourglass-origins" src="/img/moonsaloon/hourglass-origins.png" class="moonsaloon-prop"
           data-link="origins.html" data-score="125" data-max-hits="3"
           style="top:61%; left:26%; width:16%;">

      <!-- 5. Holo Calendar Events -->
      <img id="holo-calendar-events" src="/img/moonsaloon/holo-calendar-events.png" class="moonsaloon-prop"
           data-link="events.html" data-score="150" data-max-hits="4"
           style="top:52%; left:65%; width:21%;">

      <!-- 6. NEW SHOOTABLE RACCOON (super bonus) -->
      <img id="raccoon-subscribe" src="/img/moonsaloon/raccoon-subscribe.png" class="moonsaloon-prop"
           data-link="contact.html#email-subscribe" data-score="500" data-max-hits="2"
           style="top:68%; left:82%; width:14%;">
    </div>
  </section>

  <!-- OLD CONTENT SECTIONS BELOW (unchanged) -->
  <section class="py-5 combined-section">
    <!-- YOUR OLD MERCH + VIDEO CAROUSEL HERE -->
  </section>

  <section class="py-5" style="background-color: rgba(30, 58, 138, 0.8);">
    <!-- YOUR OLD EVENTS SECTION HERE -->
  </section>

  <!-- CRAZY ARMS MODAL -->
  <div class="modal fade" id="crazyArmsModal" tabindex="-1" aria-labelledby="crazyArmsModalLabel" aria-hidden="true">
    <!-- YOUR OLD MODAL CONTENT HERE -->
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <!-- Laser Pointer -->
  <div class="pointingjs">
    <!-- YOUR OLD POINTINGJS SVG HERE -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
