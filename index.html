<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    html, body { margin:0 !important; padding:0 !important; width:100% !important; height:100% !important; overflow:hidden; }
    .hero {
      height: 100vh !important;
      width: 100vw !important;
      background: url('/img/moonsaloon/moon-saloon-base-wide.jpg?v=3') center/cover no-repeat fixed !important;
      position: relative;
      overflow: hidden;
      padding-top: 0;
      margin: 0 !important;
    }
    #transition-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 9999; pointer-events: none; display: none; overflow: hidden; background: #000;
    }
    .transition-video { width: 100%; height: 100%; object-fit: cover; }
    /* Hide old nav/footer */
    #nav-placeholder, .tight-footer, #footer-placeholder { display: none !important; }
  </style>
</head>
<body>

  <section class="hero">
    <svg id="saloon-svg" width="100%" height="100%" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
      <!-- Tesla Chimes - moved closer to center, smaller -->
      <image id="tesla-chime-prop" href="/img/moonsaloon/Tesla-Chime-nav.png" x="880" y="45" width="175" height="119" class="moonsaloon-prop" data-link="chimes.html" data-score="350" data-max-hits="1" data-forward-video="/video/chimes-video-transition.mp4" />

      <!-- Origins - moved closer to center, smaller -->
      <image id="hourglass-origins" href="/img/moonsaloon/hourglass-origins-nav.png" x="610" y="690" width="161" height="220" class="moonsaloon-prop" data-link="origins.html" data-score="125" data-max-hits="1" data-forward-video="/video/origins-video-transition.mp4" />

      <!-- Events - moved closer to center, smaller -->
      <image id="holo-calendar-events" href="/img/moonsaloon/holo-calendar-events-nav.png" x="765" y="755" width="158" height="174" class="moonsaloon-prop" data-link="events.html" data-score="150" data-max-hits="1" data-forward-video="/video/events-video-transition.mp4" />

      <!-- Merch - moved closer to center, smaller -->
      <image id="cowboy-hat-merch" href="/img/moonsaloon/cowboy-hat-merch-nav.png" x="580" y="315" width="283" height="252" class="moonsaloon-prop" data-link="merch.html" data-score="150" data-max-hits="1" data-forward-video="/video/merch-video-transition.mp4" />

      <!-- Music & Video - moved closer to center, smaller -->
      <image id="music-video-neon" href="/img/moonsaloon/music-video-neon-nav.png" x="1050" y="460" width="185" height="142" class="moonsaloon-prop" data-link="music.html" data-score="175" data-max-hits="1" data-forward-video="/video/music-video-transition.mp4" />

      <!-- OnlyFans (Raccoon) - moved closer to center, smaller -->
      <image id="raccoon-subscribe" href="/img/moonsaloon/raccoon-subscribe-nav.png" x="690" y="600" width="119" height="148" class="moonsaloon-prop" data-link="onlyfans.html" data-score="500" data-max-hits="1" data-forward-video="/video/friends-video-transition.mp4" />

      <!-- Contact - moved closer to center, smaller -->
      <image id="contact-earth-trophy" href="/img/moonsaloon/contact-earth-trophy-nav.png" x="900" y="730" width="179" height="160" class="moonsaloon-prop" data-link="contact.html" data-score="200" data-max-hits="1" data-forward-video="/video/contact-video-transition.mp4" />
    </svg>
  </section>

  <div id="transition-overlay">
    <video id="forward-video" class="transition-video" playsinline preload="auto"></video>
    <video id="reverse-video" class="transition-video" playsinline preload="auto" style="display:none;"></video>
  </div>

  <div class="pointingjs"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');

      // Only play forward transition when coming FROM index to a destination
      const isFromIndex = document.referrer.includes('index.html') || !document.referrer;

      if (isFromIndex && forwardVideo) {
        forwardVideo.src = ''; // will be set by prop click
        // Forward video is handled in the SVG prop click listeners (in script.js)
      }

      // Reverse transition (back to saloon) is handled per-page

      // Clean up any old nav
      const oldNav = document.getElementById('nav-placeholder');
      if (oldNav) oldNav.remove();
    });
  </script>
</body>
</html>
