<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  
  <!-- MOON SALOON HERO STYLES -->
  <style>
    .hero {
      min-height: 100vh;
      background: url('/img/moonsaloon/moon-saloon-base.jpg') center/cover no-repeat fixed;
      position: relative;
      overflow: hidden;
    }
    .props-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    .moonsaloon-prop {
      position: absolute;
      pointer-events: auto;
      cursor: crosshair;
      user-select: none;
      transition: filter 0.08s ease, transform 0.15s ease;
      z-index: 6;
    }
    .moonsaloon-prop.hit {
      filter: brightness(2.8) saturate(2.5) hue-rotate(15deg);
      transform: scale(1.12) rotate(4deg);
    }
    .moonsaloon-prop.destroyed {
      opacity: 0.25;
      filter: grayscale(0.9);
      pointer-events: none;
    }
    #lunar-timer {
      position: absolute;
      top: 22px;
      right: 22px;
      background: rgba(0,0,0,0.75);
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      font-size: 1.35rem;
      font-weight: bold;
      padding: 8px 20px;
      border-radius: 30px;
      border: 2px solid #00ffcc;
      box-shadow: 0 0 20px #00ffcc;
      z-index: 20;
    }
  </style>
</head>
<body>
  <!-- Floating Subscribe -->
  <a href="contact.html#email-subscribe" class="floating-subscribe">
    <img src="img/subscribe.gif" alt="Subscribe">
  </a>

  <!-- Dynamic Nav (Score + Health HUD) -->
  <div id="nav-placeholder"></div>

  <!-- MOON SALOON SHOOTING GALLERY HERO -->
  <section class="hero">
    <div class="props-container">
      <!-- 1. Music & Video Neon -->
      <img id="music-video-neon"
           src="/img/moonsaloon/music-video-neon.png"
           class="moonsaloon-prop"
           alt="Music & Video"
           data-link="music.html"
           data-score="175"
           data-max-hits="4"
           style="top:15%; left:49%; width:31%;">

      <!-- 2. Contact Earth Trophy -->
      <img id="contact-earth-trophy"
           src="/img/moonsaloon/contact-earth-trophy.png"
           class="moonsaloon-prop"
           alt="Contact Earth"
           data-link="contact.html"
           data-score="200"
           data-max-hits="3"
           style="top:46%; left:7%; width:19%;">

      <!-- 3. Cowboy Hat Merch -->
      <img id="cowboy-hat-merch"
           src="/img/moonsaloon/cowboy-hat-merch.png"
           class="moonsaloon-prop"
           alt="Merch"
           data-link="merch.html"
           data-score="150"
           data-max-hits="5"
           style="top:33%; left:72%; width:23%;">

      <!-- 4. Hourglass Origins -->
      <img id="hourglass-origins"
           src="/img/moonsaloon/hourglass-origins.png"
           class="moonsaloon-prop"
           alt="Origins"
           data-link="origins.html"
           data-score="125"
           data-max-hits="3"
           style="top:61%; left:26%; width:16%;">

      <!-- 5. Holo Calendar Events -->
      <img id="holo-calendar-events"
           src="/img/moonsaloon/holo-calendar-events.png"
           class="moonsaloon-prop"
           alt="Events"
           data-link="events.html"
           data-score="150"
           data-max-hits="4"
           style="top:52%; left:65%; width:21%;">
    </div>

    <!-- 30-Second Lunar Timer -->
    <div id="lunar-timer">30</div>
  </section>

  <!-- OLD CONTENT SECTIONS (unchanged & preserved) -->
  <section class="py-5 combined-section">
    <div class="container">
      <h2 class="text-center mb-4" style="color: white;">Featured Merch & Latest Music Videos</h2>
      <div class="row">
        <div class="col-md-6">
          <div id="merchCarousel" class="carousel slide" data-bs-ride="carousel">
            <!-- YOUR OLD MERCH CAROUSEL CONTENT HERE (exactly as before) -->
            <div class="carousel-inner">
              <!-- Cluck Yeah, Uber, Too Drunk items -->
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#merchCarousel" data-bs-slide="prev">…</button>
            <button class="carousel-control-next" type="button" data-bs-target="#merchCarousel" data-bs-slide="next">…</button>
          </div>
        </div>
        <div class="col-md-6">
          <div id="musicCarousel" class="carousel slide" data-bs-ride="carousel">
            <!-- YOUR OLD VIDEO CAROUSEL CONTENT HERE -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="py-5" style="background-color: rgba(30, 58, 138, 0.8);">
    <!-- YOUR OLD UPCOMING EVENTS SECTION HERE -->
  </section>

  <!-- CRAZY ARMS MODAL (unchanged) -->
  <div class="modal fade" id="crazyArmsModal" tabindex="-1" aria-labelledby="crazyArmsModalLabel" aria-hidden="true">
    <!-- YOUR OLD MODAL CONTENT HERE -->
  </div>

  <!-- Footer -->
  <div id="footer-placeholder" class="tight-footer"></div>

  <!-- Laser Pointer -->
  <div class="pointingjs">
    <!-- YOUR OLD POINTINGJS SVG HERE -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
