<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      height: 100vh !important;
      background: url('/img/moonsaloon/moon-saloon-base.jpg') center/cover no-repeat fixed;
      position: relative;
      overflow: hidden;
    }
    .props-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <section class="hero">
    <!-- Compact Neon HUD -->
    <div id="game-hud">
      <div class="hud-item">SCORE <span id="score-value">000000</span></div>
      <div class="hud-item">HEALTH <div id="health-bar"><div id="health-progress"></div></div></div>
      <div class="hud-item">TIMER <span id="lunar-timer">30</span></div>
      <button id="restart-btn" onclick="location.reload()">RESTART GAME</button>
    </div>

    <div class="props-container">
      <!-- Merch Hat – Row 1, Col 1 -->
      <img id="cowboy-hat-merch" src="/img/moonsaloon/cowboy-hat-merch-nav.png" class="moonsaloon-prop"
           data-link="merch.html" data-score="150" data-max-hits="2"
           style="top:31.5%; left:23.5%; width:6.8%;">

      <!-- Music & Video – Row 2, Col 4 -->
      <img id="music-video-neon" src="/img/moonsaloon/music-video-neon-nav.png" class="moonsaloon-prop"
           data-link="music.html" data-score="175" data-max-hits="2"
           style="top:26%; left:51%; width:13.2%;">

      <!-- Raccoon Subscribe – Row 3, Col 1 -->
      <img id="raccoon-subscribe" src="/img/moonsaloon/raccoon-subscribe-nav.png" class="moonsaloon-prop"
           data-link="contact.html#email-subscribe" data-score="500" data-max-hits="2"
           style="top:54.5%; left:21.5%; width:6.2%;">

      <!-- Origins Hourglass – Row 4, Col 1 -->
      <img id="hourglass-origins" src="/img/moonsaloon/hourglass-origins-nav.png" class="moonsaloon-prop"
           data-link="origins.html" data-score="125" data-max-hits="2"
           style="top:67%; left:25%; width:5.1%;">

      <!-- Events Calendar – Row 4, Col 2 -->
      <img id="holo-calendar-events" src="/img/moonsaloon/holo-calendar-events-nav.png" class="moonsaloon-prop"
           data-link="events.html" data-score="150" data-max-hits="2"
           style="top:64.5%; left:47.5%; width:7.1%;">

      <!-- Contact Earth Trophy – Row 4, Col 3 -->
      <img id="contact-earth-trophy" src="/img/moonsaloon/contact-earth-trophy-nav.png" class="moonsaloon-prop"
           data-link="contact.html" data-score="200" data-max-hits="2"
           style="top:63.5%; left:65%; width:7.6%;">
    </div>
  </section>

  <!-- OLD CONTENT SECTIONS (unchanged) -->
  <section class="py-5 combined-section">
    <!-- YOUR OLD CAROUSELS HERE -->
  </section>
  <section class="py-5" style="background-color: rgba(30, 58, 138, 0.8);">
    <!-- YOUR OLD EVENTS HERE -->
  </section>
  <div class="modal fade" id="crazyArmsModal" tabindex="-1" aria-labelledby="crazyArmsModalLabel" aria-hidden="true">
    <!-- YOUR OLD MODAL HERE -->
  </div>
  <div id="footer-placeholder" class="tight-footer"></div>
  <div class="pointingjs">
    <!-- YOUR OLD POINTINGJS SVG HERE -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
