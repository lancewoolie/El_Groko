<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    html, body { 
      margin:0 !important; padding:0 !important; 
      width:100% !important; height:100% !important; 
      overflow:hidden; 
    }
    .hero {
      height: 100vh !important;
      width: 100vw !important;
      background: url('/img/moonsaloon/moon-saloon-base-wide.jpg?v=3') center/cover no-repeat fixed !important;
      position: relative;
      overflow: hidden;
    }
    #transition-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 9999; pointer-events: none; display: none; overflow: hidden; background: #000;
    }
    .transition-video { width: 100%; height: 100%; object-fit: cover; }

    #nav-placeholder { display: none !important; }

    /* Sexy FX */
    .moonsaloon-prop {
      filter: drop-shadow(0 0 12px rgba(0, 255, 255, 0.7)) drop-shadow(0 0 25px rgba(255, 20, 147, 0.4));
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), filter 0.25s ease;
      cursor: pointer;
      pointer-events: all;
    }
    .moonsaloon-prop:hover {
      transform: scale(1.08);
      filter: drop-shadow(0 0 22px rgba(0, 255, 255, 0.95)) drop-shadow(0 0 42px rgba(255, 20, 147, 0.8));
    }
  </style>
</head>
<body>
  <section class="hero">
    <svg id="saloon-svg" width="100%" height="100%" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" style="pointer-events: auto;">
      
      <!-- Tesla Chimes -->
      <image id="tesla-chime-prop" href="/img/moonsaloon/Tesla-Chime-nav.png" x="830" y="75" width="170" height="115" class="moonsaloon-prop" data-link="chimes.html" data-score="350" data-max-hits="1" data-forward-video="/video/chimes-video-transition.mp4" />
      
      <!-- Origins -->
      <image id="hourglass-origins" href="/img/moonsaloon/hourglass-origins-nav.png" x="640" y="690" width="155" height="210" class="moonsaloon-prop" data-link="origins.html" data-score="125" data-max-hits="1" data-forward-video="/video/origins-video-transition.mp4" />
      
      <!-- Events -->
      <image id="holo-calendar-events" href="/img/moonsaloon/holo-calendar-events-nav.png" x="795" y="755" width="155" height="170" class="moonsaloon-prop" data-link="events.html" data-score="150" data-max-hits="1" data-forward-video="/video/events-video-transition.mp4" />
      
      <!-- Merch -->
      <image id="cowboy-hat-merch" href="/img/moonsaloon/cowboy-hat-merch-nav.png" x="595" y="325" width="270" height="240" class="moonsaloon-prop" data-link="merch.html" data-score="150" data-max-hits="1" data-forward-video="/video/merch-video-transition.mp4" />
      
      <!-- Music & Video -->
      <image id="music-video-neon" href="/img/moonsaloon/music-video-neon-nav.png" x="1035" y="465" width="180" height="138" class="moonsaloon-prop" data-link="music.html" data-score="175" data-max-hits="1" data-forward-video="/video/music-video-transition.mp4" />
      
      <!-- Raccoon -->
      <image id="raccoon-subscribe" href="/img/moonsaloon/raccoon-subscribe-nav.png" x="735" y="600" width="115" height="142" class="moonsaloon-prop" data-link="onlyfans.html" data-score="500" data-max-hits="1" data-forward-video="/video/friends-video-transition.mp4" />
      
      <!-- Contact -->
      <image id="contact-earth-trophy" href="/img/moonsaloon/contact-earth-trophy-nav.png" x="930" y="730" width="175" height="155" class="moonsaloon-prop" data-link="contact.html" data-score="200" data-max-hits="1" data-forward-video="/video/contact-video-transition.mp4" />
    </svg>
  </section>

  <div id="transition-overlay">
    <video id="forward-video" class="transition-video" playsinline preload="auto"></video>
    <video id="reverse-video" class="transition-video" playsinline preload="auto" style="display:none;"></video>
  </div>

  <div class="pointingjs"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const svg = document.getElementById('saloon-svg');
      
      // Force pointer events on SVG and all props
      if (svg) {
        svg.style.pointerEvents = 'auto';
      }

      // Extra click handler backup for stubborn browsers
      document.querySelectorAll('.moonsaloon-prop').forEach(prop => {
        prop.style.pointerEvents = 'all';
        
        // Optional debug: log clicks
        // prop.addEventListener('click', () => console.log('Clicked:', prop.id));
      });

      const oldNav = document.getElementById('nav-placeholder');
      if (oldNav) oldNav.remove();
    });
  </script>
</body>
</html>
