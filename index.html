<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      height: 100vh !important;
      background: url('/img/moonsaloon/moon-saloon-base.jpg') center/cover no-repeat fixed;
      position: relative;
      overflow: hidden;
      padding-top: 92px; /* nav perfectly where footer used to be */
    }
    .props-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    /* SQUEEZED + CENTERED TOP NAV */
    #nav-placeholder nav,
    #nav-placeholder .navbar,
    #nav-placeholder .nav-table {
      max-width: 920px !important;
      margin: 0 auto !important;
      padding: 0 30px;
    }
    #nav-placeholder .nav-link,
    #nav-placeholder .navbar-nav {
      justify-content: center !important;
      gap: 18px;
    }

    /* MOBILE – PROPS 2× BIGGER & EASIER TO TAP */
    @media (max-width: 992px) {
      #cowboy-hat-merch      { width: 13.8% !important; }
      #music-video-neon      { width: 24.5% !important; }
      #raccoon-subscribe     { width: 12.8% !important; }
      #hourglass-origins     { width: 10.5% !important; }
      #holo-calendar-events  { width: 14.5% !important; }
      #contact-earth-trophy  { width: 15.2% !important; }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <section class="hero">
    <!-- Compact Neon HUD -->
    <div id="game-hud">
      <div class="hud-item">SCORE <span id="score-value">000000</span></div>
      <div class="hud-item">HEALTH <div id="health-bar"><div id="health-progress"></div></div></div>
      <div class="hud-item">TIMER <span id="lunar-timer">30</span></div>
      <button id="restart-btn" onclick="location.reload()">RESTART GAME</button>
    </div>

    <div class="props-container">
      <!-- PERFECTLY ALIGNED TO GROK EXAMPLE LAYOUT (bar cluster) -->

      <!-- Merch Hat -->
      <img id="cowboy-hat-merch" src="/img/moonsaloon/cowboy-hat-merch-nav.png" class="moonsaloon-prop"
           data-link="merch.html" data-score="150" data-max-hits="1"
           style="top:32.5%; left:27.8%; width:8.2%;">

      <!-- Music & Video Neon -->
      <img id="music-video-neon" src="/img/moonsaloon/music-video-neon-nav.png" class="moonsaloon-prop"
           data-link="music.html" data-score="175" data-max-hits="1"
           style="top:23.5%; left:56.2%; width:14.1%;">

      <!-- Raccoon Subscribe -->
      <img id="raccoon-subscribe" src="/img/moonsaloon/raccoon-subscribe-nav.png" class="moonsaloon-prop"
           data-link="contact.html#email-subscribe" data-score="500" data-max-hits="1"
           style="top:54.8%; left:25.2%; width:6.9%;">

      <!-- Origins Hourglass -->
      <img id="hourglass-origins" src="/img/moonsaloon/hourglass-origins-nav.png" class="moonsaloon-prop"
           data-link="origins.html" data-score="125" data-max-hits="1"
           style="top:70%; left:26.8%; width:5.7%;">

      <!-- Events Calendar -->
      <img id="holo-calendar-events" src="/img/moonsaloon/holo-calendar-events-nav.png" class="moonsaloon-prop"
           data-link="events.html" data-score="150" data-max-hits="1"
           style="top:65.5%; left:48.5%; width:7.9%;">

      <!-- Contact Earth Trophy -->
      <img id="contact-earth-trophy" src="/img/moonsaloon/contact-earth-trophy-nav.png" class="moonsaloon-prop"
           data-link="contact.html" data-score="200" data-max-hits="1"
           style="top:64.8%; left:66.5%; width:8.3%;">
    </div>
  </section>

  <!-- FOOTER, OLD CAROUSELS, EVENTS & MODAL ALL GONE -->

  <div class="pointingjs">
    <!-- YOUR OLD POINTINGJS SVG HERE -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
