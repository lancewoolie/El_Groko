<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Friend Zone - Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/friends-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
      touch-action: manipulation;
    }
    .content {
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .content.show { opacity: 1; }
    .content-overlay {
      background: url('/img/moonsaloon/friends-base-bg.jpg') center/cover no-repeat fixed !important;
      min-height: 100vh;
      padding-top: 90px;
    }
    .hero-friends {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 40px;
      padding: 30px 0 50px;
      flex-wrap: wrap;
    }
    .hero-friends .doors {
      width: 130px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .hero-friends .doors:hover { transform: scale(1.08); }
    .friend-card {
      background: rgba(10, 25, 50, 0.75);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 3rem;
      max-width: 620px;
      margin: 0 auto;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.5),
                  inset 0 0 40px rgba(255, 0, 170, 0.25);
      backdrop-filter: blur(12px);
      text-align: center;
    }
    .friend-card h2 {
      color: #00ffcc;
      text-shadow: 0 0 25px #00ffcc;
      font-size: 2.4rem;
    }
    .friend-card p {
      color: #f0f0f0;
      font-size: 1.25rem;
      line-height: 1.8;
    }
    /* Improved readability */
    .text-muted, .small {
      color: #e0e0e0 !important;
      opacity: 0.95;
    }
    /* Honeypot - hidden but present */
    .honeypot {
      position: absolute;
      left: -9999px;
      top: -9999px;
      opacity: 0;
      height: 1px;
      width: 1px;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  
  <!-- VIDEO TRANSITION OVERLAY -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
    <video id="reverse-video" playsinline preload="auto" muted style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <!-- HERO – Doors only -->
      <div class="hero-friends">
        <img id="saloon-doors-back"
             src="/img/moonsaloon/saloon-doors-nav.png"
             class="doors"
             alt="Back to Moon Saloon">
      </div>

      <!-- Friend Zone Subscribe Card -->
      <div class="container py-5">
        <div class="friend-card">
          <h2>Welcome to the Friend Zone</h2>
          <p class="lead mt-4">Join the inner circle. Get first dibs on new drops, secret shows, and bayou insider vibes.</p>
       
          <form id="newsletter-form" class="row g-3 justify-content-center mt-4">
            <!-- Honeypot Field (invisible to humans) -->
            <input type="text" id="website_url" name="website_url" class="honeypot" autocomplete="off" tabindex="-1">

            <div class="col-md-6">
              <input type="text" class="form-control" id="first-name" placeholder="First Name" required>
            </div>
            <div class="col-md-6">
              <input type="text" class="form-control" id="last-name" placeholder="Last Name" required>
            </div>
            <div class="col-md-8">
              <input type="email" class="form-control" id="signup-email" placeholder="your@bayou.com" required>
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button type="submit" class="btn btn-success w-100">Do it. Join the Zone</button>
            </div>
          </form>

          <div id="newsletter-success" class="success-message mt-3" style="display:none; color:#00ffcc;">
            You're in the Friend Zone — exclusive twang incoming!
          </div>
          <p class="text-center small mt-4">For real — secure, no spam, ever.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    const firebaseConfig = {
      apiKey: "AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ",
      authDomain: "lance-woolie-webfarm.firebaseapp.com",
      projectId: "lance-woolie-webfarm",
      storageBucket: "lance-woolie-webfarm.firebasestorage.app",
      messagingSenderId: "278461194969",
      appId: "1:278461194969:web:a2a03c9d27ccbb670814c8",
      measurementId: "G-D734JL7BFR"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
    window.serverTimestamp = serverTimestamp;
  </script>

  <!-- Newsletter Form with Security -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const newsletterForm = document.getElementById('newsletter-form');
      if (!newsletterForm) return;

      newsletterForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const firstName = document.getElementById('first-name').value.trim();
        const lastName = document.getElementById('last-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const honeypot = document.getElementById('website_url').value.trim();

        // 1. Honeypot check
        if (honeypot !== '') {
          console.log('Bot detected via honeypot');
          return; // Silent fail for bots
        }

        // 2. Basic validation
        if (!firstName || !lastName || !email) {
          alert('Please fill in all fields.');
          return;
        }

        // 3. Block obvious disposable / dotted / suspicious emails
        const lowerEmail = email.toLowerCase();
        if (
          lowerEmail.includes('..') || 
          (lowerEmail.match(/\./g) || []).length > 4 || // too many dots
          lowerEmail.includes('grok') ||
          lowerEmail.includes('temp') ||
          lowerEmail.includes('disposable') ||
          lowerEmail.match(/^[a-z]+\.[a-z]+\.[a-z]+@/) || // multiple dotted names
          lowerEmail.length < 8
        ) {
          alert('Please use a valid personal email address.');
          return;
        }

        try {
          await window.addDoc(window.collection(window.db, 'subscribers'), {
            firstName: firstName,
            lastName: lastName,
            email: email,
            type: 'friendzone',
            timestamp: window.serverTimestamp()
          });

          document.getElementById('newsletter-success').style.display = 'block';
          newsletterForm.reset();
        } catch (error) {
          console.error(error);
          alert('Signup snag — try again or email directly.');
        }
      });
    });
  </script>

  <!-- FIXED & ROBUST TRANSITION SYSTEM -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');

      forwardVideo.src = '/video/subscribe-video-transition.mp4';
      reverseVideo.src = '/video/subscribe-video-reverse.mp4';

      // Forward transition on load
      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';
      let transitionStarted = false;

      forwardVideo.oncanplaythrough = () => {
        if (transitionStarted) return;
        transitionStarted = true;
        forwardVideo.muted = true;
        forwardVideo.volume = 0.5;
        forwardVideo.play().catch(() => finishForwardTransition());
      };

      forwardVideo.onended = finishForwardTransition;

      function finishForwardTransition() {
        overlay.style.display = 'none';
        content.classList.add('show');
      }

      setTimeout(() => {
        if (!transitionStarted) finishForwardTransition();
      }, 1800);

      // Reverse transition
      const doorsBack = document.getElementById('saloon-doors-back');
      if (doorsBack) {
        doorsBack.addEventListener('click', (e) => {
          e.preventDefault();
          overlay.style.display = 'block';
          forwardVideo.style.display = 'none';
          reverseVideo.style.display = 'block';
          reverseVideo.currentTime = 0;
          reverseVideo.volume = 0.5;
          reverseVideo.play()
            .then(() => {
              reverseVideo.onended = () => window.location.href = 'index.html';
            })
            .catch(() => window.location.href = 'index.html');
        });
      }
    });
  </script>
</body>
</html>
