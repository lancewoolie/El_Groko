<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friend Zone - Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/friends-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
    }
    #intro-video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 9999;
      display: none;
      background: #000;
    }
    .content {
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .content.show { opacity: 1; }
    .content-overlay {
      background: rgba(0, 15, 40, 0.18);
      min-height: 100vh;
      padding-top: 120px;
    }

    /* HERO – Doors static top-left, no title/subtitle */
    .hero-friends {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 40px;
      padding: 60px 0 40px;
      flex-wrap: wrap;
    }
    .hero-friends .doors {
      width: 120px;
      flex-shrink: 0;
    }

    /* Futuristic Subscribe Card */
    .friend-card {
      background: rgba(10, 25, 50, 0.75);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 3rem;
      max-width: 620px;
      margin: 0 auto;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.5),
                  inset 0 0 40px rgba(255, 0, 170, 0.25);
      backdrop-filter: blur(12px);
      text-align: center;
    }
    .friend-card h2 {
      color: #00ffcc;
      text-shadow: 0 0 25px #00ffcc;
      font-size: 2.4rem;
    }
    .friend-card p {
      color: #f0f0f0;
      font-size: 1.25rem;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- Intro Video (plays once per session) -->
  <video id="intro-video" muted playsinline></video>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <!-- HERO – Only Doors (top-left) -->
      <div class="hero-friends">
        <img id="saloon-doors-back" 
             src="/img/moonsaloon/saloon-doors-nav.png" 
             class="moonsaloon-prop doors" 
             data-link="index.html" 
             data-score="100" 
             data-max-hits="1"
             alt="Back to Saloon">
      </div>

      <!-- Friend Zone Subscribe Card -->
      <div class="container py-5">
        <div class="friend-card">
          <h2>Welcome to the Friend Zone</h2>
          <p class="lead mt-4">Join the inner circle. Get first dibs on new drops, secret shows, and bayou insider vibes.</p>
          
          <form id="newsletter-form" class="row g-3 justify-content-center mt-4">
            <div class="col-md-8">
              <input type="email" class="form-control" id="signup-email" placeholder="your@bayou.com" required>
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button type="submit" class="btn btn-success w-100">Do it. Join the Zone</button>
            </div>
          </form>
          <div id="newsletter-success" class="success-message mt-3">You're in the Friend Zone — exclusive twang incoming!</div>
          <p class="text-center small mt-4 text-muted">Powered by Firebase — secure, no spam, ever.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <!-- Firebase for Newsletter -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    const firebaseConfig = {
      apiKey: "AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ",
      authDomain: "lance-woolie-webfarm.firebaseapp.com",
      projectId: "lance-woolie-webfarm",
      storageBucket: "lance-woolie-webfarm.firebasestorage.app",
      messagingSenderId: "278461194969",
      appId: "1:278461194969:web:a2a03c9d27ccbb670814c8",
      measurementId: "G-D734JL7BFR"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
    window.serverTimestamp = serverTimestamp;
  </script>

  <!-- Form handling -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const newsletterForm = document.getElementById('newsletter-form');
      if (newsletterForm) {
        newsletterForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          let email = document.getElementById('signup-email').value.trim();
          if (!email || !/^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9-]+(?:\.[a-zA-Z0-9-]+)*$/.test(email)) {
            alert('Valid email required.');
            return;
          }
          try {
            await window.addDoc(window.collection(window.db, 'subscribers'), {
              email,
              type: 'friendzone',
              timestamp: window.serverTimestamp()
            });
            document.getElementById('newsletter-success').style.display = 'block';
            newsletterForm.reset();
          } catch (error) {
            alert('Signup snag — try again or email directly.');
          }
        });
      }
    });
  </script>

  <!-- Intro Video Logic (once per session) -->
  <script>
    const video = document.getElementById('intro-video');
    const content = document.getElementById('main-content');

    if (!sessionStorage.getItem('friendZoneIntroPlayed')) {
      video.src = '/video/subscribe-video-transition.mp4';
      video.style.display = 'block';
      video.play();

      video.onended = () => {
        sessionStorage.setItem('friendZoneIntroPlayed', 'true');
        video.style.transition = 'opacity 1.2s ease';
        video.style.opacity = '0';
        setTimeout(() => {
          video.style.display = 'none';
          content.classList.add('show');
        }, 1200);
      };
    } else {
      content.classList.add('show');
    }
  </script>
</body>
</html>
