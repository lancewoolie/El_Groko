<!DOCTYPE html>

<head>

  <title>Music & Videos - Lance Woolie</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/music-video-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 60px;
    }
    .content-overlay {
      background: rgba(0, 31, 63, 0.35); /* MUCH lighter – new bg shows through */
      min-height: 100vh;
      padding-top: 120px;
    }
    .hero-music {
      text-align: center;
      padding: 60px 0;
      background: none;
    }
    .hero-music h1 { font-size: 3rem; color: #FFD700; text-shadow: 2px 2px 6px #000; }
    .card {
      background-color: rgba(30, 58, 138, 0.85);
      border: 2px solid #0074D9;
      border-radius: 15px;
      overflow: hidden;
      transition: all 0.3s ease;
      height: 100%;
    }
    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 25px rgba(0,116,217,0.5);
      border-color: #FFD700;
    }
    .tight-footer {
      background: #001f3f !important;
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      width: 100% !important;
      z-index: 1001 !important;
      border-top: 1px solid #0074D9;
    }
  </style>
</head>

      <div class="container">
