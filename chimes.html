<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Tesla Chimes - Lance Woolie’s Moon Saloon</title>
  <meta name="description" content="Tesla Lock Chimes by Lance Woolie. Download and use on your Tesla.">

  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">

  <style>
    body {
      background: url('/img/moonsaloon/chimes-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-top: 105px;
      padding-bottom: 80px;
      touch-action: manipulation;
    }

    /* MINI NAV - Left justified with bounce in/out */
    .mini-nav {
      position: fixed;
      top: 15px;
      left: 35px;
      z-index: 10000;
      background: rgba(10, 15, 35, 0.95);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.7),
                  inset 0 0 25px rgba(255, 0, 170, 0.4);
      backdrop-filter: blur(14px);
      
      opacity: 0;
      visibility: hidden;
      transform: translateY(-90px);
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), 
                  opacity 0.6s ease;
    }

    .mini-nav.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .mini-nav.bounce-out {
      transition: transform 0.68s cubic-bezier(0.68, -1.4, 0.32, 2.3) !important;
      transform: translateY(-240px) scale(0.35) rotate(32deg) !important;
    }

    .mini-nav img {
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 10px #00ffcc);
    }

    .mini-nav img:hover {
      transform: scale(1.18) translateY(-4px);
      filter: drop-shadow(0 0 25px #ff00aa);
    }

    .mini-nav .doors {
      width: 52px;
      height: 46px;
    }

    /* Tooltip */
    .mini-nav img::after {
      content: attr(data-label);
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #00ffcc;
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 10001;
      border: 1px solid #00ffcc;
      text-shadow: 0 0 8px #00ffcc;
      margin-top: 8px;
    }

    .mini-nav img:hover::after {
      opacity: 1;
    }

    .content { 
      position: relative; 
      z-index: 1; 
      opacity: 0; 
      transition: opacity 1.2s ease; 
    }
    .content.show { opacity: 1; }

    .content-overlay {
      background: url('/img/moonsaloon/chimes-base-bg.jpg') center/cover no-repeat fixed !important;
      min-height: 100vh;
    }

    /* Leaner Tesla Chimes Section */
    .tesla-chime-prop {
      width: 180px;
      margin: 0 auto 25px;
      display: block;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 40px #00ffcc);
    }

    .tesla-chime-prop:hover {
      transform: scale(1.12) rotate(3deg);
      filter: drop-shadow(0 0 70px #ff00aa);
    }

    .chime-block {
      background: rgba(8,20,45,0.88);
      border: 3px solid #00ffcc;
      border-radius: 24px;
      padding: 1.8rem 2rem;
      box-shadow: 0 0 70px rgba(0,255,204,0.5),
                  inset 0 0 50px rgba(255,0,170,0.3);
      backdrop-filter: blur(14px);
      max-width: 960px;
      margin: 0 auto 50px;
    }

    .sound-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .sound-btn {
      background: rgba(0,0,0,0.75);
      border: 2px solid #00ffcc;
      color: #f0f0f0;
      padding: 1rem 1.4rem;
      border-radius: 50px;
      font-size: 1.05rem;
      transition: all 0.3s ease;
      flex-grow: 1;
      text-align: left;
    }

    .sound-btn:hover {
      background: #00ffcc;
      color: #000;
      transform: scale(1.04);
    }

    .sound-btn.playing {
      background: #ff00aa;
      color: #fff;
      box-shadow: 0 0 40px #ff00aa;
    }

    .download-btn {
      background: rgba(0,0,0,0.75);
      border: 2px solid #00ffcc;
      color: #00ffcc;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 0.3s ease;
    }

    .download-btn:hover {
      background: #ff00aa;
      color: #000;
      transform: scale(1.15);
    }

    /* Referral Block - Updated Text */
    .referral-block {
      position: absolute;
      top: 120px;
      right: 40px;
      background: linear-gradient(135deg, #00ffcc, #00ccff);
      color: #000;
      padding: 1.8rem 2.2rem;
      border-radius: 22px;
      box-shadow: 0 0 80px #00ffcc;
      text-align: center;
      max-width: 280px;
      cursor: pointer;
      transition: all 0.4s ease;
      border: 3px solid rgba(255,255,255,0.3);
    }

    .referral-block:hover {
      transform: scale(1.08);
      box-shadow: 0 0 110px #00ffcc;
    }
  </style>
</head>
<body>

  <!-- MINI NAV - Tesla Chime icon removed -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans Zone">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music & Video">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/hourglass-origins-nav.png" data-link="origins.html" data-type="dest" data-label="Origins">
  </div>

  <!-- VIDEO TRANSITION OVERLAY -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">

      <!-- Doors -->
      <div class="hero-chimes">
        <img id="saloon-doors-back"
             src="/img/moonsaloon/saloon-doors-nav.png"
             class="doors"
             alt="Back to Moon Saloon">
      </div>

      <!-- Tesla Chime Prop -->
      <img src="/img/moonsaloon/Tesla-Chime-nav.png" id="chime-prop" class="tesla-chime-prop" alt="Tesla Chime">

      <!-- Leaner Chimes Block -->
      <div class="container">
        <div class="chime-block">
          <h2 class="text-center mb-3" style="color:#00ffcc; text-shadow:0 0 30px #00ffcc;">🔊 TESLA LOCK CHIMES</h2>
          <p class="text-center mb-4">Click ▶️ to preview • Click ↓ to download. Rename to <strong>lockchime.wav</strong>.</p>
          <div class="row g-3" id="chimes-grid"></div>
        </div>
      </div>

      <!-- Updated Referral Block -->
      <div class="referral-block" onclick="window.open('https://www.tesla.com/referral/lance680518','_blank')">
        <h4 style="margin:0 0 8px 0; font-size:1.4rem;">NEVER DRIVE AGAIN!</h4>
        <p style="margin:0; font-size:1.05rem;">Click here for discounts</p>
        <small style="display:block; margin-top:8px; opacity:0.9;">lance680518</small>
      </div>

      <!-- Secret Keyhole -->
      <div id="secret-keyhole" style="position:absolute; bottom:35px; left:40px; font-size:28px; color:#111; cursor:pointer;">(0)</div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <script>
    const chimes = [
      { name: "Crazy Arms Steel Solo", file: "sounds/LockChime.wav" },
      { name: "Star Trek Red Alert", file: "sounds/REDALERT.wav" },
      { name: "Lance Jesus in Sleep", file: "sounds/jesus.wav" },
      { name: "Multiple Ricochets", file: "sounds/multiple-ricochets.mp3" },
      { name: "Ricochet 1", file: "sounds/ricochet-1.mp3" },
      { name: "Ricochet 2", file: "sounds/ricochet-2.mp3" },
      { name: "Technology Meme", file: "sounds/technology.wav" },
      { name: "Wayputa – Call of the Gringo", file: "sounds/wayputa.wav" }
    ];

    function createChimeButton(chime) {
      const row = document.createElement('div');
      row.className = 'sound-row col-12 col-md-6';
      const playBtn = document.createElement('button');
      playBtn.className = 'sound-btn';
      playBtn.innerHTML = `▶️ ${chime.name}`;
      playBtn.onclick = () => playChime(playBtn, chime.file);

      const downloadBtn = document.createElement('a');
      downloadBtn.href = chime.file;
      downloadBtn.download = chime.file.split('/').pop();
      downloadBtn.className = 'download-btn';
      downloadBtn.innerHTML = '↓';
      downloadBtn.title = 'Download this chime';

      row.appendChild(playBtn);
      row.appendChild(downloadBtn);
      return row;
    }

    function playChime(btn, file) {
      const audio = new Audio(file);
      audio.volume = 0.5;
      audio.play();
      btn.classList.add('playing');
      setTimeout(() => btn.classList.remove('playing'), 1400);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('chimes-grid');
      chimes.forEach(chime => grid.appendChild(createChimeButton(chime)));

      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');
      const miniNav = document.getElementById('mini-nav');

      forwardVideo.src = '/video/chimes-video-transition.mp4';
      reverseVideo.src = '/video/chimes-video-reverse.mp4';

      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';

      let started = false;
      forwardVideo.oncanplaythrough = () => {
        if (started) return;
        started = true;
        forwardVideo.muted = true;
        forwardVideo.play().catch(finishTransition);
      };
      forwardVideo.onended = finishTransition;

      function finishTransition() {
        overlay.style.display = 'none';
        content.classList.add('show');
        setTimeout(() => miniNav.classList.add('show'), 800);
      }

      // Mini Nav Click Handler
      miniNav.addEventListener('click', e => {
        const img = e.target.closest('img');
        if (!img) return;
        const link = img.dataset.link;
        const type = img.dataset.type;
        if (!link) return;
        e.preventDefault();

        if (type === 'home') {
          miniNav.classList.add('bounce-out');
          setTimeout(() => {
            overlay.style.display = 'block';
            forwardVideo.style.display = 'none';
            reverseVideo.style.display = 'block';
            reverseVideo.currentTime = 0;
            reverseVideo.volume = 0.5;
            reverseVideo.play()
              .then(() => { reverseVideo.onended = () => location.href = link; })
              .catch(() => location.href = link);
          }, 580);
        } else {
          location.href = link;
        }
      });

      // Keyhole
      document.getElementById('secret-keyhole').addEventListener('click', () => {
        window.location.href = 'abc.html';
      });
    });
  </script>
</body>
</html>
