<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tesla Chimes - Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/chimes-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
      touch-action: manipulation;
    }
    .content { position: relative; z-index: 1; opacity: 0; transition: opacity 1.2s ease; }
    .content.show { opacity: 1; }
    .content-overlay {
      background: url('/img/moonsaloon/chimes-base-bg.jpg') center/cover no-repeat fixed !important; /* FALLBACK BG */
      min-height: 100vh;
      padding-top: 90px;
    }
    /* Hero – Doors only */
    .hero-chimes {
      display: flex;
      justify-content: flex-start;
      padding: 30px 0 40px;
      gap: 40px;
    }
    .hero-chimes .doors {
      width: 130px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .hero-chimes .doors:hover { transform: scale(1.08); }

    /* Tesla Chime Prop – 50% size */
    .tesla-chime-prop {
      width: 210px;
      margin: 0 auto 30px;
      display: block;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 50px #00ffcc);
    }
    .tesla-chime-prop:hover {
      transform: scale(1.12) rotate(3deg);
      filter: drop-shadow(0 0 90px #ff00aa);
    }

    /* Tight Sexy Chime Block */
    .chime-block {
      background: rgba(8,20,45,0.85);
      border: 3px solid #00ffcc;
      border-radius: 24px;
      padding: 2rem 2.5rem;
      box-shadow: 0 0 80px rgba(0,255,204,0.6),
                  inset 0 0 60px rgba(255,0,170,0.3);
      backdrop-filter: blur(14px);
      margin: -25px auto 60px;
      max-width: 1080px;
    }

    /* Sound rows with inline download */
    .sound-row {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
    }
    .sound-btn {
      background: rgba(0,0,0,0.7);
      border: 2px solid #00ffcc;
      color: #f0f0f0;
      padding: 1.1rem 1.6rem;
      border-radius: 50px;
      font-size: 1.12rem;
      transition: all 0.3s ease;
      flex-grow: 1;
      text-align: left;
    }
    .sound-btn:hover {
      background: #00ffcc;
      color: #000;
      transform: scale(1.04);
      box-shadow: 0 0 35px #00ffcc;
    }
    .sound-btn.playing {
      background: #ff00aa;
      color: #fff;
      box-shadow: 0 0 55px #ff00aa;
      animation: pulse 0.6s infinite alternate;
    }

    .download-btn {
      background: rgba(0,0,0,0.7);
      border: 2px solid #00ffcc;
      color: #00ffcc;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      transition: all 0.3s ease;
    }
    .download-btn:hover {
      background: #ff00aa;
      color: #000;
      transform: scale(1.2);
      box-shadow: 0 0 40px #ff00aa;
    }

    /* SEXY Tesla Referral Block – Top Right */
    .referral-block {
      position: absolute;
      top: 110px;
      right: 40px;
      background: linear-gradient(135deg, #00ffcc, #00ccff);
      color: #000;
      padding: 2.2rem 2.8rem;
      border-radius: 26px;
      box-shadow: 0 0 90px #00ffcc,
                  0 0 160px rgba(0,255,255,0.7);
      text-align: center;
      max-width: 300px;
      cursor: pointer;
      transition: all 0.4s ease;
      z-index: 30;
      border: 4px solid rgba(255,255,255,0.25);
    }
    .referral-block:hover {
      transform: scale(1.1) rotate(2deg);
      box-shadow: 0 0 120px #00ffcc,
                  0 0 200px rgba(0,255,255,0.9);
    }
    .referral-block .tesla-t {
      font-size: 6.2rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
      text-shadow: 0 0 25px #000;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- VIDEO TRANSITION OVERLAY -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;overflow:hidden;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <!-- Doors -->
      <div class="hero-chimes">
        <img id="saloon-doors-back"
             src="/img/moonsaloon/saloon-doors-nav.png"
             class="doors"
             alt="Back to Moon Saloon">
      </div>

      <!-- Tesla Chime Prop (50% size) -->
      <img src="/img/moonsaloon/Tesla-Chime-nav.png" id="chime-prop" class="tesla-chime-prop" alt="Tesla Chime">

      <!-- Tight Sexy Chimes Block -->
      <div class="container">
        <div class="chime-block">
          <h2 class="text-center mb-4" style="color:#00ffcc; text-shadow:0 0 40px #00ffcc;">🔊 LOCK CHIMES FOR TESLA</h2>
          <p class="text-center mb-5">Click ▶️ to preview • Click ↓ to download. Rename any file to <strong>lockchime.wav</strong> for your Tesla.</p>

          <div class="row g-3" id="chimes-grid">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- Sexy Tesla Referral Block – Top Right -->
      <div class="referral-block" onclick="window.open('https://www.tesla.com/referral/lance680518','_blank')">
        <div class="tesla-t">T</div>
        <h4>REFER A FRIEND</h4>
        <p>Get 1,000 Free Supercharger Miles<br>They get 1,000 too.</p>
        <small>lance680518</small>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <script>
    const chimes = [
      { name: "Crazy Arms Steel Solo", file: "sounds/LockChime.wav" },
      { name: "Star Trek Red Alert", file: "sounds/REDALERT.wav" },
      { name: "Lance Jesus in Sleep", file: "sounds/jesus.wav" },
      { name: "Multiple Ricochets", file: "sounds/multiple-ricochets.mp3" },
      { name: "Ricochet 1", file: "sounds/ricochet-1.mp3" },
      { name: "Ricochet 2", file: "sounds/ricochet-2.mp3" },
      { name: "Technology Meme", file: "sounds/technology.wav" },
      { name: "Wayputa – Call of the Gringo", file: "sounds/wayputa.wav" }
    ];

    function createChimeButton(chime) {
      const row = document.createElement('div');
      row.className = 'sound-row col-12 col-md-5';

      const playBtn = document.createElement('button');
      playBtn.className = 'sound-btn';
      playBtn.innerHTML = `▶️ ${chime.name}`;
      playBtn.onclick = () => playChime(playBtn, chime.file);

      const downloadBtn = document.createElement('a');
      downloadBtn.href = chime.file;
      downloadBtn.download = chime.file.split('/').pop();
      downloadBtn.className = 'download-btn';
      downloadBtn.innerHTML = '↓';
      downloadBtn.title = 'Download this chime';

      row.appendChild(playBtn);
      row.appendChild(downloadBtn);
      return row;
    }

    function playChime(btn, file) {
      const audio = new Audio(file);
      audio.volume = 0.5;
      audio.play();
      btn.classList.add('playing');
      setTimeout(() => btn.classList.remove('playing'), 1200);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('chimes-grid');
      chimes.forEach(chime => grid.appendChild(createChimeButton(chime)));

      // ROBUST MOBILE TRANSITION
      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');

      forwardVideo.src = '/video/chines-video-transition.mp4';
      reverseVideo.src = '/video/chines-video-reverse.mp4';

      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';

      let started = false;

      forwardVideo.oncanplaythrough = () => {
        if (started) return;
        started = true;
        forwardVideo.muted = true;     // MUTED for mobile autoplay
        forwardVideo.volume = 0.5;
        forwardVideo.play().catch(() => {});
      };

      // HARD SAFETY – content ALWAYS shows
      setTimeout(() => {
        if (!started) {
          started = true;
          overlay.style.display = 'none';
          content.classList.add('show');
        }
      }, 1600);

      forwardVideo.onended = () => {
        overlay.style.display = 'none';
        content.classList.add('show');
      };

      // Reverse on doors click
      document.getElementById('saloon-doors-back').addEventListener('click', (e) => {
        e.preventDefault();
        overlay.style.display = 'block';
        forwardVideo.style.display = 'none';
        reverseVideo.style.display = 'block';
        reverseVideo.currentTime = 0;
        reverseVideo.volume = 0.5;
        reverseVideo.play().catch(() => {});

        reverseVideo.onended = () => window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
