<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Tesla Chimes - Lance Woolie’s Moon Saloon</title>

  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">

  <style>
    body {
      background: url('/img/moonsaloon/chimes-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-top: 105px;
      padding-bottom: 80px;
    }

    /* MINI NAV - Left justified */
    .mini-nav {
      position: fixed;
      top: 15px;
      left: 35px;
      z-index: 10000;
      background: rgba(10, 15, 35, 0.95);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.7);
      backdrop-filter: blur(14px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-90px);
      transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .mini-nav.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .mini-nav.bounce-out {
      transition: transform 0.68s cubic-bezier(0.68, -1.4, 0.32, 2.3) !important;
      transform: translateY(-240px) scale(0.35) rotate(32deg) !important;
    }

    .mini-nav img {
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .mini-nav img:hover {
      transform: scale(1.18) translateY(-4px);
    }

    .content { 
      position: relative; 
      z-index: 1; 
      opacity: 0; 
      transition: opacity 1.2s ease; 
    }
    .content.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- MINI NAV -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans Zone">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music & Video">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/hourglass-origins-nav.png" data-link="origins.html" data-type="dest" data-label="Origins">
  </div>

  <!-- VIDEO TRANSITION -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">

      <!-- Doors -->
      <div style="padding: 20px 0 30px;">
        <img id="saloon-doors-back" src="/img/moonsaloon/saloon-doors-nav.png" style="width:130px; cursor:pointer;" alt="Back to Moon Saloon">
      </div>

      <!-- Tesla Chime Image -->
      <img src="/img/moonsaloon/Tesla-Chime-nav.png" id="chime-prop" style="width:180px; display:block; margin:0 auto 20px; cursor:pointer;" alt="Tesla Chime">

      <!-- Chimes Block -->
      <div class="container">
        <div style="background:rgba(8,20,45,0.88); border:3px solid #00ffcc; border-radius:24px; padding:1.8rem 2rem; max-width:960px; margin:0 auto 40px;">
          <h2 style="color:#00ffcc; text-align:center; margin-bottom:15px;">🔊 TESLA LOCK CHIMES</h2>
          <p style="text-align:center; margin-bottom:20px;">Click ▶️ to preview • Click ↓ to download. Rename to <strong>lockchime.wav</strong>.</p>
          <div id="chimes-grid" class="row g-3"></div>
        </div>
      </div>

      <!-- Referral -->
      <div onclick="window.open('https://www.tesla.com/referral/lance680518','_blank')" 
           style="position:absolute; top:130px; right:40px; background:linear-gradient(135deg,#00ffcc,#00ccff); color:#000; padding:1.8rem 2.2rem; border-radius:22px; text-align:center; cursor:pointer; max-width:280px;">
        <h4 style="margin:0 0 8px 0;">NEVER DRIVE AGAIN!</h4>
        <p style="margin:0;">Click here for discounts</p>
        <small style="display:block; margin-top:8px;">lance680518</small>
      </div>

      <!-- Keyhole -->
      <div id="secret-keyhole" style="position:absolute; bottom:35px; left:40px; font-size:28px; color:#111; cursor:pointer;">(0)</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <script>
    const chimes = [
      { name: "Crazy Arms Steel Solo", file: "sounds/LockChime.wav" },
      { name: "Star Trek Red Alert", file: "sounds/REDALERT.wav" },
      { name: "Lance Jesus in Sleep", file: "sounds/jesus.wav" },
      { name: "Multiple Ricochets", file: "sounds/multiple-ricochets.mp3" },
      { name: "Ricochet 1", file: "sounds/ricochet-1.mp3" },
      { name: "Ricochet 2", file: "sounds/ricochet-2.mp3" },
      { name: "Technology Meme", file: "sounds/technology.wav" },
      { name: "Wayputa – Call of the Gringo", file: "sounds/wayputa.wav" }
    ];

    function createChimeButton(chime) {
      const row = document.createElement('div');
      row.className = 'col-12 col-md-6 mb-3';
      row.innerHTML = `
        <div style="display:flex; gap:10px;">
          <button onclick="playChime(this, '${chime.file}')" style="flex:1; background:rgba(0,0,0,0.75); border:2px solid #00ffcc; color:#f0f0f0; padding:1rem; border-radius:50px;">
            ▶️ ${chime.name}
          </button>
          <a href="${chime.file}" download style="width:52px; height:52px; background:rgba(0,0,0,0.75); border:2px solid #00ffcc; color:#00ffcc; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem;">
            ↓
          </a>
        </div>
      `;
      return row;
    }

    function playChime(btn, file) {
      const audio = new Audio(file);
      audio.volume = 0.5;
      audio.play();
      btn.style.background = '#ff00aa';
      btn.style.color = '#fff';
      setTimeout(() => {
        btn.style.background = 'rgba(0,0,0,0.75)';
        btn.style.color = '#f0f0f0';
      }, 1400);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('chimes-grid');
      chimes.forEach(chime => grid.appendChild(createChimeButton(chime)));

      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');
      const miniNav = document.getElementById('mini-nav');

      forwardVideo.src = '/video/chimes-video-transition.mp4';
      reverseVideo.src = '/video/chimes-video-reverse.mp4';

      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';

      forwardVideo.onended = () => {
        overlay.style.display = 'none';
        content.classList.add('show');
        miniNav.classList.add('show');
      };

      // Fallback
      setTimeout(() => {
        if (!content.classList.contains('show')) {
          overlay.style.display = 'none';
          content.classList.add('show');
          miniNav.classList.add('show');
        }
      }, 3000);

      // Mini Nav Click
      miniNav.addEventListener('click', e => {
        const img = e.target.closest('img');
        if (!img) return;
        const link = img.dataset.link;
        const type = img.dataset.type;
        if (!link) return;
        e.preventDefault();

        if (type === 'home') {
          miniNav.classList.add('bounce-out');
          setTimeout(() => {
            overlay.style.display = 'block';
            forwardVideo.style.display = 'none';
            reverseVideo.style.display = 'block';
            reverseVideo.currentTime = 0;
            reverseVideo.volume = 0.5;
            reverseVideo.play().then(() => reverseVideo.onended = () => location.href = link)
              .catch(() => location.href = link);
          }, 580);
        } else {
          location.href = link;
        }
      });

      document.getElementById('saloon-doors-back').addEventListener('click', () => {
        miniNav.classList.add('bounce-out');
        setTimeout(() => {
          overlay.style.display = 'block';
          forwardVideo.style.display = 'none';
          reverseVideo.style.display = 'block';
          reverseVideo.currentTime = 0;
          reverseVideo.volume = 0.5;
          reverseVideo.play().then(() => reverseVideo.onended = () => location.href = 'index.html')
            .catch(() => location.href = 'index.html');
        }, 580);
      });

      document.getElementById('secret-keyhole').addEventListener('click', () => {
        window.location.href = 'abc.html';
      });
    });
  </script>
</body>
</html>
