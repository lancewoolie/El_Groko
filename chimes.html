<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music & Videos - Lance Woolie</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/music-video-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
    }
    .content {
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .content.show { opacity: 1; }
    .content-overlay {
      background: rgba(0, 15, 40, 0.18);
      min-height: 100vh;
      padding-top: 90px;
    }
    .hero-music {
      display: flex;
      justify-content: center;
      padding: 30px 0 40px;
    }
    .hero-music .doors {
      width: 130px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .hero-music .doors:hover { transform: scale(1.08); }

    .card {
      background: rgba(10, 25, 50, 0.75);
      border: 2px solid #00ffcc;
      border-radius: 16px;
      overflow: hidden;
      height: 100%;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.3),
                  inset 0 0 25px rgba(255, 0, 170, 0.15);
      transition: all 0.4s ease;
      backdrop-filter: blur(8px);
    }
    .card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.6),
                  inset 0 0 40px rgba(255, 0, 170, 0.3);
      border-color: #ff00aa;
    }
    .card h3 {
      color: #f0f0f0 !important;
      text-shadow: 0 0 15px #00ffcc;
      font-size: 1.55rem;
    }
    .card-body p {
      color: #f0f0f0 !important;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- VIDEO TRANSITION OVERLAY -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;overflow:hidden;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <div class="hero-music">
        <img id="saloon-doors-back"
             src="/img/moonsaloon/saloon-doors-nav.png"
             class="doors"
             data-link="index.html"
             data-score="100"
             data-max-hits="1"
             alt="Back to Saloon">
      </div>

      <div class="container py-5" id="music-grid">
        <div class="row g-4">
          <!-- All your music cards are here unchanged -->
          <!-- Crazy Arms, Uber, Too Drunk, Worst Enemy, Road To Texas, Country Paradise, Live Video -->
          <!-- (same as before) -->
        </div>
        <div class="text-center mt-5">
          <p class="lead">More tracks coming soon—stay tuned for bayou-fresh drops.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');

      forwardVideo.src = '/video/music-and-video-transition.mp4';
      reverseVideo.src = '/video/music-and-video-reverse.mp4';

      // Always start transition on load/refresh
      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';

      let videoStarted = false;

      // Try to play as soon as possible
      forwardVideo.oncanplaythrough = () => {
        if (videoStarted) return;
        videoStarted = true;
        forwardVideo.volume = 0.5;
        forwardVideo.play().catch(() => {});
      };

      // Strong safety net for refresh + slow mobile
      setTimeout(() => {
        if (!videoStarted) {
          videoStarted = true;
          overlay.style.display = 'none';
          content.classList.add('show');
        }
      }, 1400);   // 1.4 seconds max black screen

      forwardVideo.onended = () => {
        overlay.style.display = 'none';
        content.classList.add('show');
      };

      // Reverse transition (unchanged)
      document.getElementById('saloon-doors-back').addEventListener('click', (e) => {
        e.preventDefault();
        overlay.style.display = 'block';
        forwardVideo.style.display = 'none';
        reverseVideo.style.display = 'block';
        reverseVideo.currentTime = 0;
        reverseVideo.volume = 0.5;
        reverseVideo.play().catch(() => {});

        reverseVideo.onended = () => {
          window.location.href = 'index.html';
        };
      });
    });
  </script>
</body>
</html>
