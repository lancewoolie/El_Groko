<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Referral Hub &amp; Tesla Chimes | Lance Woolie’s Moon Saloon</title>
  <meta name="description" content="Tesla • Starlink • Music • Merch Referrals. Support the Saloon.">
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">

  <!-- 🔒 CHAINED - LOCKED - DO NOT MODIFY WITHOUT CAPTAIN APPROVAL -->
  <style>
    body { margin:0; padding:0; background:#0a0f23; }
    .content-overlay {
      background: url('/img/moonsaloon/chimes-base-bg.jpg') center/cover no-repeat fixed;
      min-height: 100vh; padding-top:105px; padding-bottom:80px;
    }
    @media (max-width:991px) {
      .content-overlay { background-attachment:scroll; background-size:130% auto; background-position:center top; }
    }

    .mini-nav {
      position:fixed; top:15px; left:35px; z-index:10000;
      background:rgba(10,15,35,0.95); border:2px solid #00ffcc; border-radius:50px;
      padding:10px 18px; display:flex; align-items:center; gap:12px;
      box-shadow:0 0 40px rgba(0,255,204,0.7); backdrop-filter:blur(14px);
      opacity:0; visibility:hidden; transform:translateY(-90px);
      transition:all 0.7s cubic-bezier(0.34,1.56,0.64,1);
    }
    .mini-nav.show { opacity:1; visibility:visible; transform:translateY(0); }
    .mini-nav.bounce-out { transition:transform 0.68s cubic-bezier(0.68,-1.4,0.32,2.3)!important; transform:translateY(-240px) scale(0.35) rotate(32deg)!important; }
    .mini-nav img { width:46px; height:46px; cursor:pointer; transition:all 0.3s ease; }
    .mini-nav img:hover { transform:scale(1.18) translateY(-4px); }

    .content { position:relative; z-index:2; opacity:0; transition:opacity 1.2s ease; }
    .content.show { opacity:1; }

    /* MAIN BLOCKS */
    .main-blocks { max-width:1200px; margin:0 auto 50px; padding:0 5%; }
    .block-row { display:flex; gap:24px; margin-bottom:30px; flex-wrap:wrap; justify-content:center; }
    .main-block {
      flex:1 1 460px; min-width:300px; background:rgba(10,15,35,0.92);
      border:3px solid; border-radius:22px; padding:1.8rem; text-align:center;
      box-shadow:0 0 50px rgba(0,255,204,0.4); transition:all 0.4s ease; cursor:pointer;
    }
    .main-block:hover { transform:translateY(-8px) scale(1.02); }
    .main-block.tesla { border-color:#ff00aa; }
    .main-block.starlink { border-color:#00ffcc; }
    .main-block.music { border-color:#ff00aa; }
    .main-block.merch { border-color:#ffd700; }

    .icon-img { width:110px; height:110px; object-fit:contain; margin-bottom:16px; border-radius:12px; }

    /* Bottom area */
    .bottom-area { max-width:1200px; margin:0 auto; padding:0 5%; display:flex; gap:24px; flex-wrap:wrap; }
    .chimes-bottom, .spacex-bottom {
      flex:1 1 400px; min-width:300px;
    }
  </style>
</head>
<body>
  <!-- 🔒 CHAINED MINI-NAV -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music &amp; Video">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/hourglass-origins-nav.png" data-link="origins.html" data-type="dest" data-label="Origins">
  </div>

  <!-- 🔒 CHAINED VIDEO TRANSITIONS -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;overflow:hidden;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">

      <div class="text-center mb-5" style="max-width:1100px;margin:0 auto;padding:0 5%;">
        <h1 style="color:#00ffcc;">🚀 MOON SALOON REFERRAL HUB</h1>
        <p style="color:#ddd;font-size:1.15rem;">Tesla • Starlink • Music • Merch</p>
      </div>

      <!-- TOP ROW: Tesla + Starlink -->
      <div class="main-blocks">
        <div class="block-row">
          <div class="main-block tesla" onclick="logAndOpenReferral('tesla','https://www.tesla.com/referral/lance680518')">
            <img src="img/moonsaloon/TESLA.jpg" class="icon-img" alt="Tesla">
            <h3 style="color:#ff00aa;">TESLA REFERRAL</h3>
            <p style="color:#ddd;">Get your FSD Tesla</p>
            <button style="background:transparent;color:#ff00aa;border:2px solid #ff00aa;padding:12px 40px;border-radius:50px;font-weight:bold;">CLAIM TESLA</button>
          </div>

          <div class="main-block starlink" onclick="logAndOpenReferral('starlink','https://starlink.com/residential?referral=RC-DF-11799209-86250-5')">
            <img src="img/moonsaloon/Starlink.jpg" class="icon-img" alt="Starlink">
            <h3 style="color:#00ffcc;">STARLINK REFERRAL</h3>
            <p style="color:#ddd;">Your personal link</p>
            <button style="background:transparent;color:#00ffcc;border:2px solid #00ffcc;padding:12px 40px;border-radius:50px;font-weight:bold;">GET STARLINK</button>
          </div>
        </div>

        <!-- SECOND ROW: Music + Merch -->
        <div class="block-row">
          <div class="main-block music" onclick="logAndNavigate('music','music.html')">
            <div style="font-size:3.5rem;margin-bottom:12px;">🎵</div>
            <h3 style="color:#ff00aa;">MUSIC</h3>
            <p style="color:#ddd;">Stream • Buy • New Album</p>
            <button style="background:transparent;color:#ff00aa;border:2px solid #ff00aa;padding:12px 40px;border-radius:50px;font-weight:bold;">ENTER MUSIC</button>
          </div>

          <div class="main-block merch" onclick="logAndNavigate('merch','merch.html')">
            <div style="font-size:3.5rem;margin-bottom:12px;">🛍️</div>
            <h3 style="color:#ffd700;">MERCH</h3>
            <p style="color:#ddd;">Vinyl • Apparel • Drops</p>
            <button style="background:transparent;color:#ffd700;border:2px solid #ffd700;padding:12px 40px;border-radius:50px;font-weight:bold;">SHOP MERCH</button>
          </div>
        </div>
      </div>

      <!-- BOTTOM AREA: Chimes + SpaceX -->
      <div class="bottom-area">
        <!-- Chimes -->
        <div class="chimes-bottom">
          <div style="background:rgba(8,18,40,0.92);border:3px solid #00ffcc;border-radius:22px;padding:1.6rem;">
            <h2 style="color:#00ffcc;text-align:center;margin-bottom:12px;">🎵 TESLA LOCK CHIMES</h2>
            <ul id="chimes-list" style="list-style:none;padding:0;margin:0;"></ul>
          </div>
        </div>

        <!-- SpaceX -->
        <div class="spacex-bottom">
          <div onclick="logAndOpenReferral('spacex','https://shop.spacex.com/')" style="height:100%;background:rgba(10,15,35,0.92);border:3px solid #ffd700;border-radius:22px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.4s ease;">
            <div style="font-size:3rem;margin-bottom:16px;">🌌</div>
            <h3 style="color:#ffd700;">OFFICIAL SPACEX STORE</h3>
            <p style="color:#ddd;">Starship gear &amp; mission merch</p>
            <button style="background:transparent;color:#ffd700;border:2px solid #ffd700;padding:14px 48px;border-radius:50px;font-weight:bold;">SHOP SPACEX</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <script>
    // Chimes list
    const chimes = [
      { name: "Crazy Arms Steel Solo", file: "sounds/LockChime.wav" },
      { name: "Star Trek Red Alert", file: "sounds/REDALERT.wav" },
      { name: "Lance Jesus in Sleep", file: "sounds/jesus.wav" },
      { name: "Multiple Ricochets", file: "sounds/multiple-ricochets.mp3" }
    ];

    function createChimeItem(chime) {
      const li = document.createElement('li');
      li.style = "display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(0,255,204,0.25);";
      li.innerHTML = `<button onclick="playSound(this,'${chime.file}')" style="background:transparent;border:2px solid #00ffcc;color:#00ffcc;width:32px;height:32px;border-radius:50%;">▶</button><span style="flex:1;color:#ddd;">${chime.name}</span><a href="${chime.file}" download style="background:transparent;border:2px solid #00ffcc;color:#00ffcc;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;">↓</a>`;
      return li;
    }

    function playSound(btn, file) {
      const audio = new Audio(file); audio.volume = 0.55; audio.play();
      const orig = btn.style.color; btn.style.color = '#ff00aa';
      setTimeout(() => btn.style.color = orig, 1400);
    }

    // Logging
    function logEvent(eventType, target = null) {
      try {
        if (typeof firebase !== 'undefined' && firebase.firestore) {
          firebase.firestore().collection('chimesReferralLogs').add({
            event: eventType, target: target, timestamp: firebase.firestore.FieldValue.serverTimestamp(), page: 'chimes.html'
          });
        }
      } catch(e) {}
    }
    function logAndOpenReferral(type, url) { logEvent('referral_click', type); window.open(url, '_blank'); }
    function logAndNavigate(target, url) { logEvent('navigation_click', target); window.location.href = url; }

    document.addEventListener('DOMContentLoaded', () => {
      // Entry sound
      const entrySound = new Audio('sounds/ScottySteel.mp3');
      entrySound.volume = 0.33;
      entrySound.play().catch(() => {});

      // Populate chimes
      const list = document.getElementById('chimes-list');
      if (list) chimes.forEach(chime => list.appendChild(createChimeItem(chime)));

      // 🔒 Transitions + Mini-nav
      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');
      const miniNav = document.getElementById('mini-nav');

      forwardVideo.src = '/video/chimes-video-transition.mp4';
      reverseVideo.src = '/video/chimes-video-reverse.mp4';
      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';
      forwardVideo.muted = true;
      forwardVideo.play().catch(() => {});

      setTimeout(() => {
        overlay.style.display = 'none';
        content.classList.add('show');
        miniNav.classList.add('show');
      }, 4800);

      miniNav.addEventListener('click', e => {
        const img = e.target.closest('img');
        if (!img) return;
        const link = img.dataset.link;
        if (!link) return;
        e.preventDefault();
        if (img.dataset.type === 'home') {
          miniNav.classList.add('bounce-out');
          setTimeout(() => {
            overlay.style.display = 'block';
            forwardVideo.style.display = 'none';
            reverseVideo.style.display = 'block';
            reverseVideo.currentTime = 0;
            reverseVideo.play().catch(() => window.location.href = link);
          }, 400);
        } else {
          logEvent('navigation_click', img.dataset.label);
          window.location.href = link;
        }
      });

      logEvent('page_view');
    });
  </script>
</body>
</html>
