<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Tesla Chimes - Lance Woolie’s Moon Saloon</title>

  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">

  <style>
    body {
      background: url('/img/moonsaloon/chimes-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-top: 105px;
      padding-bottom: 80px;
    }

    /* MINI NAV - Left justified */
    .mini-nav {
      position: fixed;
      top: 15px;
      left: 35px;
      z-index: 10000;
      background: rgba(10, 15, 35, 0.95);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.7),
                  inset 0 0 25px rgba(255, 0, 170, 0.4);
      backdrop-filter: blur(14px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-90px);
      transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .mini-nav.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .mini-nav.bounce-out {
      transition: transform 0.68s cubic-bezier(0.68, -1.4, 0.32, 2.3) !important;
      transform: translateY(-240px) scale(0.35) rotate(32deg) !important;
    }

    .mini-nav img {
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .mini-nav img:hover {
      transform: scale(1.18) translateY(-4px);
    }

    /* Sexy Chimes Layout */
    .chimes-container {
      max-width: 980px;
      margin: 0 auto;
    }

    .chime-card {
      background: rgba(8, 18, 40, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 22px;
      padding: 1.8rem 2rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 0 60px rgba(0, 255, 204, 0.5),
                  inset 0 0 40px rgba(255, 0, 170, 0.3);
      backdrop-filter: blur(16px);
    }

    .sound-row {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      align-items: center;
    }

    .sound-btn {
      flex: 1;
      background: rgba(0,0,0,0.75);
      border: 2px solid #00ffcc;
      color: #ffffff;
      padding: 1.1rem 1.6rem;
      border-radius: 50px;
      font-size: 1.08rem;
      transition: all 0.3s ease;
      text-align: left;
    }

    .sound-btn:hover {
      background: #00ffcc;
      color: #000;
      transform: scale(1.04);
    }

    .sound-btn.playing {
      background: #ff00aa;
      color: #fff;
      box-shadow: 0 0 40px #ff00aa;
    }

    .download-btn {
      width: 54px;
      height: 54px;
      background: rgba(0,0,0,0.75);
      border: 2px solid #00ffcc;
      color: #00ffcc;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      transition: all 0.3s ease;
    }

    .download-btn:hover {
      background: #ff00aa;
      color: #000;
      transform: scale(1.15);
    }

    /* Sexy Referral Button */
    .referral-box {
      position: absolute;
      top: 130px;
      right: 40px;
      background: linear-gradient(135deg, #00ffcc, #00aaff);
      color: #000;
      padding: 1.8rem 2.4rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 70px #00ffcc;
      cursor: pointer;
      transition: all 0.4s ease;
      border: 3px solid rgba(255,255,255,0.3);
    }

    .referral-box:hover {
      transform: scale(1.08);
      box-shadow: 0 0 100px #00ffcc;
    }
  </style>
</head>
<body>

  <!-- MINI NAV - Tesla Chime icon removed -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans Zone">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music & Video">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/hourglass-origins-nav.png" data-link="origins.html" data-type="dest" data-label="Origins">
  </div>

  <div class="container chimes-container">

    <!-- Lean Chimes Section -->
    <div class="chime-card">
      <h2 style="color:#00ffcc; text-align:center; margin-bottom:20px;">🔊 TESLA LOCK CHIMES</h2>
      <p style="text-align:center; margin-bottom:25px; color:#ddd;">Click ▶️ to preview • Click ↓ to download. Rename file to <strong>lockchime.wav</strong>.</p>
      
      <div id="chimes-grid" class="row g-3"></div>
    </div>

  </div>

  <!-- Sexy Referral Block -->
  <div class="referral-box" onclick="window.open('https://www.tesla.com/referral/lance680518','_blank')">
    <h4 style="margin:0 0 10px 0; font-size:1.45rem;">NEVER DRIVE AGAIN!</h4>
    <p style="margin:0 0 15px 0;">Get a Tesla with FSD today with this discount link</p>
    <button class="btn btn-dark w-100" style="font-weight:bold; padding:12px;">GET MY TESLA</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <script>
    const chimes = [
      { name: "Crazy Arms Steel Solo", file: "sounds/LockChime.wav" },
      { name: "Star Trek Red Alert", file: "sounds/REDALERT.wav" },
      { name: "Lance Jesus in Sleep", file: "sounds/jesus.wav" },
      { name: "Multiple Ricochets", file: "sounds/multiple-ricochets.mp3" },
      { name: "Ricochet 1", file: "sounds/ricochet-1.mp3" },
      { name: "Ricochet 2", file: "sounds/ricochet-2.mp3" },
      { name: "Technology Meme", file: "sounds/technology.wav" },
      { name: "Wayputa – Call of the Gringo", file: "sounds/wayputa.wav" }
    ];

    function createChimeButton(chime) {
      const div = document.createElement('div');
      div.className = 'col-12 col-md-6 mb-3';
      div.innerHTML = `
        <div style="display:flex; gap:10px; align-items:center;">
          <button onclick="playSound(this, '${chime.file}')" 
                  style="flex:1; padding:14px 18px; background:rgba(0,0,0,0.75); border:2px solid #00ffcc; color:white; border-radius:50px; font-size:1.05rem;">
            ▶️ ${chime.name}
          </button>
          <a href="${chime.file}" download 
             style="width:54px; height:54px; background:rgba(0,0,0,0.75); border:2px solid #00ffcc; color:#00ffcc; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem;">
            ↓
          </a>
        </div>
      `;
      return div;
    }

    function playSound(btn, file) {
      const audio = new Audio(file);
      audio.volume = 0.6;
      audio.play();
      btn.style.background = '#ff00aa';
      setTimeout(() => btn.style.background = 'rgba(0,0,0,0.75)', 1500);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('chimes-grid');
      chimes.forEach(chime => grid.appendChild(createChimeButton(chime)));

      const miniNav = document.getElementById('mini-nav');
      miniNav.classList.add('show');

      // Mini Nav Click
      miniNav.addEventListener('click', e => {
        const img = e.target.closest('img');
        if (!img) return;
        const link = img.dataset.link;
        const type = img.dataset.type;
        if (!link) return;
        e.preventDefault();

        if (type === 'home') {
          miniNav.classList.add('bounce-out');
          setTimeout(() => location.href = link, 650);
        } else {
          location.href = link;
        }
      });
    });
  </script>
</body>
</html>
