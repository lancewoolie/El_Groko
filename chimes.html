<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Chimes - Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/chimes-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
    }
    .content { position: relative; z-index: 1; opacity: 0; transition: opacity 1.2s ease; }
    .content.show { opacity: 1; }
    .content-overlay { background: rgba(0,15,40,0.18); min-height: 100vh; padding-top: 90px; }

    /* Hero – Doors only */
    .hero-chimes {
      display: flex;
      justify-content: flex-start;
      padding: 30px 0 50px;
      gap: 40px;
    }
    .hero-chimes .doors {
      width: 130px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .hero-chimes .doors:hover { transform: scale(1.08); }

    /* Tesla Chime Prop */
    .tesla-chime-prop {
      width: 420px;
      margin: 0 auto 40px;
      display: block;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 40px #00ffcc);
    }
    .tesla-chime-prop:hover {
      transform: scale(1.08) rotate(3deg);
      filter: drop-shadow(0 0 80px #ff00aa);
    }

    /* Main Chimes Block – raised higher */
    .chime-block {
      background: rgba(10,25,50,0.75);
      border: 3px solid #00ffcc;
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 0 60px rgba(0,255,204,0.5), inset 0 0 50px rgba(255,0,170,0.25);
      backdrop-filter: blur(12px);
      margin: -20px auto 60px;
      max-width: 1100px;
    }

    /* Sound row with inline download */
    .sound-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .sound-btn {
      background: rgba(0,0,0,0.6);
      border: 2px solid #00ffcc;
      color: #00ffcc;
      padding: 1rem 1.5rem;
      border-radius: 50px;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      flex-grow: 1;
      text-align: left;
    }
    .sound-btn:hover {
      background: #00ffcc;
      color: #000;
      transform: scale(1.05);
      box-shadow: 0 0 30px #00ffcc;
    }
    .sound-btn.playing {
      background: #ff00aa;
      color: #fff;
      box-shadow: 0 0 50px #ff00aa;
      animation: pulse 0.6s infinite alternate;
    }

    .download-btn {
      background: rgba(0,0,0,0.6);
      border: 2px solid #00ffcc;
      color: #00ffcc;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .download-btn:hover {
      background: #00ffcc;
      color: #000;
      transform: scale(1.15);
      box-shadow: 0 0 30px #00ffcc;
    }

    /* Sexy Tesla Referral Block – LEFT SIDE */
    .referral-block {
      position: absolute;
      top: 130px;
      left: 40px;
      background: linear-gradient(135deg, #00ffcc, #ff00aa);
      color: #000;
      padding: 2rem 2.5rem;
      border-radius: 24px;
      box-shadow: 0 0 80px #00ffcc, 0 0 140px rgba(255,0,170,0.7);
      text-align: center;
      max-width: 320px;
      cursor: pointer;
      transition: all 0.4s ease;
      z-index: 20;
      border: 3px solid rgba(255,255,255,0.3);
    }
    .referral-block:hover {
      transform: scale(1.12) rotate(1deg);
      box-shadow: 0 0 100px #ff00aa, 0 0 180px rgba(255,0,170,0.9);
    }
    .referral-block .tesla-t {
      font-size: 5.8rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
      text-shadow: 0 0 20px #000;
    }
  </style>
</head>
