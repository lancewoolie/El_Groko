<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Tesla Chimes - Lance Woolie’s Moon Saloon</title>

  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">

  <style>
    body {
      background: url('/img/moonsaloon/chimes-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-top: 105px;
      padding-bottom: 80px;
    }

    /* MINI NAV - Left justified */
    .mini-nav {
      position: fixed;
      top: 15px;
      left: 35px;
      z-index: 10000;
      background: rgba(10, 15, 35, 0.95);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.7);
      backdrop-filter: blur(14px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-90px);
      transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .mini-nav.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .mini-nav.bounce-out {
      transition: transform 0.68s cubic-bezier(0.68, -1.4, 0.32, 2.3) !important;
      transform: translateY(-240px) scale(0.35) rotate(32deg) !important;
    }

    .mini-nav img {
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .mini-nav img:hover {
      transform: scale(1.18) translateY(-4px);
    }

    /* Layout */
    .main-content {
      display: flex;
      gap: 50px;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* Far Left - Slim Chimes */
    .chimes-column {
      flex: 1;
      max-width: 460px;
    }

    .chimes-block {
      background: rgba(8, 18, 40, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 22px;
      padding: 1.8rem 2rem;
      box-shadow: 0 0 65px rgba(0, 255, 204, 0.5);
      backdrop-filter: blur(16px);
    }

    .sound-row {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      align-items: center;
    }

    .sound-btn {
      flex: 1;
      background: rgba(0,0,0,0.75);
      border: 2.5px solid #00ffcc;
      color: #ffffff;
      padding: 1.1rem 1.6rem;
      border-radius: 50px;
      font-size: 1.08rem;
      transition: all 0.3s ease;
    }

    .sound-btn:hover {
      background: #00ffcc;
      color: #000;
      transform: scale(1.05);
    }

    .download-btn {
      width: 54px;
      height: 54px;
      background: rgba(0,0,0,0.75);
      border: 2.5px solid #00ffcc;
      color: #00ffcc;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      transition: all 0.3s ease;
    }

    .download-btn:hover {
      background: #ff00aa;
      color: #000;
      transform: scale(1.15);
    }

    /* Right Column */
    .right-column {
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* Pink Referral */
    .referral-block {
      background: linear-gradient(135deg, #ff00aa, #ff3399);
      color: #ffffff;
      padding: 2rem 2.2rem;
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 0 70px rgba(255, 0, 170, 0.7);
      cursor: pointer;
      transition: all 0.4s ease;
    }

    .referral-block:hover {
      transform: scale(1.08);
      box-shadow: 0 0 100px rgba(255, 0, 170, 0.9);
    }

    /* Black & Gold Robo Taxi Watcher */
    .robo-watch {
      background: rgba(0, 0, 0, 0.94);
      border: 3px solid #ffd700;
      border-radius: 22px;
      padding: 2.2rem 2rem;
      box-shadow: 0 0 65px rgba(255, 215, 0, 0.6);
      text-align: center;
    }

    .robo-watch h3 {
      color: #ffd700;
      text-shadow: 0 0 25px #ffd700;
      margin-bottom: 1.8rem;
    }

    .stat-number {
      font-size: 2.8rem;
      font-weight: bold;
      margin: 8px 0;
    }

    .bay-area { color: #00ffcc; }
    .austin    { color: #ff00aa; }
    .la        { color: #00ccff; }
  </style>
</head>
<body>

  <!-- MINI NAV -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans Zone">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music & Video">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/hourglass-origins-nav.png" data-link="origins.html" data-type="dest" data-label="Origins">
  </div>

  <div class="main-content">

    <!-- FAR LEFT - Slim Chimes -->
    <div class="chimes-column">
      <div class="chimes-block">
        <h2 style="color:#00ffcc; text-align:center; margin-bottom:18px;">🔊 TESLA LOCK CHIMES</h2>
        <p style="text-align:center; margin-bottom:22px; color:#ddd;">Click ▶️ to preview • Click ↓ to download.<br>Rename to <strong>lockchime.wav</strong>.</p>
        
        <div id="chimes-grid" class="row g-3"></div>
      </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="right-column">

      <!-- Pink Referral -->
      <div class="referral-block" onclick="window.open('https://www.tesla.com/referral/lance680518','_blank')">
        <h3 style="margin:0 0 12px 0;">NEVER DRIVE AGAIN!</h3>
        <p style="margin:0 0 18px 0; font-size:1.12rem;">Get a Tesla with FSD today with this discount link</p>
        <button style="background:#000; color:#ff00aa; border:none; padding:14px 44px; border-radius:50px; font-weight:bold;">GET MY TESLA</button>
      </div>

      <!-- Black & Gold Robo Taxi Watcher -->
      <div class="robo-watch">
        <h3>LIVE ROBO TAXI WATCHER</h3>
        <div class="row text-center mb-4">
          <div class="col-6">
            <div class="stat-number bay-area">168</div>
            <div class="city-label">Bay Area</div>
          </div>
          <div class="col-6">
            <div class="stat-number austin">72</div>
            <div class="city-label">Austin</div>
          </div>
        </div>
        <div class="row text-center">
          <div class="col-12">
            <div class="stat-number la" style="font-size:2.4rem;">72</div>
            <div class="city-label">Los Angeles (Testing)</div>
          </div>
        </div>
        <div style="margin-top:25px; font-size:1.4rem; color:#ffd700;">
          TOTAL FSD MILES: <span style="color:#ffffff;">~2.8 Billion</span>
        </div>
        <small style="display:block; margin-top:18px; opacity:0.7;">Verified April 2026</small>
      </div>

    </div>
  </div>

  <!-- Secret Dot -->
  <div class="secret-dot" onclick="window.location.href='abc.html'" style="position:absolute; bottom:80px; left:80px; width:8px; height:8px; background:#ffffff; border-radius:50%; opacity:0.15; cursor:pointer;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <script>
    const chimes = [
      { name: "Crazy Arms Steel Solo", file: "sounds/LockChime.wav" },
      { name: "Star Trek Red Alert", file: "sounds/REDALERT.wav" },
      { name: "Lance Jesus in Sleep", file: "sounds/jesus.wav" },
      { name: "Multiple Ricochets", file: "sounds/multiple-ricochets.mp3" },
      { name: "Ricochet 1", file: "sounds/ricochet-1.mp3" },
      { name: "Ricochet 2", file: "sounds/ricochet-2.mp3" },
      { name: "Technology Meme", file: "sounds/technology.wav" },
      { name: "Wayputa – Call of the Gringo", file: "sounds/wayputa.wav" }
    ];

    function createChimeButton(chime) {
      const div = document.createElement('div');
      div.className = 'col-12 mb-3';
      div.innerHTML = `
        <div style="display:flex; gap:12px; align-items:center;">
          <button onclick="playSound(this, '${chime.file}')" 
                  style="flex:1; padding:16px 20px; background:rgba(0,0,0,0.75); border:2.5px solid #00ffcc; color:white; border-radius:50px; font-size:1.08rem; text-align:left;">
            ▶️ ${chime.name}
          </button>
          <a href="${chime.file}" download 
             style="min-width:56px; height:56px; background:rgba(0,0,0,0.75); border:2.5px solid #00ffcc; color:#00ffcc; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.7rem;">
            ↓
          </a>
        </div>
      `;
      return div;
    }

    function playSound(btn, file) {
      const audio = new Audio(file);
      audio.volume = 0.6;
      audio.play();
      btn.style.background = '#ff00aa';
      setTimeout(() => btn.style.background = 'rgba(0,0,0,0.75)', 1500);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('chimes-grid');
      chimes.forEach(chime => grid.appendChild(createChimeButton(chime)));

      const miniNav = document.getElementById('mini-nav');
      miniNav.classList.add('show');

      miniNav.addEventListener('click', e => {
        const img = e.target.closest('img');
        if (!img) return;
        const link = img.dataset.link;
        const type = img.dataset.type;
        if (!link) return;
        e.preventDefault();

        if (type === 'home') {
          miniNav.classList.add('bounce-out');
          setTimeout(() => location.href = link, 650);
        } else {
          location.href = link;
        }
      });
    });
  </script>
</body>
</html>
