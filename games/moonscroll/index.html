<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Scroll</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #0a0a1f; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
        }
        #game-container {
            border: 6px solid #00ffff;
            box-shadow: 0 0 40px #ff00ff, 0 0 80px #00ffff;
            border-radius: 12px;
            margin: 20px auto;
            display: block;
        }
        h1 {
            color: #00ffff;
            text-shadow: 0 0 20px #ff00ff;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🌕 MOON SCROLL 🌕</h1>
    <div id="game-container"></div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1000,
            height: 700,
            parent: 'game-container',
            backgroundColor: '#0a0a1f',
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        let game = new Phaser.Game(config);

        let player, cursors, lasers, obstacles, scoreText, score = 0;
        let bg1, bg2; // parallax layers

        function preload() {
            // Placeholder assets - replace these URLs later with your own images in /assets/
            this.load.image('cyberbeast', 'https://i.imgur.com/8zqZf0J.png'); // replace with top-down Cyberbeast
            this.load.image('moonSurface', 'https://i.imgur.com/3XzK9pL.jpg'); // lunar texture
            this.load.image('laser', 'https://i.imgur.com/0XwZf0J.png');       // neon laser
            this.load.image('obstacle', 'https://i.imgur.com/5fQjK8p.png');    // whiskey bottle / satellite placeholder
        }

        function create() {
            // Parallax scrolling backgrounds
            bg1 = this.add.tileSprite(500, 350, 1000, 700, 'moonSurface').setAlpha(0.8);
            bg2 = this.add.tileSprite(500, 350, 1000, 700, 'moonSurface').setAlpha(0.4).setScale(1.5);

            // Player - Gangstalaid Tesla Cyberbeast (bottom center)
            player = this.physics.add.sprite(500, 550, 'cyberbeast');
            player.setCollideWorldBounds(true);
            player.setScale(0.8);

            // Lasers group
            lasers = this.physics.add.group({
                defaultKey: 'laser',
                maxSize: 30
            });

            // Obstacles group
            obstacles = this.physics.add.group();

            // Score
            scoreText = this.add.text(20, 20, 'SCORE: 000000', {
                fontSize: '28px',
                color: '#00ffff',
                stroke: '#ff00ff',
                strokeThickness: 4
            });

            // Input
            cursors = this.input.keyboard.createCursorKeys();
            this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

            // Spawn obstacles
            this.time.addEvent({
                delay: 800,
                callback: spawnObstacle,
                callbackScope: this,
                loop: true
            });

            // Collisions
            this.physics.add.collider(lasers, obstacles, hitObstacle, null, this);
            this.physics.add.collider(player, obstacles, gameOver, null, this);

            // Click to shoot (mobile friendly)
            this.input.on('pointerdown', shootLaser, this);
        }

        function update() {
            // Background scroll (forward scroller feel)
            bg1.tilePositionY -= 4;
            bg2.tilePositionY -= 2;

            // Player movement (strafe left/right)
            player.setVelocityX(0);
            if (cursors.left.isDown || this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A).isDown) {
                player.setVelocityX(-300);
            } else if (cursors.right.isDown || this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D).isDown) {
                player.setVelocityX(300);
            }

            // Auto fire or hold space
            if (Phaser.Input.Keyboard.JustDown(this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE))) {
                shootLaser.call(this);
            }

            // Clean up off-screen objects
            lasers.getChildren().forEach(laser => {
                if (laser.y < 0) laser.destroy();
            });
            obstacles.getChildren().forEach(obs => {
                if (obs.y > 750) obs.destroy();
            });

            score += 1;
            scoreText.setText('SCORE: ' + String(Math.floor(score)).padStart(6, '0'));
        }

        function shootLaser() {
            const laser = lasers.get(player.x, player.y - 40);
            if (laser) {
                laser.setActive(true);
                laser.setVisible(true);
                laser.setVelocityY(-800);
                laser.setScale(0.6);
                laser.setTint(0x00ffff); // neon cyan
            }
        }

        function spawnObstacle() {
            const x = Phaser.Math.Between(100, 900);
            const obs = obstacles.create(x, -50, 'obstacle');
            obs.setVelocityY(300 + Math.random() * 150);
            obs.setScale(0.7 + Math.random() * 0.6);
            obs.setTint(Phaser.Display.Color.RandomRGB(100, 255).color);
        }

        function hitObstacle(laser, obstacle) {
            laser.destroy();
            obstacle.destroy();
            // Simple explosion effect
            this.add.particles(obstacle.x, obstacle.y, 'laser', {
                speed: { min: 50, max: 150 },
                scale: { start: 0.6, end: 0 },
                lifespan: 600,
                quantity: 15,
                tint: 0xff00ff
            });
            score += 100;
        }

        function gameOver() {
            this.scene.pause();
            const gameOverText = this.add.text(500, 300, 'CRASHED ON THE MOON\n\nPress R to Restart', {
                fontSize: '48px',
                color: '#ff00ff',
                align: 'center'
            }).setOrigin(0.5);
            this.input.keyboard.once('keydown-R', () => location.reload());
        }
    </script>
</body>
</html>
