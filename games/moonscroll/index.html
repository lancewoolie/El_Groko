<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Scroll</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background: #0a0a1f; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }
        h1 {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
            font-size: 2.5rem;
            z-index: 10;
            margin: 0;
            pointer-events: none;
        }
        button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            border: 3px solid #00ffff;
            font-size: 18px;
            cursor: pointer;
            z-index: 20;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>🌕 MOON SCROLL 🌕</h1>
    <button id="fullscreen-btn">GO FULLSCREEN</button>
    <div id="game-container"></div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1200,
            height: 800,
            parent: 'game-container',
            backgroundColor: '#0a0a1f',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        let game = new Phaser.Game(config);

        let player, cursors, lasers, obstacles, scoreText, score = 0;
        let bg1, bg2;

        function preload() {
            this.load.image('cyberbeast', 'https://i.imgur.com/8zqZf0J.png');
            this.load.image('moonSurface', 'https://i.imgur.com/3XzK9pL.jpg');
            this.load.image('laser', 'https://i.imgur.com/0XwZf0J.png');
            this.load.image('obstacle', 'https://i.imgur.com/5fQjK8p.png');
        }

        function create() {
            bg1 = this.add.tileSprite(600, 400, 1200, 800, 'moonSurface').setAlpha(0.85);
            bg2 = this.add.tileSprite(600, 400, 1200, 800, 'moonSurface').setAlpha(0.4).setScale(1.6);

            player = this.physics.add.sprite(600, 650, 'cyberbeast');
            player.setCollideWorldBounds(true);
            player.setScale(0.85);

            lasers = this.physics.add.group({ defaultKey: 'laser', maxSize: 40 });
            obstacles = this.physics.add.group();

            scoreText = this.add.text(30, 30, 'SCORE: 000000', {
                fontSize: '32px',
                color: '#00ffff',
                stroke: '#ff00ff',
                strokeThickness: 6
            });

            cursors = this.input.keyboard.createCursorKeys();

            this.time.addEvent({ delay: 700, callback: spawnObstacle, callbackScope: this, loop: true });

            this.physics.add.collider(lasers, obstacles, hitObstacle, null, this);
            this.physics.add.collider(player, obstacles, gameOver, null, this);

            this.input.on('pointerdown', shootLaser, this);

            // Fullscreen button
            document.getElementById('fullscreen-btn').addEventListener('click', () => {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            });
        }

        function update() {
            bg1.tilePositionY -= 5;
            bg2.tilePositionY -= 2.5;

            player.setVelocityX(0);
            if (cursors.left.isDown || this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A).isDown) player.setVelocityX(-380);
            if (cursors.right.isDown || this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D).isDown) player.setVelocityX(380);

            if (Phaser.Input.Keyboard.JustDown(this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE))) {
                shootLaser.call(this);
            }

            lasers.getChildren().forEach(l => { if (l.y < 0) l.destroy(); });
            obstacles.getChildren().forEach(o => { if (o.y > 850) o.destroy(); });

            score += 1;
            scoreText.setText('SCORE: ' + String(Math.floor(score)).padStart(6, '0'));
        }

        function shootLaser() {
            const laser = lasers.get(player.x, player.y - 50);
            if (laser) {
                laser.setActive(true).setVisible(true);
                laser.setVelocityY(-900);
                laser.setScale(0.7);
                laser.setTint(0x00ffff);
            }
        }

        function spawnObstacle() {
            const x = Phaser.Math.Between(80, 1120);
            const obs = obstacles.create(x, -60, 'obstacle');
            obs.setVelocityY(280 + Math.random() * 180);
            obs.setScale(0.6 + Math.random() * 0.7);
            obs.setTint(Phaser.Display.Color.RandomRGB(80, 255).color);
        }

        function hitObstacle(laser, obstacle) {
            laser.destroy();
            obstacle.destroy();
            this.add.particles(obstacle.x, obstacle.y, 'laser', {
                speed: { min: 60, max: 180 },
                scale: { start: 0.8, end: 0 },
                lifespan: 700,
                quantity: 20,
                tint: 0xff00ff
            });
            score += 150;
        }

        function gameOver() {
            this.scene.pause();
            this.add.text(600, 350, 'CRASHED!\n\nPress R to Restart', {
                fontSize: '52px',
                color: '#ff00ff',
                align: 'center'
            }).setOrigin(0.5);
            this.input.keyboard.once('keydown-R', () => location.reload());
        }
    </script>
</body>
</html>
