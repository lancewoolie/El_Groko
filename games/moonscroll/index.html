<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Scroll</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0a0a1f; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        h1 { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: #00ffff; text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff; font-size: 2.5rem; z-index: 10; margin: 0; pointer-events: none; }
        button { position: absolute; top: 20px; right: 20px; padding: 12px 24px; background: rgba(0, 255, 255, 0.2); color: #00ffff; border: 3px solid #00ffff; font-size: 18px; cursor: pointer; z-index: 20; border-radius: 8px; }
        #score, #highscore { position: absolute; top: 20px; color: #00ffff; font-size: 32px; z-index: 20; text-shadow: 0 0 10px #ff00ff; }
        #score { left: 30px; }
        #highscore { right: 30px; }
    </style>
</head>
<body>
    <h1>🌕 MOON SCROLL 🌕</h1>
    <div id="score">SCORE: 000000</div>
    <div id="highscore">HIGH: 000000</div>
    <button id="fullscreen-btn">GO FULLSCREEN</button>
    <div id="game-container"></div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1200,
            height: 800,
            parent: 'game-container',
            backgroundColor: '#0a0a1f',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        let game = new Phaser.Game(config);
        let player, cursors, lasers, obstacles, turrets, turretBullets, pickups, powerups;
        let score = 0, highScore = 0;
        let scoreText, highScoreText, comboText;
        let bg1, bg2;
        let combo = 0, lastKillTime = 0;
        let tripleShot = false, tripleTimer = 0;
        let gameOverText = null;

        function loadHighScore() {
            const saved = localStorage.getItem('moonscroll_highscore');
            if (saved) highScore = parseInt(saved);
        }

        function saveHighScore(newScore) {
            if (newScore > highScore) {
                highScore = newScore;
                localStorage.setItem('moonscroll_highscore', highScore);
                highScoreText.setText('HIGH: ' + String(highScore).padStart(6, '0'));
            }
        }

        function preload() {
            this.load.image('cyberbeast', 'https://i.imgur.com/8zqZf0J.png');
            this.load.image('moonSurface', 'https://i.imgur.com/3XzK9pL.jpg');
            this.load.image('laser', 'https://i.imgur.com/0XwZf0J.png');
            this.load.image('obstacle', 'https://i.imgur.com/5fQjK8p.png');
            this.load.image('pickup', 'https://i.imgur.com/0XwZf0J.png');
            this.load.image('powerup', 'https://i.imgur.com/0XwZf0J.png');
            this.load.image('turret', 'https://i.imgur.com/5fQjK8p.png'); // reuse for now
        }

        function create() {
            loadHighScore();

            bg1 = this.add.tileSprite(600, 400, 1200, 800, 'moonSurface').setAlpha(0.85);
            bg2 = this.add.tileSprite(600, 400, 1200, 800, 'moonSurface').setAlpha(0.4).setScale(1.6);

            player = this.physics.add.sprite(600, 650, 'cyberbeast');
            player.setCollideWorldBounds(true);
            player.setScale(0.85);
            player.setDrag(400);

            lasers = this.physics.add.group({ defaultKey: 'laser', maxSize: 60 });
            obstacles = this.physics.add.group();      // moving Moonbugs
            turrets = this.physics.add.group();        // stationary turrets
            turretBullets = this.physics.add.group();  // slow turret shots
            pickups = this.physics.add.group();
            powerups = this.physics.add.group();

            scoreText = this.add.text(30, 20, 'SCORE: 000000', { fontSize: '32px', color: '#00ffff', stroke: '#ff00ff', strokeThickness: 6 }).setScrollFactor(0);
            highScoreText = this.add.text(750, 20, 'HIGH: ' + String(highScore).padStart(6, '0'), { fontSize: '32px', color: '#ff00ff', stroke: '#00ffff', strokeThickness: 4 }).setScrollFactor(0);

            comboText = this.add.text(600, 120, '', { fontSize: '58px', color: '#ffff00', stroke: '#ff00ff', strokeThickness: 12 }).setOrigin(0.5).setScrollFactor(0).setAlpha(0);

            cursors = this.input.keyboard.createCursorKeys();

            // Spawners
            this.time.addEvent({ delay: 850, callback: spawnMoonbug, callbackScope: this, loop: true });
            this.time.addEvent({ delay: 9000, callback: spawnLineSwarm, callbackScope: this, loop: true });
            this.time.addEvent({ delay: 14000, callback: spawnTurret, callbackScope: this, loop: true });
            this.time.addEvent({ delay: 12000, callback: spawnPowerup, callbackScope: this, loop: true });

            // Collisions
            this.physics.add.collider(lasers, obstacles, hitMoonbug, null, this);
            this.physics.add.collider(lasers, turrets, hitTurret, null, this);
            this.physics.add.collider(player, turretBullets, hitByTurret, null, this);
            this.physics.add.overlap(player, pickups, collectPickup, null, this);
            this.physics.add.overlap(player, powerups, collectPowerup, null, this);
            this.physics.add.collider(player, obstacles, triggerGameOver, null, this);
            this.physics.add.collider(player, turrets, triggerGameOver, null, this);

            this.input.on('pointerdown', shootLaser, this);

            document.getElementById('fullscreen-btn').addEventListener('click', () => document.documentElement.requestFullscreen());
        }

        function update() {
            bg1.tilePositionY -= 2.5;
            bg2.tilePositionY -= 1.2;

            const speed = 380;
            player.setVelocity(0);

            if (cursors.left.isDown  || this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A).isDown) player.body.velocity.x -= speed;
            if (cursors.right.isDown || this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D).isDown) player.body.velocity.x += speed;
            if (cursors.up.isDown    || this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W).isDown) player.body.velocity.y -= speed;
            if (cursors.down.isDown  || this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S).isDown) player.body.velocity.y += speed;

            if (Phaser.Input.Keyboard.JustDown(this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE))) shootLaser.call(this);

            if (tripleTimer > 0) {
                tripleTimer -= 1/60;
                if (tripleTimer <= 0) tripleShot = false;
            }

            // Cleanup
            lasers.getChildren().forEach(l => { if (l.y < 0) l.destroy(); });
            turretBullets.getChildren().forEach(b => { if (b.y > 850) b.destroy(); });
            obstacles.getChildren().forEach(o => { if (o.y > 850) o.destroy(); });
            turrets.getChildren().forEach(t => { if (t.y > 850) t.destroy(); });
            pickups.getChildren().forEach(p => { if (p.y > 850) p.destroy(); });
            powerups.getChildren().forEach(p => { if (p.y > 850) p.destroy(); });

            score += 0.8;
            scoreText.setText('SCORE: ' + String(Math.floor(score)).padStart(6, '0'));
        }

        function shootLaser() {
            const baseY = player.y - 50;
            if (tripleShot) {
                lasers.get(player.x - 25, baseY)?.setActive(true).setVisible(true).setVelocity(-180, -920).setScale(0.25).setTint(0x00ffff);
                lasers.get(player.x, baseY)?.setActive(true).setVisible(true).setVelocityY(-950).setScale(0.25).setTint(0x00ffff);
                lasers.get(player.x + 25, baseY)?.setActive(true).setVisible(true).setVelocity(180, -920).setScale(0.25).setTint(0x00ffff);
            } else {
                const laser = lasers.get(player.x, baseY);
                if (laser) laser.setActive(true).setVisible(true).setVelocityY(-950).setScale(0.25).setTint(0x00ffff);
            }
        }

        function spawnMoonbug() {
            const x = Phaser.Math.Between(120, 1080);
            const roll = Phaser.Math.Between(1, 100);
            let bug = obstacles.create(x, -80, 'obstacle');

            if (roll <= 45) { // Small – fast straight + tiny wiggle
                bug.setScale(0.45).setTint(0x00ff88).setData('reward', 200).setData('type', 'small');
                bug.setVelocityY(220);
                this.tweens.add({ targets: bug, x: x + 60, duration: 380, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
            } else if (roll <= 80) { // Medium – straight down (no wiggle)
                bug.setScale(0.7).setTint(0xffaa00).setData('reward', 500).setData('type', 'medium');
                bug.setVelocityY(155);
            } else { // LARGE Elite – slow big slow wiggle (easier to hit now)
                bug.setScale(1.05).setTint(0xff0088).setData('reward', 1200).setData('type', 'large');
                bug.setVelocityY(95);
                this.tweens.add({ targets: bug, x: x + 180, duration: 1400, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
            }
        }

        function spawnLineSwarm() {
            const startX = Phaser.Math.Between(180, 820);
            for (let i = 0; i < 5; i++) {
                const bug = obstacles.create(startX + i * 65, -60 - i * 25, 'obstacle');
                bug.setScale(0.65).setTint(0xffaa00).setData('reward', 550).setData('type', 'swarm');
                bug.setVelocityY(180);
            }
        }

        function spawnTurret() {
            const x = Phaser.Math.Between(120, 1080);
            const turret = turrets.create(x, -80, 'turret');
            turret.setScale(0.9).setTint(0x8800ff).setData('reward', 2000);
            turret.setVelocityY(45); // very slow "landscape" movement

            // Turret shoots every 2.2 seconds
            this.time.addEvent({
                delay: 2200,
                callback: () => {
                    if (turret.active) {
                        const bullet = turretBullets.create(turret.x, turret.y + 30, 'laser');
                        bullet.setScale(0.4).setTint(0xff0000).setVelocityY(280);
                    }
                },
                callbackScope: this,
                loop: true
            });
        }

        function hitMoonbug(laser, bug) {
            const x = bug.x, y = bug.y;
            const baseReward = bug.getData('reward') || 300;
            const now = Date.now();
            if (now - lastKillTime < 750) combo++; else combo = 1;
            lastKillTime = now;

            const finalReward = Math.floor(baseReward * combo);

            laser.destroy();
            bug.destroy();

            // Points on kill
            const pointsText = this.add.text(x, y - 45, '+' + finalReward, { fontSize: '42px', color: '#00ffff', stroke: '#ffff00', strokeThickness: 10 }).setOrigin(0.5);
            this.tweens.add({ targets: pointsText, alpha: 0, y: y - 130, duration: 1100 });

            // Combo FX
            if (combo > 1) {
                comboText.setText(combo + 'x MOON CHAIN!');
                comboText.setAlpha(1).setScale(1.6);
                this.tweens.add({ targets: comboText, alpha: 0, scale: 1, y: 80, duration: 1600 });
            }

            this.add.particles(x, y, 'laser', { speed: {min:80,max:230}, scale:{start:1,end:0}, lifespan:900, quantity:30, tint:0xff00ff });

            const pickup = pickups.create(x, y, 'pickup');
            pickup.setVelocityY(75).setScale(0.9).setTint(0x00ffff).setData('value', finalReward);
        }

        function hitTurret(laser, turret) {
            const x = turret.x, y = turret.y;
            laser.destroy();
            turret.destroy();

            this.add.particles(x, y, 'laser', { speed: {min:100,max:260}, scale:{start:1.2,end:0}, lifespan:1000, quantity:35, tint:0xff00ff });

            const pickup = pickups.create(x, y, 'pickup');
            pickup.setVelocityY(60).setScale(1.1).setTint(0x00ffff).setData('value', 2000);
        }

        function hitByTurret(player, bullet) {
            bullet.destroy();
            triggerGameOver.call(this);
        }

        function collectPickup(player, pickup) {
            const value = pickup.getData('value') || 300;
            pickup.destroy();
            score += value;
        }

        function collectPowerup(player, powerup) {
            powerup.destroy();
            tripleShot = true; tripleTimer = 10;
            const txt = this.add.text(600, 220, 'TRIPLE SHOT!', {fontSize:'52px', color:'#ffff00', stroke:'#ff00ff', strokeThickness:12}).setOrigin(0.5).setScrollFactor(0);
            this.tweens.add({targets:txt, alpha:0, y:140, duration:2400});
        }

        function triggerGameOver() {
            this.scene.pause();
            saveHighScore(Math.floor(score));

            gameOverText = this.add.text(600, 300, 'CRASHED ON THE MOON!\nFINAL SCORE: ' + Math.floor(score) +
                '\n\nPRESS R TO RESTART', {
                fontSize: '48px', color: '#ff00ff', align: 'center', stroke: '#000000', strokeThickness: 10
            }).setOrigin(0.5).setScrollFactor(0);

            // FIXED R restart - uses scene.restart() for clean reset
            const restartKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.R);
            restartKey.once('down', () => {
                this.scene.restart();
            });
        }

        window.onload = () => {
            const hs = document.getElementById('highscore');
            const saved = localStorage.getItem('moonscroll_highscore');
            if (saved) hs.textContent = 'HIGH: ' + String(saved).padStart(6, '0');
        };
    </script>
</body>
</html>
