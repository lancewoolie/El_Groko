<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Scroll</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        body { margin:0; padding:0; background:#0a0a1f; overflow:hidden; font-family:'Courier New', monospace; }
        #game { width:100vw; height:100vh; }
        h1 { position:absolute; top:15px; left:50%; transform:translateX(-50%); color:#00ffff; text-shadow:0 0 30px #ff00ff; font-size:2.8rem; z-index:10; }
    </style>
</head>
<body>
    <h1>🌕 MOON SCROLL 🌕</h1>
    <div id="game"></div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1200,
            height: 800,
            parent: 'game',
            backgroundColor: '#0a0a1f',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);

        let player, cursors, lasers, obstacles, score = 0;
        let scoreText, comboText;
        let combo = 0, lastKillTime = 0;
        let shake = 0;

        function create() {
            // Background
            this.add.rectangle(600, 400, 1200, 800, 0x0a0a1f);

            // Cyberbeast - facing back to front (top-down)
            player = this.add.text(600, 650, '[X]', { fontSize: '90px' }).setOrigin(0.5);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            player.body.setDrag(800);

            lasers = this.physics.add.group();
            obstacles = this.physics.add.group();

            scoreText = this.add.text(30, 20, 'SCORE: 000000', { fontSize: '36px', color: '#00ffff', stroke: '#ff00ff', strokeThickness: 8 });
            comboText = this.add.text(600, 100, '', { fontSize: '70px', color: '#ffff00', stroke: '#ff00ff', strokeThickness: 12 }).setOrigin(0.5).setAlpha(0);

            cursors = this.input.keyboard.createCursorKeys();

            this.time.addEvent({ delay: 1400, callback: spawnBot, callbackScope: this, loop: true });

            this.physics.add.collider(lasers, obstacles, hitBot, null, this);
            this.physics.add.collider(player, obstacles, () => this.scene.restart());

            // Mouse movement
            this.input.on('pointermove', p => this.physics.moveTo(player, p.worldX, p.worldY, 550));

            // Click controls
            this.input.on('pointerdown', (pointer) => {
                if (pointer.leftButtonDown()) shootNormal.call(this);
                if (pointer.rightButtonDown()) shootSpread.call(this);
            });
        }

        function update() {
            if (shake > 0) {
                this.cameras.main.shake(50, shake);
                shake *= 0.9;
            }

            // Keyboard backup
            if (cursors.left.isDown) player.body.velocity.x = -400;
            if (cursors.right.isDown) player.body.velocity.x = 400;
            if (cursors.up.isDown) player.body.velocity.y = -400;
            if (cursors.down.isDown) player.body.velocity.y = 400;

            if (Phaser.Input.Keyboard.JustDown(this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE))) shootNormal.call(this);

            lasers.getChildren().forEach(l => { if (l.y < 0) l.destroy(); });
            obstacles.getChildren().forEach(o => { if (o.y > 850) o.destroy(); });

            score += 1;
            scoreText.setText('SCORE: ' + String(Math.floor(score)).padStart(6, '0'));
        }

            const laser = lasers.create(player.x, player.y - 70, '__MISSING');
            laser.setVelocityY(-110
