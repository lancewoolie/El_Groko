<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contact — Lance Woolie’s Moon Saloon</title>
  <meta name="description" content="Get in touch with Lance Woolie’s Moon Saloon. Booking, inquiries, and general bayou vibes.">
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">

  <style>
    body {
      background: url('/img/moonsaloon/contact-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-top: 90px;
      padding-bottom: 80px;
      touch-action: manipulation;
    }

    /* MINI NAV */
    .mini-nav {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      background: rgba(10, 15, 35, 0.95);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.7);
      backdrop-filter: blur(14px);
      opacity: 0;
      visibility: hidden;
      transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @media (min-width: 992px) {
      .mini-nav { left: 35px; transform: none; }
    }
    .mini-nav.show { opacity: 1; visibility: visible; }
    .mini-nav.bounce-out {
      transition: transform 0.68s cubic-bezier(0.68, -1.4, 0.32, 2.3) !important;
      transform: translate(-50%, -240px) scale(0.35) rotate(32deg) !important;
    }
    .mini-nav img {
      width: 42px;
      height: 42px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .content.show { opacity: 1; }

    /* Sexy forms */
    .sexy-card {
      background: rgba(8, 18, 40, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 24px;
      padding: 2rem 1.8rem;
      box-shadow: 0 0 60px rgba(0, 255, 204, 0.5);
      backdrop-filter: blur(16px);
    }
    .form-label { color: #ffffff !important; font-weight: bold; }
    .form-control {
      background: rgba(0,0,0,0.75) !important;
      border: 2.5px solid #00ffcc;
      color: #ffffff;
      border-radius: 14px;
    }
    .form-control::placeholder { color: #f0f0f0 !important; }
    .btn-gold {
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      padding: 15px 32px;
    }
  </style>
</head>
<body>

  <!-- MINI NAV -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans Zone">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music & Video">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/hourglass-origins-nav.png" data-link="origins.html" data-type="dest" data-label="Origins">
  </div>

  <!-- TRANSITION OVERLAY -->
  <div id="transition-overlay">
    <video id="forward-video" class="transition-video" playsinline preload="auto"></video>
    <video id="reverse-video" class="transition-video" playsinline preload="auto" style="display:none;"></video>
  </div>

  <div class="content" id="main-content">
    <div class="container py-5">

      <!-- Newsletter -->
      <div class="sexy-card mb-5">
        <form id="newsletter-form" class="row g-3 justify-content-center">
          <div class="col-md-7">
            <input type="email" class="form-control" id="signup-email" placeholder="somebody@example.com" required>
          </div>
          <div class="col-md-5">
            <button type="submit" class="btn btn-gold w-100">Do it. Sign Up</button>
          </div>
        </form>
        <div id="newsletter-success" class="success-message">You're in — exclusive twang incoming!</div>
      </div>

      <!-- Booking Agents -->
      <div class="row g-4 mb-5">
        <div class="col-md-6">
          <div class="sexy-card text-center h-100">
            <img src="/img/MARATHON.png" alt="Marathon" style="height:140px; object-fit:contain; padding:15px;">
            <h5 class="mt-2">Artist Management</h5>
            <p>Marathon Music Group</p>
            <a href="https://marathonmusicgroup.com/" class="btn btn-outline-light mt-2" target="_blank">Visit Site</a>
          </div>
        </div>
        <div class="col-md-6">
          <div class="sexy-card text-center h-100">
            <img src="/img/Gilligan Music Group - FULL COLOR.jpg" alt="Gilligan" style="height:140px; object-fit:contain; padding:15px;">
            <h5 class="mt-2">Radio Promotion</h5>
            <p>David Gilligan</p>
            <a href="mailto:david@gilliganpromotions.com" class="btn btn-outline-light mt-2">Email David</a>
          </div>
        </div>
      </div>

      <!-- General Inquiries -->
      <div class="sexy-card">
        <form id="contact-form">
          <div class="mb-4">
            <label for="name" class="form-label">Your Name</label>
            <input type="text" class="form-control" id="name" placeholder="What's your name?" required>
          </div>
          <div class="mb-4">
            <label for="email" class="form-label">Your Email</label>
            <input type="email" class="form-control" id="email" placeholder="somebody@example.com" required>
          </div>
          <div class="mb-4">
            <label for="message" class="form-label">Your Message</label>
            <textarea class="form-control" id="message" rows="6" placeholder="Say something..." required></textarea>
          </div>
          <button type="submit" class="btn btn-gold w-100">Send Message</button>
          <div id="contact-success" class="success-message"></div>
          <div id="contact-error" class="error-message"></div>
        </form>
      </div>

      <!-- Social -->
      <div class="text-center mt-5">
        <h5>Follow & Connect</h5>
        <p>
          YouTube: <a href="https://www.youtube.com/channel/UC9NUm7_BejCwctJ9u6dps7g" target="_blank">Lance Woolie</a><br>
          Facebook: <a href="https://www.facebook.com/lancewooliemusic/" target="_blank">@lancewooliemusic</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <!-- Firebase + EmailJS -->
  <script type="module">

    import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    const firebaseConfig = {
      apiKey: "AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ",
      authDomain: "lance-woolie-webfarm.firebaseapp.com",
      projectId: "lance-woolie-webfarm",
      storageBucket: "lance-woolie-webfarm.firebasestorage.app",
      messagingSenderId: "278461194969",
      appId: "1:278461194969:web:a2a03c9d27ccbb670814c8",
      measurementId: "G-D734JL7BFR"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    emailjs.init("CHqNrS_37-ZHjibQR");
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');
      const miniNav = document.getElementById('mini-nav');

      // Set video sources
      forwardVideo.src = '/video/contact-video-transition.mp4';
      reverseVideo.src = '/video/contact-video-reverse.mp4';

      // Forward transition on load (from saloon)
      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';
      let started = false;
      forwardVideo.oncanplaythrough = () => {
        if (started) return;
        started = true;
        forwardVideo.muted = true;
        forwardVideo.play().catch(finishTransition);
      };
      forwardVideo.onended = finishTransition;

      function finishTransition() {
        overlay.style.display = 'none';
        content.classList.add('show');
        setTimeout(() => miniNav.classList.add('show'), 600);
      }

      // Mini Nav Click - reverse transition when going home
      miniNav.addEventListener('click', e => {
        const img = e.target.closest('img');
        if (!img) return;
        const link = img.dataset.link;
        const type = img.dataset.type;
        if (!link) return;
        e.preventDefault();

        if (type === 'home') {
          miniNav.classList.add('bounce-out');
          setTimeout(() => {
            overlay.style.display = 'block';
            forwardVideo.style.display = 'none';
            reverseVideo.style.display = 'block';
            reverseVideo.currentTime = 0;
            reverseVideo.volume = 0.5;
            reverseVideo.play()
              .then(() => { reverseVideo.onended = () => location.href = link; })
              .catch(() => location.href = link);
          }, 500);
        } else {
          location.href = link;
        }
      });

      // Your existing forms (newsletter + contact) stay the same
      // ... (Firebase + EmailJS code you already have)
    });
  </script>
</body>
</html>
