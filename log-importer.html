<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Test</title>
  <style>
    body { background: #0a0f1f; color: #00ffcc; font-family: Georgia, serif; padding: 40px; }
    .container { max-width: 800px; margin: 0 auto; background: rgba(10,20,50,0.9); padding: 40px; border: 3px solid #00ffcc; border-radius: 15px; }
    button { padding: 20px 40px; font-size: 1.5rem; background: #ff00aa; color: white; border: none; border-radius: 10px; cursor: pointer; }
    button:hover { background: #00ffcc; color: black; }
    #status { margin-top: 30px; padding: 20px; background: #000; min-height: 100px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Button Test Page</h1>
    <p>Click the button below. If you see "Button clicked!" then the button works.</p>
    
    <button onclick="testButton()">TEST BUTTON - CLICK ME</button>

    <div id="status">Waiting for button click...</div>
  </div>

  <script>
    function testButton() {
      document.getElementById('status').innerHTML = '<span style="color:#00ffcc">✅ Button clicked successfully!<br><br>If you see this, the button works.<br>The problem is with Firebase loading.</span>';
      console.log("Button clicked - JavaScript is working");
    }
  </script>
</body>
</html>
