<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captain's Log Importer - Final</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <style>
    body { background: #0a0f1f; color: #00ffcc; font-family: 'Georgia', serif; margin: 0; padding: 40px; }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(10, 20, 50, 0.9);
      padding: 40px;
      border: 3px solid #00ffcc;
      border-radius: 15px;
      box-shadow: 0 0 60px rgba(0, 255, 204, 0.4);
    }
    h1 { color: #ff00aa; text-align: center; }
    textarea { width: 100%; height: 400px; background: #0a1a3a; color: #e0e0e0; border: 2px solid #00ffcc; padding: 15px; font-family: monospace; }
    button { margin-top: 20px; padding: 15px 40px; font-size: 1.3rem; background: #ff00aa; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; }
    button:hover { background: #00ffcc; color: #000; }
    #status { margin-top: 25px; padding: 20px; background: #000; min-height: 200px; white-space: pre-wrap; font-family: monospace; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Captain's Log Importer - Final Attempt</h1>
    <p>Paste the full log and click the button.</p>

    <textarea id="logInput" placeholder="Paste entire Captain's Log here..."></textarea>
    
    <button onclick="migrateLog()">🚀 MIGRATE TO FIRESTORE</button>

    <div id="status">Status will appear here...</div>
  </div>

  <script>
    async function migrateLog() {
      const status = document.getElementById('status');
      const logText = document.getElementById('logInput').value.trim();

      if (!logText) {
        status.innerHTML = '❌ Please paste the log text first.';
        return;
      }

      status.innerHTML = '🚀 Starting migration using direct API...\n\n';

      const entries = logText.split(/March \d{1,2}, 2026 – /).filter(e => e.trim().length > 0);

      for (let i = 0; i < entries.length; i++) {
        const entry = entries[i].trim();
        const titleMatch = entry.match(/^(.*?)\n/);
        const title = titleMatch ? titleMatch[1].trim() : `Log Entry ${i + 1}`;

        const docData = {
          stardate: "March 11, 2026",
          title: title,
          content: "March 11, 2026 – " + entry,
          timestamp: new Date().toISOString(),
          order: i
        };

        try {
          const response = await fetch(
            "https://firestore.googleapis.com/v1/projects/lance-woolie-webfarm/databases/(default)/documents/captainsLog?key=AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ fields: Object.fromEntries(Object.entries(docData).map(([k,v]) => [k, { stringValue: String(v) }])) })
            }
          );

          if (response.ok) {
            status.innerHTML += `✅ Imported: ${title}\n`;
          } else {
            status.innerHTML += `❌ Failed ${title} (HTTP ${response.status})\n`;
          }
        } catch (err) {
          status.innerHTML += `❌ Error ${title}: ${err.message}\n`;
        }
      }

      status.innerHTML += '\n✅ Migration attempt finished. Check Firebase Console → captainsLog collection.';
    }
  </script>
</body>
</html>
