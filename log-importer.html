<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captain's Log Importer - Diagnostic</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0a0f1f;
      color: #00ffcc;
      font-family: 'Georgia', serif;
      margin: 0;
      padding: 40px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(10, 20, 50, 0.9);
      padding: 40px;
      border: 3px solid #00ffcc;
      border-radius: 15px;
      box-shadow: 0 0 60px rgba(0, 255, 204, 0.4);
    }
    h1 { color: #ff00aa; text-align: center; }
    textarea {
      width: 100%;
      height: 400px;
      background: #0a1a3a;
      color: #e0e0e0;
      border: 2px solid #00ffcc;
      padding: 15px;
      font-family: monospace;
      font-size: 15px;
    }
    button {
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 1.3rem;
      background: #ff00aa;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }
    button:hover { background: #00ffcc; color: #000; }
    #status {
      margin-top: 25px;
      padding: 20px;
      background: #000;
      min-height: 150px;
      white-space: pre-wrap;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Captain's Log Importer - Diagnostic</h1>
    <p>Paste the full log text below, then click the button.</p>

    <textarea id="logInput" placeholder="Paste the entire Captain's Log here..."></textarea>
    
    <button onclick="runMigration()">MIGRATE TO FIRESTORE</button>

    <div id="status">Status will appear here after clicking the button...</div>
  </div>

  <script>
    async function runMigration() {
      const status = document.getElementById('status');
      const logText = document.getElementById('logInput').value.trim();

      if (!logText) {
        status.innerHTML = '❌ Please paste the log text first.';
        return;
      }

      status.innerHTML = '🚀 Starting migration attempt...\n';

      // Simple test to see if JavaScript is running
      console.log("Button clicked - JavaScript is working");

      try {
        status.innerHTML += '✅ JavaScript is working.\n';
        status.innerHTML += '📋 Found ' + logText.split('\n').length + ' lines of text.\n\n';
        status.innerHTML += 'Next step: We will push this to Firestore using console.\n';
        status.innerHTML += 'Please open F12 → Console tab and tell me what you see.';
      } catch (e) {
        status.innerHTML += '❌ Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
