<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Origins - Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/origins-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
    }
    #intro-video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 9999;
      display: none;
      background: #000;
    }
    .content {
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .content.show { opacity: 1; }

    /* HERO – Doors static top-left */
    .hero-origins {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 0 40px;
      gap: 40px;
    }
    .hero-origins .doors {
      width: 120px;
      flex-shrink: 0;
    }

    /* Holographic Rectangle – widened + moved up */
    .holo-box {
      background: rgba(10, 25, 50, 0.68);
      border: 3px solid #00ffcc;
      border-radius: 24px;
      padding: 3rem;
      margin: -60px auto 40px;   /* moved up 60px */
      max-width: 1300px;         /* widened by 100px each side */
      max-height: 72vh;
      overflow-y: auto;
      box-shadow: 0 0 60px rgba(0, 255, 204, 0.5),
                  inset 0 0 50px rgba(255, 0, 170, 0.25);
      backdrop-filter: blur(12px);
      scrollbar-width: thin;
      scrollbar-color: #00ffcc #112233;
    }
    .holo-box::-webkit-scrollbar { width: 10px; }
    .holo-box::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 10px; }

    .holo-section {
      margin-bottom: 3.5rem;
      padding-bottom: 2.5rem;
      border-bottom: 1px dashed rgba(0, 255, 204, 0.4);
    }
    .holo-section:last-child { border-bottom: none; }
    .holo-section h3 {
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc;
      font-size: 2rem;
      margin-bottom: 1.2rem;
    }
    .holo-section p {
      color: #f0f0f0;
      line-height: 1.9;
      font-size: 1.22rem;
    }
    .thumb-carousel {
      display: flex;
      gap: 18px;
      overflow-x: auto;
      padding: 20px 0;
    }
    .thumb-img {
      width: 190px;
      height: 190px;
      object-fit: cover;
      border-radius: 16px;
      border: 3px solid #00ffcc;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    .thumb-img:hover {
      transform: scale(1.08);
      box-shadow: 0 0 35px #00ffcc;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- Intro Video (once per session) -->
  <video id="intro-video" muted playsinline></video>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <!-- HERO – Doors top-left, no title -->
      <div class="hero-origins">
        <img id="saloon-doors-back" 
             src="/img/moonsaloon/saloon-doors-nav.png" 
             class="moonsaloon-prop doors" 
             data-link="index.html" 
             data-score="100" 
             data-max-hits="1"
             alt="Back to Saloon">
      </div>

      <!-- Holographic Rectangle -->
      <div class="container py-5">
        <div class="holo-box" id="holo-box">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <!-- Bio Data -->
  <script>
    const bioSections = [
      { year: "2025", title: "The Whole Two Dollars Era", content: "We're almost 2 years in on production of this record \"The Whole Two Dollars\". We have released a couple singles from this album \"Too Drunk\" and Uber, both featuring Brent Mason. Brent has been a Godsend and a great friend and colleague on this album.", images: ["img/bandmembers/Brent Mason LIVE.png"] },
      { year: "2022", title: "Country Paradise Album", content: "I co-produced the album Hogleg Band - Country Paradise with local Legends Brian Brignac, Corban Barnes, Chris Roberts — a labor of love weaving scars and triumphs into raw, reflective songs.", images: ["img/bandmembers/BrianBrignac_TabBenoit.png", "img/bandmembers/CORBANGEETAR&Keys.png", "img/bandmembers/chrisroberts_atbrians.png", "img/bandmembers/lance_shane_fatcats.png", "img/COUNTRY-PARADISE-scaled.jpg"] },
      { year: "2006", title: "Colombia Years & Emma's Birth", content: "My daughter, Emma, was born in Ibagué, Colombia, as an American citizen born abroad — a profound anchor in my evolving world.", images: ["img/Vert4Sad.jpg"] },
      { year: "2005", title: "Hurricane Katrina & El Colombian Dream", content: "Hurricane Katrina devastated New Orleans. That year, I acted as \"El Gringo\" in the feature film El Colombian Dream.", images: ["img/Vert2websitesidebar.jpg"] },
      { year: "2001", title: "LSU & Information Systems", content: "In 2000, I transferred to Louisiana State University, initially majoring in Veterinary Medicine but switching to Information Systems & Decision Sciences.", images: ["img/COUCHLance.jpg"] },
      { year: "1999", title: "Juvenile Detention & Angola Band", content: "While serving time, during \"Fun Day\", Warden Lawrence Gorham had heard about my guitar skills and I performed with the Angola Travelin’ Band.", images: ["img/WHITETRASH3.jpg"] },
      { year: "1979", title: "Birth & Early Years", content: "I was born in the Baton Rouge Police Department Headquarters on July 3, 1979 at 3:33 am, and forged my path through shadows of loss, shades of truth, and FAFO grit.", images: [] }
    ];

    function createSection(section) {
      let imagesHTML = '';
      if (section.images && section.images.length) {
        imagesHTML = `<div class="thumb-carousel mt-4">`;
        section.images.forEach(src => {
          imagesHTML += `<img class="thumb-img" src="${src}" onclick="openModal('${src}')" alt="${section.year}">`;
        });
        imagesHTML += `</div>`;
      }
      return `
        <div class="holo-section">
          <h3>${section.year} — ${section.title}</h3>
          <p>${section.content}</p>
          ${imagesHTML}
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const box = document.getElementById('holo-box');
      let html = '';
      bioSections.forEach(section => html += createSection(section));
      box.innerHTML = html;

      // Intro video once per session
      const video = document.getElementById('intro-video');
      const content = document.getElementById('main-content');

      if (!sessionStorage.getItem('originsIntroPlayed')) {
        video.src = '/video/origins-video-transition.mp4';
        video.style.display = 'block';
        video.play();

        video.onended = () => {
          sessionStorage.setItem('originsIntroPlayed', 'true');
          video.style.transition = 'opacity 1.2s ease';
          video.style.opacity = '0';
          setTimeout(() => {
            video.style.display = 'none';
            content.classList.add('show');
          }, 1200);
        };
      } else {
        content.classList.add('show');
      }
    });

    function openModal(src) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:10002;';
      modal.innerHTML = `<img src="${src}" style="max-width:90%; max-height:90%; border-radius:16px; box-shadow:0 0 50px #00ffcc;" onclick="this.parentElement.remove()">`;
      document.body.appendChild(modal);
    }
  </script>
</body>
</html>
