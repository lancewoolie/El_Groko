<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Origins - Grokipedia Lite | Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/origins-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
    }
    .content-overlay {
      background: rgba(0, 0, 0, 0.75);
      min-height: 100vh;
      padding-top: 90px;
    }

    /* GROKIpediaLite Tab */
    .grokipedia-tab {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      background: rgba(10, 20, 50, 0.85);
      border: 2px solid #00ffcc;
      color: #ff00aa;
      padding: 6px 18px;
      border-radius: 30px 0 30px 30px;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .grokipedia-tab:hover {
      border-color: #ff00aa;
      color: #00ffcc;
      box-shadow: 0 0 35px rgba(255, 0, 170, 0.8);
      transform: scale(1.05);
    }

    .hero-origins {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 30px 0 40px;
      gap: 40px;
    }
    .hero-origins .doors {
      width: 130px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .hero-origins .doors:hover { transform: scale(1.08); }

    .crew-roster {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }
    .member-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 0.9rem;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
      transition: all 0.4s ease;
      cursor: pointer;
    }
    .member-card:hover {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 0 60px rgba(255, 0, 170, 0.8);
      border-color: #ff00aa;
    }
    .member-card img {
      width: 100%;
      height: 165px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid #00ffcc;
      margin-bottom: 0.8rem;
    }
    .member-card h5 {
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-bottom: 0.3rem;
      font-size: 1.05rem;
    }
    .member-card .tagline {
      font-size: 0.9rem;
      color: #ff99cc;
      font-style: italic;
    }

    .member-card.guest {
      border: 3px solid #ff99cc;
      box-shadow: 0 0 30px rgba(255, 153, 204, 0.5);
      transform: scale(0.92);
    }

    .transmission-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 24px;
      padding: 1.6rem;
      margin-bottom: 1.8rem;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.7);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }
    .transmission-card:hover {
      box-shadow: 0 0 70px rgba(255, 0, 170, 0.6);
    }

    .trophy-count {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 1.45rem;
      background: rgba(10, 20, 50, 0.92);
      padding: 4px 14px;
      border-radius: 20px;
      border: 2px solid #ffd700;
      color: #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
      z-index: 2;
    }

    .transmission-header {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
      position: relative;
      padding-right: 70px;
    }
    .transmission-header img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #00ffcc;
      flex-shrink: 0;
    }
    .transmission-header h3 {
      color: #f0f0f0;
      text-shadow: 0 0 20px #00ffcc;
      margin: 0;
      flex-grow: 1;
      font-size: 1.35rem;
    }
    .expand-btn {
      background: #ff00aa;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.95rem;
    }
    .expand-btn:hover {
      background: #ff66cc;
      transform: scale(1.08);
    }
    .transmission-body {
      display: none;
      margin-top: 1.8rem;
      padding-top: 1.4rem;
      border-top: 1px dashed rgba(0, 255, 204, 0.5);
      line-height: 1.8;
    }
    .transmission-card.expanded .transmission-body {
      display: block;
    }
    .transmission-card.expanded .expand-btn {
      background: #00ffcc;
      color: #112233;
    }
    .bio-section {
      margin-bottom: 1.6rem;
    }
    .bio-section h4 {
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-bottom: 0.7rem;
    }
    .fact-pill {
      display: inline-block;
      background: rgba(255, 0, 170, 0.2);
      border: 1px solid #ff00aa;
      color: #ffccdd;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.92rem;
      margin: 6px 4px 6px 0;
    }
  </style>
</head>
