<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Origins - Grokipedia Lite | Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/origins-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
    }
    .content-overlay {
      background: rgba(0, 0, 0, 0.75);
      min-height: 100vh;
      padding-top: 90px;
    }

    /* GROKIpediaLite Tab */
    .grokipedia-tab {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      background: rgba(10, 20, 50, 0.85);
      border: 2px solid #00ffcc;
      color: #ff00aa;
      padding: 6px 18px;
      border-radius: 30px 0 30px 30px;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .grokipedia-tab:hover {
      border-color: #ff00aa;
      color: #00ffcc;
      box-shadow: 0 0 35px rgba(255, 0, 170, 0.8);
      transform: scale(1.05);
    }

    .hero-origins {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 30px 0 40px;
      gap: 40px;
    }
    .hero-origins .doors {
      width: 130px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .hero-origins .doors:hover { transform: scale(1.08); }

    /* Crew Roster */
    .crew-roster {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }
    .member-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 0.9rem;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
      transition: all 0.4s ease;
      cursor: pointer;
    }
    .member-card:hover {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 0 60px rgba(255, 0, 170, 0.8);
      border-color: #ff00aa;
    }
    .member-card img {
      width: 100%;
      height: 165px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid #00ffcc;
      margin-bottom: 0.8rem;
    }
    .member-card h5 {
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-bottom: 0.3rem;
      font-size: 1.05rem;
    }
    .member-card .tagline {
      font-size: 0.9rem;
      color: #ff99cc;
      font-style: italic;
    }

    /* Special Guest */
    .member-card.guest {
      border: 3px solid #ff99cc;
      box-shadow: 0 0 30px rgba(255, 153, 204, 0.5);
      transform: scale(0.92);
    }

    /* Transmission Cards */
    .transmission-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 24px;
      padding: 1.6rem;
      margin-bottom: 1.8rem;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.7);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }
    .transmission-card:hover {
      box-shadow: 0 0 70px rgba(255, 0, 170, 0.6);
    }

    /* Trophy in collapsed state - bottom right */
    .trophy-count {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 1.35rem;
      background: rgba(10, 20, 50, 0.9);
      padding: 4px 12px;
      border-radius: 20px;
      border: 2px solid #ffd700;
      color: #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: bold;
    }

    .transmission-header {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
    }
    .transmission-header img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #00ffcc;
      flex-shrink: 0;
    }
    .transmission-header h3 {
      color: #f0f0f0;
      text-shadow: 0 0 20px #00ffcc;
      margin: 0;
      flex-grow: 1;
      font-size: 1.35rem;
    }
    .expand-btn {
      background: #ff00aa;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.95rem;
    }
    .expand-btn:hover {
      background: #ff66cc;
      transform: scale(1.08);
    }
    .transmission-body {
      display: none;
      margin-top: 1.8rem;
      padding-top: 1.4rem;
      border-top: 1px dashed rgba(0, 255, 204, 0.5);
      line-height: 1.8;
    }
    .transmission-card.expanded .transmission-body {
      display: block;
    }
    .transmission-card.expanded .expand-btn {
      background: #00ffcc;
      color: #112233;
    }
    .bio-section {
      margin-bottom: 1.6rem;
    }
    .bio-section h4 {
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-bottom: 0.7rem;
    }
    .fact-pill {
      display: inline-block;
      background: rgba(255, 0, 170, 0.2);
      border: 1px solid #ff00aa;
      color: #ffccdd;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.92rem;
      margin: 6px 4px 6px 0;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- GROKIpediaLite MINI APP TAB -->
  <div class="grokipedia-tab">GROKIpediaLite</div>

  <!-- VIDEO TRANSITION OVERLAY -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;overflow:hidden;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <!-- HERO -->
      <div class="hero-origins container">
        <img id="saloon-doors-back" src="/img/moonsaloon/saloon-doors-nav.png" class="doors" alt="Back to Saloon">
        <div class="flex-grow-1 text-center">
          <h1 style="color:#ff00aa; text-shadow: 0 0 50px #ff00aa; font-size: 3.2rem; margin:0;">GROKIPEDIA LITE</h1>
          <p style="color:#00ffcc; font-size:1.4rem; margin:0;">Origins Transmissions • Shackleton Crater Archive</p>
        </div>
      </div>

      <div class="container py-4">
        <!-- CREW ROSTER -->
        <h2 class="text-center mb-4" style="color:#00ffcc; text-shadow:0 0 30px #00ffcc;">THE CREW OF THE MOON SALOON</h2>
        <div class="crew-roster" id="crew-roster"></div>

        <!-- TRANSMISSION BLOCKS -->
        <div id="transmissions-container"></div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    const crew = [
      {
        id: "lance",
        name: "Lance Woolie",
        tagline: "Captain • Founder • Swamp-Country Troubadour",
        img: "img/bandmembers/lance_too_drunk_bts_recordstore.png",
        grammys: 0,
        bio: `... (Lance bio from previous version) ...`,
        images: []
      },
      {
        id: "brent",
        name: "Brent Mason",
        tagline: "12× ACM Guitarist of the Year • Most Recorded Guitarist in History",
        img: "img/bandmembers/Brent Mason LIVE.png",
        grammys: 1,                    // Grammy for "Cluster Pluck"
        bio: `... (Brent bio from previous version) ...`,
        images: []
      },
      {
        id: "brian",
        name: "Brian Brignac",
        tagline: "Drummer • Producer • Brignac Lane Studios",
        img: "img/bandmembers/BrianBrignac_TabBenoit.png",
        grammys: 0,                    // Grammy-nominated but no win confirmed
        bio: `... (Brian bio from previous version) ...`,
        images: []
      },
      {
        id: "shane",
        name: "Shane Ried",
        tagline: "Original Hogleg Band • Plays \"Little Wing\" live",
        img: "img/bandmembers/ShaneReid.jpg",
        grammys: 0,
        bio: `... (Shane bio from previous version) ...`,
        images: ["img/bandmembers/OriginalHOGLEGBANDchris&shane.png"]
      },
      {
        id: "tank",
        name: "Tank Viavatine",
        tagline: "M35 Abrams is the Big Guns",
        img: "img/bandmembers/TANk.jpg",
        grammys: 0,
        bio: `... (Tank bio from previous version) ...`,
        images: []
      },
      {
        id: "corban",
        name: "Corban Barnes",
        tagline: "Multi-Instrumentalist • Country Paradise Co-Producer",
        img: "img/bandmembers/CORBANGEETAR&Keys.png",
        grammys: 0,
        bio: `... (Corban bio from previous version) ...`,
        images: []
      },
      {
        id: "boogie",
        name: "Jonathon \"Boogie\" Long",
        tagline: "Special Guest • Played \"Little Wing\" on the album",
        img: "img/bandmembers/Boogie.jpg",
        grammys: 0,
        isGuest: true,
        bio: `... (Boogie bio from previous version) ...`,
        images: []
      }
    ];

    function renderCrew() {
      const container = document.getElementById('crew-roster');
      let html = '';
      crew.forEach(member => {
        const guestClass = member.isGuest ? ' guest' : '';
        html += `
          <div class="member-card${guestClass}" onclick="scrollToMember('${member.id}')">
            <img src="${member.img}" alt="${member.name}">
            <h5>${member.name}</h5>
            <div class="tagline">${member.tagline}</div>
          </div>`;
      });
      container.innerHTML = html;
    }

    function renderTransmissions() {
      const container = document.getElementById('transmissions-container');
      let html = '';
      crew.forEach(member => {
        const trophyHTML = member.grammys > 0 
          ? `<div class="trophy-count">🏆${member.grammys}x</div>` 
          : '';

        let extraImages = '';
        if (member.images && member.images.length) {
          extraImages = `
            <div class="thumb-carousel mt-3">
              ${member.images.map(src => `<img class="thumb-img" src="${src}" onclick="openModal('${src}')" alt="${member.name}">`).join('')}
            </div>`;
        }

        html += `
          <div class="transmission-card" id="block-${member.id}">
            <div class="transmission-header" onclick="toggleTransmission('${member.id}')">
              <img src="${member.img}" alt="${member.name}">
              <h3>${member.name} <span style="font-size:1.05rem; color:#ff99cc;">— ${member.tagline}</span></h3>
              <button class="expand-btn">OPEN TRANSMISSION</button>
              ${trophyHTML}
            </div>
            <div class="transmission-body">
              ${member.bio}
              ${extraImages}
            </div>
          </div>`;
      });
      container.innerHTML = html;
    }

    // Rest of functions (toggle, scroll, modal, transitions) remain the same as last version
    function toggleTransmission(id) {
      const card = document.getElementById(`block-${id}`);
      card.classList.toggle('expanded');
    }

    function scrollToMember(id) {
      const block = document.getElementById(`block-${id}`);
      if (block) {
        block.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(() => block.classList.add('expanded'), 500);
      }
    }

    function openModal(src) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:10002;';
      modal.innerHTML = `<img src="${src}" style="max-width:92%; max-height:92%; border-radius:16px; box-shadow:0 0 60px #00ffcc;" onclick="this.parentElement.remove()">`;
      document.body.appendChild(modal);
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCrew();
      renderTransmissions();

      // Video transition code (unchanged from last version)
      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');

      forwardVideo.src = '/video/origins-video-transition.mp4';
      reverseVideo.src = '/video/origins-video-reverse.mp4';

      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';

      let started = false;
      forwardVideo.oncanplaythrough = () => {
        if (started) return;
        started = true;
        forwardVideo.muted = true;
        forwardVideo.volume = 0.5;
        forwardVideo.play().catch(() => {});
      };

      setTimeout(() => {
        if (!started) {
          started = true;
          overlay.style.display = 'none';
          content.classList.add('show');
        }
      }, 1400);

      forwardVideo.onended = () => {
        overlay.style.display = 'none';
        content.classList.add('show');
      };

      document.getElementById('saloon-doors-back').addEventListener('click', (e) => {
        e.preventDefault();
        overlay.style.display = 'block';
        forwardVideo.style.display = 'none';
        reverseVideo.style.display = 'block';
        reverseVideo.currentTime = 0;
        reverseVideo.volume = 0.5;
        reverseVideo.play().catch(() => {});
        reverseVideo.onended = () => window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
