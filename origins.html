<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Origins - Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/origins-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
    }
    #intro-video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 9999;
      display: none;
      background: #000;
    }
    .content {
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .content.show { opacity: 1; }

    /* HERO – Doors static top-left */
    .hero-origins {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 60px 0 40px;
      flex-wrap: wrap;
    }
    .hero-origins .doors {
      width: 120px;
      flex-shrink: 0;
    }
    .hero-origins .title-area {
      text-align: left;
    }
    .hero-origins h1 {
      font-size: 3.2rem;
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc, 0 0 40px #ff00aa;
      margin: 0;
    }

    /* Holographic Carousel Container */
    .holo-carousel {
      background: rgba(10, 25, 50, 0.65);
      border: 2px solid #00ffcc;
      border-radius: 20px;
      padding: 2.5rem;
      margin: 0 auto;
      max-width: 1100px;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.4),
                  inset 0 0 40px rgba(255, 0, 170, 0.15);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }
    .holo-slide {
      display: none;
    }
    .holo-slide.active {
      display: block;
      animation: holoFade 0.8s ease;
    }
    @keyframes holoFade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .holo-slide h3 {
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      font-size: 1.6rem;
    }
    .holo-slide p {
      color: #f0f0f0;
      line-height: 1.75;
      font-size: 1.05rem;
    }
    .thumb-carousel {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 15px 0;
      scrollbar-width: thin;
    }
    .thumb-img {
      width: 130px;
      height: 130px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid #00ffcc;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    .thumb-img:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #00ffcc;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <!-- Intro Video (plays once per session) -->
  <video id="intro-video" muted playsinline></video>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <!-- HERO with static doors top-left -->
      <div class="hero-origins">
        <img id="saloon-doors-back" 
             src="/img/moonsaloon/saloon-doors-nav.png" 
             class="moonsaloon-prop doors" 
             data-link="index.html" 
             data-score="100" 
             data-max-hits="1"
             alt="Back to Saloon">

        <div class="title-area">
          <h1>Origins</h1>
          <p class="lead mt-3">From bayou struggles to country gold — Lance Woolie’s story of grit, loss, and unbreakable spirit.</p>
        </div>
      </div>

      <!-- Holographic Carousel -->
      <div class="container py-5">
        <div class="holo-carousel">
          <!-- Slides will be populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <!-- Holographic Carousel + Bio Data (reverse chrono) -->
  <script>
    const bioSections = [
      {
        year: "2025",
        title: "The Whole Two Dollars Era",
        content: "We're almost 2 years in on production of this record \"The Whole Two Dollars\". We have released a couple singles from this album \"Too Drunk\" (with help of lyricist Jefferey Allen Imler) and Uber, both featuring Brent Mason. Brent has been a Godsend and a great friend and colleague on this album.",
        images: ["img/bandmembers/Brent Mason LIVE.png"]
      },
      {
        year: "2022",
        title: "Country Paradise Album",
        content: "I co-produced the album Hogleg Band - Country Paradise with local Legends Brian Brignac, Corban Barnes, Chris Roberts — a labor of love weaving scars and triumphs into raw, reflective songs.",
        images: ["img/bandmembers/BrianBrignac_TabBenoit.png", "img/bandmembers/CORBANGEETAR&Keys.png", "img/bandmembers/chrisroberts_atbrians.png", "img/bandmembers/lance_shane_fatcats.png", "img/COUNTRY-PARADISE-scaled.jpg"]
      },
      {
        year: "2006",
        title: "Colombia Years & Emma's Birth",
        content: "My daughter, Emma, was born in Ibagué, Colombia, as an American citizen born abroad — a profound anchor in my evolving world. From 2006 to 2023, returning stateside, I worked as a stone mason, machinist, blending technical precision with my creative drive.",
        images: ["img/Vert4Sad.jpg"]
      },
      {
        year: "2005",
        title: "Hurricane Katrina & El Colombian Dream",
        content: "Hurricane Katrina devastated New Orleans. That year, I acted as \"El Gringo\" in the feature film El Colombian Dream. Amid personal milestones, then-Congressman Bobby Jindal wrote a letter to the State Department on my behalf...",
        images: ["img/Vert2websitesidebar.jpg"]
      },
      {
        year: "2001",
        title: "LSU & Information Systems",
        content: "In 2000, I transferred to Louisiana State University, initially majoring in Veterinary Medicine but switching to Information Systems & Decision Sciences. A self-taught web developer, I've built every band website I've been in.",
        images: ["img/COUCHLance.jpg"]
      },
      {
        year: "1999",
        title: "Juvenile Detention & Angola Band",
        content: "In 1995, my teenage years unraveled amid turmoil, culminating in the tragic loss of my brother, Leigh Michael. Addiction and depression followed in 1996... While serving time, during \"Fun Day\", Warden Lawrence Gorham had heard about my guitar skills and I performed with the Angola Travelin’ Band.",
        images: ["img/WHITETRASH3.jpg"]
      },
      {
        year: "1979",
        title: "Birth & Early Years",
        content: "I was born in the Baton Rouge Police Department Headquarters (aka Woman's Hospital), on July 3, 1979 at 3:33 am, and forged my path through shadows of loss, shades of truth, and FAFO grit. I grew up in Baton Rouge, attended 17 different middle schools due to my undiagnosed ADHD.",
        images: []
      }
    ];

    function createSlide(section, index) {
      let imagesHTML = '';
      if (section.images && section.images.length) {
        imagesHTML = `<div class="thumb-carousel mt-4">`;
        section.images.forEach(src => {
          imagesHTML += `<img class="thumb-img" src="${src}" onclick="openModal('${src}')" alt="${section.year}">`;
        });
        imagesHTML += `</div>`;
      }

      return `
        <div class="holo-slide ${index === 0 ? 'active' : ''}" data-index="${index}">
          <h3>${section.year} — ${section.title}</h3>
          <p>${section.content}</p>
          ${imagesHTML}
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const carousel = document.querySelector('.holo-carousel');
      let html = '';
      bioSections.forEach((section, i) => {
        html += createSlide(section, i);
      });
      carousel.innerHTML = html;

      // Navigation buttons for carousel
      const prev = document.createElement('button');
      prev.innerHTML = '←';
      prev.style.cssText = 'position:absolute; left:20px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:2rem; color:#00ffcc; cursor:pointer; z-index:10;';
      prev.onclick = () => changeSlide(-1);

      const next = document.createElement('button');
      next.innerHTML = '→';
      next.style.cssText = 'position:absolute; right:20px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:2rem; color:#00ffcc; cursor:pointer; z-index:10;';
      next.onclick = () => changeSlide(1);

      carousel.appendChild(prev);
      carousel.appendChild(next);

      let current = 0;
      window.changeSlide = (dir) => {
        const slides = document.querySelectorAll('.holo-slide');
        slides[current].classList.remove('active');
        current = (current + dir + slides.length) % slides.length;
        slides[current].classList.add('active');
      };

      // Intro video plays only once per session
      const video = document.getElementById('intro-video');
      const content = document.getElementById('main-content');

      if (!sessionStorage.getItem('originsIntroPlayed')) {
        video.src = '/video/origins-video-transition.mp4';
        video.style.display = 'block';
        video.play();

        video.onended = () => {
          sessionStorage.setItem('originsIntroPlayed', 'true');
          video.style.transition = 'opacity 1.2s ease';
          video.style.opacity = '0';
          setTimeout(() => {
            video.style.display = 'none';
            content.classList.add('show');
          }, 1200);
        };
      } else {
        content.classList.add('show');
      }
    });

    // Modal for images
    function openModal(src) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:10002;';
      modal.innerHTML = `<img src="${src}" style="max-width:90%; max-height:90%; border-radius:12px; box-shadow:0 0 40px #00ffcc;" onclick="this.parentElement.remove()">`;
      document.body.appendChild(modal);
    }
  </script>
</body>
</html>
