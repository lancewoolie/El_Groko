<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Origins - Grokipedia Lite | Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">

  <style>
    /* 🔒 CHAINED 🌕 Body & Background */
    body {
      background: url('/img/moonsaloon/origins-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
    }
    .content-overlay {
      background: rgba(0, 0, 0, 0.75);
      min-height: 100vh;
      padding-top: 95px;
    }

    /* 🔒 CHAINED 📱 Mini-Nav - Exact style & delayed fade-in from OnlyFans */
    .mini-nav {
      position: fixed;
      top: 12px;
      left: 20px;
      z-index: 10000;
      background: rgba(10, 15, 35, 0.92);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.6),
                  inset 0 0 20px rgba(255, 0, 170, 0.3);
      backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-80px);
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.6s ease;
    }
    .mini-nav.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .mini-nav.bounce-out {
      transition: transform 0.55s cubic-bezier(0.68, -0.85, 0.32, 1.85) !important;
      transform: translateY(-180px) scale(0.6) rotate(-8deg) !important;
    }
    .mini-nav img {
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 8px #00ffcc);
    }
    .mini-nav img:hover {
      transform: scale(1.15) translateY(-3px);
      filter: drop-shadow(0 0 20px #ff00aa);
    }
    .mini-nav .doors {
      width: 52px;
      height: 46px;
    }

    /* 🔒 CHAINED ✨ Content fade-in */
    .content {
      position: relative;
      z-index: 2;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .content.show { opacity: 1; }

    /* 🔒 CHAINED - Rest of your original styles (kept untouched) */
    .grokipedia-tab {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      background: rgba(10, 20, 50, 0.85);
      border: 2px solid #00ffcc;
      color: #ff00aa;
      padding: 6px 18px;
      border-radius: 30px 0 30px 30px;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .grokipedia-tab:hover {
      border-color: #ff00aa;
      color: #00ffcc;
      box-shadow: 0 0 35px rgba(255, 0, 170, 0.8);
      transform: scale(1.05);
    }
    /* ... your original crew-roster, transmission-card, etc. styles remain exactly the same ... */
  </style>
</head>
<body>

  <!-- 🔒 CHAINED 📊 Mini-Nav - Icon style from OnlyFans (NO Origins icon) -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="OnlyFans Zone">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/contact-earth-trophy-nav.png" data-link="contact.html" data-type="dest" data-label="Contact">
  </div>

  <!-- GROKIpediaLite MINI APP TAB (kept exactly as you had it) -->
  <div class="grokipedia-tab">GROKIpediaLite</div>

  <!-- 🔒 CHAINED 🎥 Video Transition Overlay -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;overflow:hidden;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <div class="hero-origins container">
        <div class="flex-grow-1 text-center">
          <h1 style="color:#ff00aa; text-shadow: 0 0 50px #ff00aa; font-size: 3.2rem; margin:0;">GROKIPEDIA LITE</h1>
          <p style="color:#00ffcc; font-size:1.4rem; margin:0;">Origins Transmissions • Shackleton Crater Archive</p>
        </div>
      </div>
      <div class="container py-4">
        <h2 class="text-center mb-4" style="color:#00ffcc; text-shadow:0 0 30px #00ffcc;">THE CREW OF THE MOON SALOON</h2>
        <div class="crew-roster" id="crew-roster"></div>
        <div id="transmissions-container"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    /* 🔒 CHAINED 📋 Crew & Transmission Data (unchanged) */
    const crew = [ /* your full crew array is preserved exactly as you provided */ ];

    /* 🔒 CHAINED - Rest of your original renderCrew / renderTransmissions / toggle / scroll / modal functions remain untouched */

    document.addEventListener('DOMContentLoaded', () => {
      renderCrew();
      renderTransmissions();

      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');
      const miniNav = document.getElementById('mini-nav');

      forwardVideo.src = '/video/origins-video-transition.mp4';
      reverseVideo.src = '/video/origins-video-reverse.mp4';

      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';
      forwardVideo.muted = true;
      forwardVideo.play().catch(() => {});

      // Delayed fade-in behavior - exact OnlyFans style
      setTimeout(() => {
        overlay.style.display = 'none';
        content.classList.add('show');
        setTimeout(() => miniNav.classList.add('show'), 400);
      }, 5000);

      // Mini-nav click handler with bounce-out for Saloon
      miniNav.addEventListener('click', (e) => {
        const img = e.target.closest('img');
        if (!img) return;

        const targetLink = img.getAttribute('data-link');
        const type = img.getAttribute('data-type');
        if (!targetLink) return;

        e.preventDefault();

        if (type === 'home') {
          miniNav.classList.add('bounce-out');
          setTimeout(() => {
            overlay.style.display = 'block';
            forwardVideo.style.display = 'none';
            reverseVideo.style.display = 'block';
            reverseVideo.currentTime = 0;
            reverseVideo.volume = 0.5;
            reverseVideo.play()
              .then(() => { reverseVideo.onended = () => window.location.href = targetLink; })
              .catch(() => window.location.href = targetLink);
          }, 520);
        } else {
          window.location.href = targetLink;
        }
      });
    });
  </script>
</body>
</html>
