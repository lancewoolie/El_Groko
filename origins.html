<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Origins - Grokipedia Lite | Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/origins-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding: 0;
    }

    /* Mini-Nav - Same as Music page */
    .mini-nav {
      position: fixed;
      top: 12px;
      left: 20px;
      z-index: 10000;
      background: rgba(10, 15, 35, 0.92);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.6),
                  inset 0 0 20px rgba(255, 0, 170, 0.3);
      backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-80px);
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.6s ease;
    }
    .mini-nav.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .mini-nav.bounce-out {
      transition: transform 0.55s cubic-bezier(0.68, -0.85, 0.32, 1.85) !important;
      transform: translateY(-180px) scale(0.6) rotate(-8deg) !important;
    }
    .mini-nav img {
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 8px #00ffcc);
    }
    .mini-nav img:hover {
      transform: scale(1.15) translateY(-3px);
      filter: drop-shadow(0 0 20px #ff00aa);
    }
    .mini-nav .doors {
      width: 52px;
      height: 46px;
    }

    .content-overlay {
      background: rgba(0, 0, 0, 0.75);
      min-height: 100vh;
      padding-top: 95px;
    }

    .grokipedia-tab {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10001;
      background: rgba(10, 20, 50, 0.85);
      border: 2px solid #00ffcc;
      color: #ff00aa;
      padding: 6px 18px;
      border-radius: 30px 0 30px 30px;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
      transition: all 0.3s ease;
      pointer-events: none;
    }

    /* Original card styles */
    .hero-origins {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 0 30px;
      gap: 40px;
    }
    .crew-roster {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }
    .member-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 0.9rem;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
      transition: all 0.4s ease;
      cursor: pointer;
    }
    .member-card:hover {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 0 60px rgba(255, 0, 170, 0.8);
      border-color: #ff00aa;
    }
    .member-card img {
      width: 100%;
      height: 165px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid #00ffcc;
      margin-bottom: 0.8rem;
    }
    .member-card h5 {
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-bottom: 0.3rem;
      font-size: 1.05rem;
    }
    .member-card .tagline {
      font-size: 0.9rem;
      color: #ff99cc;
      font-style: italic;
    }
    .member-card.guest {
      border: 3px solid #ff99cc;
      box-shadow: 0 0 30px rgba(255, 153, 204, 0.5);
      transform: scale(0.92);
    }
    .transmission-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 24px;
      padding: 1.6rem;
      margin-bottom: 1.8rem;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.7);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }
    .transmission-card:hover {
      box-shadow: 0 0 70px rgba(255, 0, 170, 0.6);
    }
    .trophy-count {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 1.45rem;
      background: rgba(10, 20, 50, 0.92);
      padding: 4px 14px;
      border-radius: 20px;
      border: 2px solid #ffd700;
      color: #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
      z-index: 2;
    }
    .transmission-header {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
      position: relative;
      padding-right: 70px;
    }
    .transmission-header img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #00ffcc;
      flex-shrink: 0;
    }
    .transmission-header h3 {
      color: #f0f0f0;
      text-shadow: 0 0 20px #00ffcc;
      margin: 0;
      flex-grow: 1;
      font-size: 1.35rem;
    }
    .expand-btn {
      background: #ff00aa;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.95rem;
    }
    .expand-btn:hover {
      background: #ff66cc;
      transform: scale(1.08);
    }
    .transmission-body {
      display: none;
      margin-top: 1.8rem;
      padding-top: 1.4rem;
      border-top: 1px dashed rgba(0, 255, 204, 0.5);
      line-height: 1.8;
    }
    .transmission-card.expanded .transmission-body {
      display: block;
    }
    .transmission-card.expanded .expand-btn {
      background: #00ffcc;
      color: #112233;
    }
    .bio-section {
      margin-bottom: 1.6rem;
    }
    .bio-section h4 {
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-bottom: 0.7rem;
    }
    .fact-pill {
      display: inline-block;
      background: rgba(255, 0, 170, 0.2);
      border: 1px solid #ff00aa;
      color: #ffccdd;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.92rem;
      margin: 6px 4px 6px 0;
    }
  </style>
</head>
<body>
  <!-- Mini-Nav -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/hourglass-origins-nav.png" data-link="origins.html" data-type="dest" data-label="Origins">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="OnlyFans Zone">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/contact-earth-trophy-nav.png" data-link="contact.html" data-type="dest" data-label="Contact">
  </div>

  <!-- GROKIpediaLite MINI APP TAB -->
  <div class="grokipedia-tab">GROKIpediaLite</div>

  <!-- VIDEO TRANSITION OVERLAY -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;overflow:hidden;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <div class="hero-origins container">
        <div class="flex-grow-1 text-center">
          <h1 style="color:#ff00aa; text-shadow: 0 0 50px #ff00aa; font-size: 3.2rem; margin:0;">GROKIPEDIA LITE</h1>
          <p style="color:#00ffcc; font-size:1.4rem; margin:0;">Origins Transmissions • Shackleton Crater Archive</p>
        </div>
      </div>
      <div class="container py-4">
        <h2 class="text-center mb-4" style="color:#00ffcc; text-shadow:0 0 30px #00ffcc;">THE CREW OF THE MOON SALOON</h2>
        <div class="crew-roster" id="crew-roster"></div>
        <div id="transmissions-container"></div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    const crew = [
      {
        id: "lance",
        name: "Lance Woolie",
        tagline: "Captain • Founder • Swamp-Country Troubadour",
        img: "img/bandmembers/lance_too_drunk_bts_recordstore.png",
        grammys: 0,
        bio: `
          <div class="bio-section">
            <h4>Baton Rouge Roots & Early Transmissions</h4>
            <p>Born July 3, 1979 at 3:33 a.m. in Baton Rouge, Louisiana. Attended 17 schools amid family struggles and undiagnosed ADHD. At 17, a nonviolent juvenile arrest led to 2+ years at Jetson Correctional Center for Youth, where he rediscovered music performing with the Angola Travelin’ Band and leading worship.</p>
          </div>
          <div class="bio-section">
            <h4>Education, Colombia, and Rebirth</h4>
            <p>Studied at Southern University then transferred to LSU (Pre-Vet to Information Systems). Moved to Bogotá, Colombia in 2004 after his Christian album <em>Let It Ride</em>. Acted as "El Gringo" in the 2005 psychedelic film <em>El Colombian Dream</em>. Daughter Emma born in Ibagué in 2006. Returned to Louisiana after Hurricane Katrina.</p>
          </div>
          <div class="bio-section">
            <h4>Radio & Country Comeback</h4>
            <p>Created over 500 comedy songs as "El Gringo" for the Walton & Johnson show starting ~2016. In 2020, during COVID, shifted to serious country with Hogleg Band. Co-produced <em>Country Paradise</em> with Brian Brignac, Corban Barnes, and Chris Roberts. Rebranded solo and is finishing <em>The Whole Two Dollars</em> with elite Nashville players.</p>
          </div>
          <div class="fact-pill">Born in old Woman's Hospital • Angola Band performer • El Gringo radio legend • Forthcoming album 2026</div>
        `,
        images: []
      },
      {
        id: "brent",
        name: "Brent Mason",
        tagline: "12× ACM Guitarist of the Year • Most Recorded Guitarist in History",
        img: "img/bandmembers/Brent Mason LIVE.png",
        grammys: 1,
        bio: `
          <div class="bio-section">
            <h4>Nashville Session Legend</h4>
            <p>Self-taught from age 5 in Ohio. Moved to Nashville late 1970s. Discovered by Chet Atkins. Played on over 1,000 albums for George Strait, Alan Jackson, Shania Twain, Brad Paisley, and many more.</p>
          </div>
          <div class="bio-section">
            <h4>Awards & Signature Sound</h4>
            <p>Grammy winner ("Cluster Pluck"), 12× ACM Guitarist of the Year, 2× CMA Musician of the Year, Musicians Hall of Fame inductee. Famous for hybrid picking, chicken-pickin', and Telecaster twang.</p>
          </div>
          <div class="bio-section">
            <h4>Moon Saloon Connection</h4>
            <p>Laid down iconic guitar on Lance Woolie’s "Too Drunk", "Uber", "Worst Enemy", and more. A Godsend collaborator bringing world-class tone to the Shackleton Crater sound.</p>
          </div>
          <div class="fact-pill">Grammy Winner • 12× ACM • Chet Atkins mentee • Telecaster master</div>
        `,
        images: []
      },
      {
        id: "brian",
        name: "Brian Brignac",
        tagline: "Drummer • Producer • Brignac Lane Studios",
        img: "img/bandmembers/BrianBrignac_TabBenoit.png",
        grammys: 1,
        bio: `
          <div class="bio-section">
            <h4>Louisiana Rhythm Powerhouse</h4>
            <p>From the Gonzales/St. Amant area. Started drums at 15. Studied music education at LSU. Longtime drummer for Sonny Landreth (20+ years), appearing on Grammy-nominated albums and Eric Clapton’s Crossroads Festival.</p>
          </div>
          <div class="bio-section">
            <h4>Studio & Production Legend</h4>
            <p>Owns Brignac Lane Studios. Engineered/produced for Jo-el Sonnier (Grammy-winning album), Wayne Toups, Warren Storm, Tab Benoit, and many more. Grammy-nominated engineering work.</p>
          </div>
          <div class="bio-section">
            <h4>Moon Saloon Connection</h4>
            <p>Co-produced Lance Woolie’s <em>Country Paradise</em> album with Hogleg Band — raw, reflective Southern storytelling full of scars and triumphs.</p>
          </div>
          <div class="fact-pill">Sonny Landreth drummer 20+ years • Brignac Lane Studios owner • Grammy Winner</div>
        `,
        images: []
      },
      {
        id: "shane",
        name: "Shane Reid",
        tagline: "Go-To Live Guitarist • Co-Writer of \"Gypsy Love\"",
        img: "img/bandmembers/ShaneReid.jpg",
        grammys: 0,
        bio: `
          <div class="bio-section">
            <h4>Original Hogleg Band Member</h4>
            <p>Founding guitarist who has been with Lance since the early days. Brings raw energy and fire to the live show.</p>
          </div>
          <div class="bio-section">
            <h4>Current Role</h4>
            <p>Lance Woolie’s go-to live guitarist. Also co-wrote the unreleased track <strong>“Gypsy Love”</strong> from the forthcoming album <em>The Whole Two Dollars</em>.</p>
          </div>
          <div class="bio-section">
            <h4>Style & Spirit</h4>
            <p>Young, hungry, and paints with his own brush — a true artist who adds his unique voice to every performance.</p>
          </div>
          <div class="fact-pill">Go-to live guitarist • Co-writer of “Gypsy Love” • Original Hogleg Band member</div>
        `,
        images: ["img/bandmembers/OriginalHOGLEGBANDchris&shane.png"]
      },
      {
        id: "tank",
        name: "Tank Viavatine",
        tagline: "M35 Abrams is the Big Guns",
        img: "img/bandmembers/TANk.jpg",
        grammys: 0,
        bio: `
          <div class="bio-section">
            <h4>Heavy Low-End Destroyer</h4>
            <p>Bass monster bringing thunderous grooves and funk/slap mastery to the Louisiana scene. Delivers unstoppable bottom end that shakes the Moon Saloon floor.</p>
          </div>
          <div class="fact-pill">Uptown Funk loops • Slap & pop specialist • Big Guns on bass</div>
        `,
        images: []
      },
      {
        id: "corban",
        name: "Corban Barnes",
        tagline: "Multi-Instrumentalist • Country Paradise Co-Producer",
        img: "img/bandmembers/CORBANGEETAR&Keys.png",
        grammys: 0,
        bio: `
          <div class="bio-section">
            <h4>Versatile Louisiana Player</h4>
            <p>Key contributor on keys, guitar, and production for Lance Woolie’s <em>Country Paradise</em> album alongside Brian Brignac and Chris Roberts.</p>
          </div>
          <div class="fact-pill">Co-producer • Multi-instrumentalist</div>
        `,
        images: []
      },
      {
        id: "boogie",
        name: "Jonathon \"Boogie\" Long",
        tagline: "Special Guest • Played \"Little Wing\" on the album",
        img: "img/bandmembers/Boogie.jpg",
        grammys: 0,
        isGuest: true,
        bio: `
          <div class="bio-section">
            <h4>Special Guest on Album</h4>
            <p>World-class blues-rock guitarist who recorded the guitar solo for "Little Wing" on Lance Woolie’s album.</p>
          </div>
          <div class="bio-section">
            <h4>About Boogie Long</h4>
            <p>2011 Guitar Center King of the Blues winner, frequent New Orleans Jazz & Heritage Festival performer, and Louisiana Music Hall of Fame inductee.</p>
          </div>
          <div class="fact-pill">Special Guest • Studio "Little Wing" guitarist</div>
        `,
        images: []
      }
    ];

    function renderCrew() {
      const container = document.getElementById('crew-roster');
      let html = '';
      crew.forEach(member => {
        const guestClass = member.isGuest ? ' guest' : '';
        html += `
          <div class="member-card${guestClass}" onclick="scrollToMember('${member.id}')">
            <img src="${member.img}" alt="${member.name}">
            <h5>${member.name}</h5>
            <div class="tagline">${member.tagline}</div>
          </div>`;
      });
      container.innerHTML = html;
    }

    function renderTransmissions() {
      const container = document.getElementById('transmissions-container');
      let html = '';
      crew.forEach(member => {
        const trophyHTML = member.grammys > 0 ? `<div class="trophy-count">🏆${member.grammys}x</div>` : '';
        let extraImages = '';
        if (member.images && member.images.length) {
          extraImages = `<div class="thumb-carousel mt-3">
            ${member.images.map(src => `<img class="thumb-img" src="${src}" onclick="openModal('${src}')" alt="${member.name}">`).join('')}
          </div>`;
        }
        html += `
          <div class="transmission-card" id="block-${member.id}">
            <div class="transmission-header" onclick="toggleTransmission('${member.id}')">
              <img src="${member.img}" alt="${member.name}">
              <h3>${member.name} <span style="font-size:1.05rem; color:#ff99cc;">— ${member.tagline}</span></h3>
              <button class="expand-btn">OPEN TRANSMISSION</button>
              ${trophyHTML}
            </div>
            <div class="transmission-body">
              ${member.bio}
              ${extraImages}
            </div>
          </div>`;
      });
      container.innerHTML = html;
    }

    function toggleTransmission(id) {
      const card = document.getElementById(`block-${id}`);
      card.classList.toggle('expanded');
    }

    function scrollToMember(id) {
      const block = document.getElementById(`block-${id}`);
      if (block) {
        block.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(() => block.classList.add('expanded'), 500);
      }
    }

    function openModal(src) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:10002;';
      modal.innerHTML = `<img src="${src}" style="max-width:92%; max-height:92%; border-radius:16px; box-shadow:0 0 60px #00ffcc;" onclick="this.parentElement.remove()">`;
      document.body.appendChild(modal);
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCrew();
      renderTransmissions();

      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');
      const miniNav = document.getElementById('mini-nav');

      forwardVideo.src = '/video/origins-video-transition.mp4';
      reverseVideo.src = '/video/origins-video-reverse.mp4';

      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';

      let started = false;
      forwardVideo.oncanplaythrough = () => {
        if (started) return;
        started = true;
        forwardVideo.muted = true;
        forwardVideo.volume = 0.5;
        forwardVideo.play().catch(() => {});
      };

      const showContent = () => {
        overlay.style.display = 'none';
        content.classList.add('show');
        setTimeout(() => miniNav.classList.add('show'), 300);
      };

      setTimeout(() => {
        if (!started) showContent();
      }, 1400);

      forwardVideo.onended = showContent;

      // Mini-nav handler
      miniNav.addEventListener('click', (e) => {
        const img = e.target.closest('img');
        if (!img) return;
        const targetLink = img.getAttribute('data-link');
        const type = img.getAttribute('data-type');
        if (!targetLink) return;

        if (type === 'home') {
          miniNav.classList.add('bounce-out');
          setTimeout(() => {
            overlay.style.display = 'block';
            forwardVideo.style.display = 'none';
            reverseVideo.style.display = 'block';
            reverseVideo.currentTime = 0;
            reverseVideo.volume = 0.5;
            reverseVideo.play().then(() => {
              reverseVideo.onended = () => window.location.href = targetLink;
            }).catch(() => window.location.href = targetLink);
          }, 520);
        } else {
          window.location.href = targetLink;
        }
      });
    });
  </script>
</body>
</html>
