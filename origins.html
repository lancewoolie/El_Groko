<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Origins - Grokipedia Lite | Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/origins-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding: 0;
    }

    /* New Mini-Nav - Exact match to Music page */
    .mini-nav {
      position: fixed;
      top: 12px;
      left: 20px;
      z-index: 10000;
      background: rgba(10, 15, 35, 0.92);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.6),
                  inset 0 0 20px rgba(255, 0, 170, 0.3);
      backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-80px);
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.6s ease;
    }
    .mini-nav.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .mini-nav.bounce-out {
      transition: transform 0.55s cubic-bezier(0.68, -0.85, 0.32, 1.85) !important;
      transform: translateY(-180px) scale(0.6) rotate(-8deg) !important;
    }
    .mini-nav img {
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 8px #00ffcc);
    }
    .mini-nav img:hover {
      transform: scale(1.15) translateY(-3px);
      filter: drop-shadow(0 0 20px #ff00aa);
    }
    .mini-nav .doors {
      width: 52px;
      height: 46px;
    }

    .content-overlay {
      background: rgba(0, 0, 0, 0.75);
      min-height: 100vh;
      padding-top: 95px;   /* Important: space for mini-nav */
    }

    .grokipedia-tab {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10001;
      background: rgba(10, 20, 50, 0.85);
      border: 2px solid #00ffcc;
      color: #ff00aa;
      padding: 6px 18px;
      border-radius: 30px 0 30px 30px;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .grokipedia-tab:hover {
      border-color: #ff00aa;
      color: #00ffcc;
      box-shadow: 0 0 35px rgba(255, 0, 170, 0.8);
      transform: scale(1.05);
    }

    /* Your original Origins card styles - kept intact */
    .hero-origins {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 30px 0 40px;
      gap: 40px;
    }
    .hero-origins .doors {
      width: 130px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .hero-origins .doors:hover { transform: scale(1.08); }
    .crew-roster {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }
    .member-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 0.9rem;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
      transition: all 0.4s ease;
      cursor: pointer;
    }
    .member-card:hover {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 0 60px rgba(255, 0, 170, 0.8);
      border-color: #ff00aa;
    }
    .member-card img {
      width: 100%;
      height: 165px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid #00ffcc;
      margin-bottom: 0.8rem;
    }
    .member-card h5 {
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-bottom: 0.3rem;
      font-size: 1.05rem;
    }
    .member-card .tagline {
      font-size: 0.9rem;
      color: #ff99cc;
      font-style: italic;
    }
    .member-card.guest {
      border: 3px solid #ff99cc;
      box-shadow: 0 0 30px rgba(255, 153, 204, 0.5);
      transform: scale(0.92);
    }
    .transmission-card {
      background: rgba(10, 20, 50, 0.92);
      border: 3px solid #00ffcc;
      border-radius: 24px;
      padding: 1.6rem;
      margin-bottom: 1.8rem;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.7);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }
    .transmission-card:hover {
      box-shadow: 0 0 70px rgba(255, 0, 170, 0.6);
    }
    .trophy-count {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 1.45rem;
      background: rgba(10, 20, 50, 0.92);
      padding: 4px 14px;
      border-radius: 20px;
      border: 2px solid #ffd700;
      color: #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
      z-index: 2;
    }
    .transmission-header {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
      position: relative;
      padding-right: 70px;
    }
    .transmission-header img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #00ffcc;
      flex-shrink: 0;
    }
    .transmission-header h3 {
      color: #f0f0f0;
      text-shadow: 0 0 20px #00ffcc;
      margin: 0;
      flex-grow: 1;
      font-size: 1.35rem;
    }
    .expand-btn {
      background: #ff00aa;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.95rem;
    }
    .expand-btn:hover {
      background: #ff66cc;
      transform: scale(1.08);
    }
    .transmission-body {
      display: none;
      margin-top: 1.8rem;
      padding-top: 1.4rem;
      border-top: 1px dashed rgba(0, 255, 204, 0.5);
      line-height: 1.8;
    }
    .transmission-card.expanded .transmission-body {
      display: block;
    }
    .transmission-card.expanded .expand-btn {
      background: #00ffcc;
      color: #112233;
    }
    .bio-section {
      margin-bottom: 1.6rem;
    }
    .bio-section h4 {
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-bottom: 0.7rem;
    }
    .fact-pill {
      display: inline-block;
      background: rgba(255, 0, 170, 0.2);
      border: 1px solid #ff00aa;
      color: #ffccdd;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.92rem;
      margin: 6px 4px 6px 0;
    }
  </style>
</head>
<body>
  <!-- New Mini-Nav - Same as Music page -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/hourglass-origins-nav.png" data-link="origins.html" data-type="dest" data-label="Origins">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="OnlyFans Zone">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/contact-earth-trophy-nav.png" data-link="contact.html" data-type="dest" data-label="Contact">
  </div>

  <!-- GROKIpediaLite MINI APP TAB -->
  <div class="grokipedia-tab">GROKIpediaLite</div>

  <!-- VIDEO TRANSITION OVERLAY -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;overflow:hidden;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <div class="hero-origins container">
        <img id="saloon-doors-back" src="/img/moonsaloon/saloon-doors-nav.png" class="doors" alt="Back to Saloon">
        <div class="flex-grow-1 text-center">
          <h1 style="color:#ff00aa; text-shadow: 0 0 50px #ff00aa; font-size: 3.2rem; margin:0;">GROKIPEDIA LITE</h1>
          <p style="color:#00ffcc; font-size:1.4rem; margin:0;">Origins Transmissions • Shackleton Crater Archive</p>
        </div>
      </div>
      <div class="container py-4">
        <h2 class="text-center mb-4" style="color:#00ffcc; text-shadow:0 0 30px #00ffcc;">THE CREW OF THE MOON SALOON</h2>
        <div class="crew-roster" id="crew-roster"></div>
        <div id="transmissions-container"></div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    // === FULL CREW ARRAY (your original - unchanged) ===
    const crew = [
      { id: "lance", name: "Lance Woolie", tagline: "Captain • Founder • Swamp-Country Troubadour", img: "img/bandmembers/lance_too_drunk_bts_recordstore.png", grammys: 0, bio: `...your full lance bio...`, images: [] },
      { id: "brent", name: "Brent Mason", tagline: "12× ACM Guitarist of the Year • Most Recorded Guitarist in History", img: "img/bandmembers/Brent Mason LIVE.png", grammys: 1, bio: `...`, images: [] },
      { id: "brian", name: "Brian Brignac", tagline: "Drummer • Producer • Brignac Lane Studios", img: "img/bandmembers/BrianBrignac_TabBenoit.png", grammys: 1, bio: `...`, images: [] },
      { id: "shane", name: "Shane Reid", tagline: "Go-To Live Guitarist • Co-Writer of \"Gypsy Love\"", img: "img/bandmembers/ShaneReid.jpg", grammys: 0, bio: `...`, images: ["img/bandmembers/OriginalHOGLEGBANDchris&shane.png"] },
      { id: "tank", name: "Tank Viavatine", tagline: "M35 Abrams is the Big Guns", img: "img/bandmembers/TANk.jpg", grammys: 0, bio: `...`, images: [] },
      { id: "corban", name: "Corban Barnes", tagline: "Multi-Instrumentalist • Country Paradise Co-Producer", img: "img/bandmembers/CORBANGEETAR&Keys.png", grammys: 0, bio: `...`, images: [] },
      { id: "boogie", name: "Jonathon \"Boogie\" Long", tagline: "Special Guest • Played \"Little Wing\" on the album", img: "img/bandmembers/Boogie.jpg", grammys: 0, isGuest: true, bio: `...`, images: [] }
    ];

    // Render functions (your original)
    function renderCrew() {
      const container = document.getElementById('crew-roster');
      let html = '';
      crew.forEach(member => {
        const guestClass = member.isGuest ? ' guest' : '';
        html += `<div class="member-card${guestClass}" onclick="scrollToMember('${member.id}')">
          <img src="${member.img}" alt="${member.name}">
          <h5>${member.name}</h5>
          <div class="tagline">${member.tagline}</div>
        </div>`;
      });
      container.innerHTML = html;
    }

    function renderTransmissions() {
      const container = document.getElementById('transmissions-container');
      let html = '';
      crew.forEach(member => {
        const trophyHTML = member.grammys > 0 ? `<div class="trophy-count">🏆${member.grammys}x</div>` : '';
        let extraImages = '';
        if (member.images && member.images.length) {
          extraImages = `<div class="thumb-carousel mt-3">${member.images.map(src => `<img class="thumb-img" src="${src}" onclick="openModal('${src}')" alt="${member.name}">`).join('')}</div>`;
        }
        html += `<div class="transmission-card" id="block-${member.id}">
          <div class="transmission-header" onclick="toggleTransmission('${member.id}')">
            <img src="${member.img}" alt="${member.name}">
            <h3>${member.name} <span style="font-size:1.05rem; color:#ff99cc;">— ${member.tagline}</span></h3>
            <button class="expand-btn">OPEN TRANSMISSION</button>
            ${trophyHTML}
          </div>
          <div class="transmission-body">
            ${member.bio}
            ${extraImages}
          </div>
        </div>`;
      });
      container.innerHTML = html;
    }

    function toggleTransmission(id) { document.getElementById(`block-${id}`).classList.toggle('expanded'); }
    function scrollToMember(id) {
      const block = document.getElementById(`block-${id}`);
      if (block) {
        block.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(() => block.classList.add('expanded'), 500);
      }
    }
    function openModal(src) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:10002;';
      modal.innerHTML = `<img src="${src}" style="max-width:92%; max-height:92%; border-radius:16px; box-shadow:0 0 60px #00ffcc;" onclick="this.parentElement.remove()">`;
      document.body.appendChild(modal);
    }

    // Main logic - combined from Music page + your original transition
    document.addEventListener('DOMContentLoaded', () => {
      renderCrew();
      renderTransmissions();

      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');
      const miniNav = document.getElementById('mini-nav');

      forwardVideo.src = '/video/origins-video-transition.mp4';
      reverseVideo.src = '/video/origins-video-reverse.mp4';

      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';

      let started = false;
      forwardVideo.oncanplaythrough = () => {
        if (started) return;
        started = true;
        forwardVideo.muted = true;
        forwardVideo.volume = 0.5;
        forwardVideo.play().catch(() => {});
      };

      const showContent = () => {
        overlay.style.display = 'none';
        content.classList.add('show');
        setTimeout(() => miniNav.classList.add('show'), 300);
      };

      setTimeout(() => {
        if (!started) showContent();
      }, 1400);

      forwardVideo.onended = showContent;

      // Mini-nav clicks (exact from Music page)
      miniNav.addEventListener('click', (e) => {
        const img = e.target.closest('img');
        if (!img) return;
        const targetLink = img.getAttribute('data-link');
        const type = img.getAttribute('data-type');
        if (!targetLink) return;

        if (type === 'home') {
          miniNav.classList.add('bounce-out');
          setTimeout(() => {
            overlay.style.display = 'block';
            forwardVideo.style.display = 'none';
            reverseVideo.style.display = 'block';
            reverseVideo.currentTime = 0;
            reverseVideo.volume = 0.5;
            reverseVideo.play().then(() => {
              reverseVideo.onended = () => window.location.href = targetLink;
            }).catch(() => window.location.href = targetLink);
          }, 520);
        } else {
          window.location.href = targetLink;
        }
      });

      // Saloon doors back
      document.getElementById('saloon-doors-back').addEventListener('click', (e) => {
        e.preventDefault();
        overlay.style.display = 'block';
        forwardVideo.style.display = 'none';
        reverseVideo.style.display = 'block';
        reverseVideo.currentTime = 0;
        reverseVideo.volume = 0.5;
        reverseVideo.play().catch(() => {});
        reverseVideo.onended = () => window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
