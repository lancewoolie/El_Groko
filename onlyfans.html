  <style>
    body {
      background: url('/img/moonsaloon/friends-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-top: 95px;
      padding-bottom: 100px;
      touch-action: manipulation;
    }

    /* MINI NAV */
    .mini-nav {
      position: fixed;
      top: 12px;
      left: 20px;
      z-index: 10000;
      background: rgba(10, 15, 35, 0.92);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.6),
                  inset 0 0 20px rgba(255, 0, 170, 0.3);
      backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-80px);
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), 
                  opacity 0.6s ease;
    }

    .mini-nav.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .mini-nav img {
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 8px #00ffcc);
    }

    .mini-nav img:hover {
      transform: scale(1.15) translateY(-3px);
      filter: drop-shadow(0 0 20px #ff00aa);
    }

    .mini-nav .doors {
      width: 52px;
      height: 46px;
    }

    /* Tooltip Labels */
    .mini-nav img::after {
      content: attr(data-label);
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #00ffcc;
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 10001;
      border: 1px solid #00ffcc;
      text-shadow: 0 0 8px #00ffcc;
      margin-top: 8px;
    }

    .mini-nav img:hover::after {
      opacity: 1;
    }

    .content {
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .content.show { opacity: 1; }

    .content-overlay {
      background: url('/img/moonsaloon/friends-base-bg.jpg') center/cover no-repeat fixed !important;
      min-height: 100vh;
    }

    /* SEXY SUBSCRIBER CARD */
    .friend-card {
      background: rgba(10, 25, 50, 0.75);
      border: 3px solid #00ffcc;
      border-radius: 20px;
      padding: 3rem;
      max-width: 620px;
      margin: 0 auto;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.5),
                  inset 0 0 40px rgba(255, 0, 170, 0.25);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .friend-card h2 {
      color: #00ffcc;
      text-shadow: 0 0 25px #00ffcc;
      font-size: 2.4rem;
    }

    .friend-card p {
      color: #f0f0f0;
      font-size: 1.25rem;
      line-height: 1.8;
    }

    .text-muted, .small {
      color: #e0e0e0 !important;
      opacity: 0.95;
    }

    /* Spanish Honeypot - Less obvious to AI */
    .campo-extra {
      position: absolute;
      left: -9999px;
      top: -9999px;
      opacity: 0;
      height: 1px;
      width: 1px;
    }
  </style>
</head>
<body>

  <!-- MINI NAV -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans Zone">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music & Video">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/hourglass-origins-nav.png" data-link="origins.html" data-type="dest" data-label="Origins">
    <img src="/img/moonsaloon/contact-earth-trophy-nav.png" data-link="contact.html" data-type="dest" data-label="Contact">
  </div>

  <!-- VIDEO TRANSITION OVERLAY -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
    <video id="reverse-video" playsinline preload="auto" muted style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <div class="container py-5">
        <div class="friend-card">
          <h2>Welcome to the Only Fans Zone</h2>
          <p class="lead mt-4">Join the inner circle. Get first dibs on new drops, secret shows, unreleased tracks, and bayou insider vibes.</p>
    
          <form id="newsletter-form" class="row g-3 justify-content-center mt-4">
            <!-- Spanish Honeypot - Much less obvious to AI -->
            <input type="text" id="campo_extra" name="campo_extra" class="campo-extra" autocomplete="off" tabindex="-1">
            
            <div class="col-md-6">
              <input type="text" class="form-control" id="first-name" placeholder="First Name" required>
            </div>
            <div class="col-md-6">
              <input type="text" class="form-control" id="last-name" placeholder="Last Name" required>
            </div>
            <div class="col-md-8">
              <input type="email" class="form-control" id="signup-email" placeholder="your@bayou.com" required>
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button type="submit" class="btn btn-success w-100">Do it. Join the Zone</button>
            </div>
          </form>
          <div id="newsletter-success" class="success-message mt-3" style="display:none; color:#00ffcc;">
            You're in the Only Fans Zone — exclusive twang incoming!
          </div>
          <p class="text-center small mt-4">For real — secure, no spam, ever.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    const firebaseConfig = {
      apiKey: "AIzaSyAJQMdogiDwB0oLf2I_Jp-6NSLTDcXvVcQ",
      authDomain: "lance-woolie-webfarm.firebaseapp.com",
      projectId: "lance-woolie-webfarm",
      storageBucket: "lance-woolie-webfarm.firebasestorage.app",
      messagingSenderId: "278461194969",
      appId: "1:278461194969:web:a2a03c9d27ccbb670814c8",
      measurementId: "G-D734JL7BFR"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
    window.serverTimestamp = serverTimestamp;
  </script>

  <!-- Newsletter Form with Spanish Honeypot -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const newsletterForm = document.getElementById('newsletter-form');
      if (!newsletterForm) return;

      newsletterForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const firstName = document.getElementById('first-name').value.trim();
        const lastName = document.getElementById('last-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const honeypot = document.getElementById('campo_extra').value.trim();   // Spanish honeypot

        // Honeypot check
        if (honeypot !== '') {
          console.log('Bot detected');
          return; // Silent block
        }

        if (!firstName || !lastName || !email) {
          alert('Please fill in all fields.');
          return;
        }

        const lowerEmail = email.toLowerCase();
        if (
          lowerEmail.includes('..') || (lowerEmail.match(/\./g)||[]).length > 4 ||
          lowerEmail.includes('grok') || lowerEmail.includes('temp') ||
          lowerEmail.includes('disposable') || lowerEmail.length < 8
        ) {
          alert('Please use a valid personal email address.');
          return;
        }

        try {
          await window.addDoc(window.collection(window.db, 'subscribers'), {
            firstName, lastName, email,
            type: 'onlyfanszone',
            timestamp: window.serverTimestamp()
          });
          document.getElementById('newsletter-success').style.display = 'block';
          newsletterForm.reset();
        } catch (error) {
          console.error(error);
          alert('Signup snag — try again or email directly.');
        }
      });
    });
  </script>

  <!-- MINI NAV + TRANSITION LOGIC -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');
      const miniNav = document.getElementById('mini-nav');

      forwardVideo.src = '/video/subscribe-video-transition.mp4';
      reverseVideo.src = '/video/subscribe-video-reverse.mp4';

      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';
      let transitionStarted = false;

      forwardVideo.oncanplaythrough = () => {
        if (transitionStarted) return;
        transitionStarted = true;
        forwardVideo.muted = true;
        forwardVideo.volume = 0.5;
        forwardVideo.play().catch(finishForwardTransition);
      };

      forwardVideo.onended = finishForwardTransition;

      function finishForwardTransition() {
        overlay.style.display = 'none';
        content.classList.add('show');

        setTimeout(() => {
          miniNav.classList.add('show');
        }, 2250);
      }

      setTimeout(() => {
        if (!miniNav.classList.contains('show')) miniNav.classList.add('show');
      }, 6000);

      miniNav.addEventListener('click', (e) => {
        const img = e.target.closest('img');
        if (!img) return;

        const targetLink = img.getAttribute('data-link');
        const type = img.getAttribute('data-type');

        if (!targetLink) return;
        e.preventDefault();

        if (type === 'home') {
          overlay.style.display = 'block';
          forwardVideo.style.display = 'none';
          reverseVideo.style.display = 'block';
          reverseVideo.currentTime = 0;
          reverseVideo.volume = 0.5;
          reverseVideo.play()
            .then(() => { reverseVideo.onended = () => window.location.href = targetLink; })
            .catch(() => window.location.href = targetLink);
        } else {
          window.location.href = targetLink;
        }
      });
    });
  </script>
</body>
