<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Only Fans Zone - Lance Woolie’s Moon Saloon</title>
  <meta name="description" content="Join Lance Woolie’s Only Fans Zone. Get first dibs on new drops, secret shows, unreleased tracks, and bayou insider vibes.">

  <!-- Open Graph + Twitter (unchanged) -->
  <meta property="og:title" content="Only Fans Zone - Lance Woolie’s Moon Saloon">
  <meta property="og:description" content="Join the inner circle. Get first dibs on new drops, secret shows, unreleased tracks, and bayou insider vibes.">
  <meta property="og:image" content="https://lancewoolie.com/img/onlyfans.jpg">
  <meta property="og:url" content="https://lancewoolie.com/onlyfans.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Lance Woolie’s Moon Saloon">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Only Fans Zone - Lance Woolie’s Moon Saloon">
  <meta name="twitter:description" content="Join the inner circle. Get first dibs on new drops, secret shows, unreleased tracks, and bayou insider vibes.">
  <meta name="twitter:image" content="https://lancewoolie.com/img/onlyfans.jpg">

  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">

  <style>
    body {
      background: url('/img/moonsaloon/friends-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-top: 95px;
      padding-bottom: 100px;
      touch-action: manipulation;
    }

    /* MINI NAV - Drop-in with subtle bounce */
    .mini-nav {
      position: fixed;
      top: 12px;
      left: 20px;
      z-index: 10000;
      background: rgba(10, 15, 35, 0.92);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.6),
                  inset 0 0 20px rgba(255, 0, 170, 0.3);
      backdrop-filter: blur(12px);
      
      opacity: 0;
      visibility: hidden;
      transform: translateY(-80px);        /* Start way above */
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), 
                  opacity 0.6s ease;
    }

    .mini-nav.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);            /* Drop down with bounce */
    }

    .mini-nav img {
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 8px #00ffcc);
    }

    .mini-nav img:hover {
      transform: scale(1.15) translateY(-3px);
      filter: drop-shadow(0 0 20px #ff00aa);
    }

    .mini-nav .doors {
      width: 52px;
      height: 46px;
    }

    /* Tooltip Labels */
    .mini-nav img::after {
      content: attr(data-label);
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #00ffcc;
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 10001;
      border: 1px solid #00ffcc;
      text-shadow: 0 0 8px #00ffcc;
      margin-top: 8px;
    }

    .mini-nav img:hover::after {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- MINI NAV -->
  <div class="mini-nav" id="mini-nav">
    <img src="/img/moonsaloon/saloon-doors-nav.png" class="doors" data-link="index.html" data-type="home" data-label="Moon Saloon">
    <img src="/img/moonsaloon/raccoon-subscribe-nav.png" data-link="onlyfans.html" data-type="dest" data-label="Only Fans Zone">
    <img src="/img/moonsaloon/holo-calendar-events-nav.png" data-link="events.html" data-type="dest" data-label="Events">
    <img src="/img/moonsaloon/music-video-neon-nav.png" data-link="music.html" data-type="dest" data-label="Music & Video">
    <img src="/img/moonsaloon/cowboy-hat-merch-nav.png" data-link="merch.html" data-type="dest" data-label="Merch">
    <img src="/img/moonsaloon/hourglass-origins-nav.png" data-link="origins.html" data-type="dest" data-label="Origins">
    <img src="/img/moonsaloon/contact-earth-trophy-nav.png" data-link="contact.html" data-type="dest" data-label="Contact">
  </div>

  <!-- VIDEO TRANSITION OVERLAY -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
    <video id="reverse-video" playsinline preload="auto" muted style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <div class="container py-5">
        <div class="friend-card">
          <h2>Welcome to the Only Fans Zone</h2>
          <p class="lead mt-4">Join the inner circle. Get first dibs on new drops, secret shows, unreleased tracks, and bayou insider vibes.</p>
    
          <form id="newsletter-form" class="row g-3 justify-content-center mt-4">
            <input type="text" id="website_url" name="website_url" class="honeypot" autocomplete="off" tabindex="-1">
            <div class="col-md-6"><input type="text" class="form-control" id="first-name" placeholder="First Name" required></div>
            <div class="col-md-6"><input type="text" class="form-control" id="last-name" placeholder="Last Name" required></div>
            <div class="col-md-8"><input type="email" class="form-control" id="signup-email" placeholder="your@bayou.com" required></div>
            <div class="col-md-4 d-flex align-items-end">
              <button type="submit" class="btn btn-success w-100">Do it. Join the Zone</button>
            </div>
          </form>
          <div id="newsletter-success" class="success-message mt-3" style="display:none; color:#00ffcc;">
            You're in the Only Fans Zone — exclusive twang incoming!
          </div>
          <p class="text-center small mt-4">For real — secure, no spam, ever.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder" class="tight-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

  <!-- Firebase + Newsletter Form (same as before) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    const firebaseConfig = { /* your config */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
    window.serverTimestamp = serverTimestamp;
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');
      const miniNav = document.getElementById('mini-nav');

      forwardVideo.src = '/video/subscribe-video-transition.mp4';
      reverseVideo.src = '/video/subscribe-video-reverse.mp4';

      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';

      let transitionStarted = false;

      forwardVideo.oncanplaythrough = () => {
        if (transitionStarted) return;
        transitionStarted = true;
        forwardVideo.muted = true;
        forwardVideo.volume = 0.5;
        forwardVideo.play().catch(finishForwardTransition);
      };

      forwardVideo.onended = finishForwardTransition;

      function finishForwardTransition() {
        overlay.style.display = 'none';
        content.classList.add('show');

        // Drop-in the mini nav 5 seconds after transition ends
        setTimeout(() => {
          miniNav.classList.add('show');
        }, 5000);
      }

      // Safety fallback
      setTimeout(() => {
        if (!miniNav.classList.contains('show')) miniNav.classList.add('show');
      }, 8000);

      // Click handler (same as before)
      miniNav.addEventListener('click', (e) => {
        const img = e.target.closest('img');
        if (!img) return;

        const targetLink = img.getAttribute('data-link');
        const type = img.getAttribute('data-type');

        if (!targetLink) return;
        e.preventDefault();

        if (type === 'home') {
          overlay.style.display = 'block';
          forwardVideo.style.display = 'none';
          reverseVideo.style.display = 'block';
          reverseVideo.currentTime = 0;
          reverseVideo.volume = 0.5;
          reverseVideo.play()
            .then(() => { reverseVideo.onended = () => window.location.href = targetLink; })
            .catch(() => window.location.href = targetLink);
        } else {
          window.location.href = targetLink;
        }
      });
    });
  </script>
</body>
</html>
