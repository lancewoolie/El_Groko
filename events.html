<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Events - Lance Woolie</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
</head>
<body>
  <div id="nav-placeholder"></div>
  <div id="transition-overlay">
    <video id="forward-video" class="transition-video" playsinline preload="auto"></video>
    <video id="reverse-video" class="transition-video" playsinline preload="auto"></video>
  </div>
  <div class="content-overlay">
    <div class="content show" id="main-content">
      <div class="hero-events">
        <img id="saloon-doors-back" src="/img/moonsaloon/saloon-doors-nav.png" class="doors" alt="Back to Saloon">
        <div class="title-area">
          <h1>Live Events</h1>
          <p class="lead">Catch Lance Woolie live on the road</p>
        </div>
      </div>
      <div class="container py-5" id="events-grid">
        <section id="upcoming-events">
          <h2 class="text-center mb-4">Upcoming Events</h2>
          <div id="upcoming-list"></div>
        </section>
        <div class="section-divider"></div>
        <section id="past-events" class="past-events">
          <h2 class="text-center mb-4">Past Events</h2>
          <div class="row" id="past-list"></div>
        </section>
        <div class="text-center mt-5">
          <p>Want to book Lance for your next event? <a href="contact.html">Get in touch</a> today!</p>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    const eventsData = [
      // PASTE YOUR FULL 25+ EVENTS ARRAY HERE (from your original code)
      // Example (replace with all):
      { date: '09/13/2025', eventName: 'Court To Table Baton Rouge Presents Lance Woolie w/ Shane Reid', venue: '7477 Burbank Dr', fullVenue: '7477 Burbank Dr', city: 'Baton Rouge, LA 70820', time: '11:00 PM', description: 'A night of music and mingling with special guest Shane Reid.', tickets: 'https://www.facebook.com/lancewooliemusic/events', imageSrc: 'https://lancewoolie.github.io/El_Groko/img/Setp13.jpg', imageLink: 'https://www.facebook.com/lancewooliemusic/events', isUpcoming: true },
      { date: '07/04/2024', eventName: 'Too Drunk release', venue: '', fullVenue: '', city: '', time: '12:00 AM', description: 'Release party for Too Drunk single.', tickets: 'https://www.facebook.com/lancewooliemusic/events', imageSrc: 'https://lancewoolie.github.io/El_Groko/img/TooDrunkmenu.jpg', imageLink: 'https://www.facebook.com/lancewooliemusic/events', isUpcoming: false },
      // ... all your other events ...
    ];

    const currentDate = new Date();

    function generateUpcomingCard(event) {
      return `
        <div class="card mb-3">
          <div class="row g-0">
            <div class="col-md-4">
              <img src="${event.imageSrc}" class="img-fluid rounded-start" alt="${event.eventName}">
            </div>
            <div class="col-md-8">
              <div class="card-body">
                <h5 class="card-title">${event.eventName}</h5>
                <p class="card-text">${event.description}</p>
                <p class="card-text"><small class="text-muted">${event.date} - ${event.time} @ ${event.fullVenue || event.venue}</small></p>
                <a href="${event.tickets}" class="btn btn-success" target="_blank">Tickets</a>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function generatePastCard(event) {
      return `
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card h-100">
            <img src="${event.imageSrc}" class="card-img-top" alt="${event.eventName}">
            <div class="card-body">
              <h5 class="card-title">${event.eventName}</h5>
              <p class="card-text">${event.description}</p>
              <p class="card-text"><small class="text-muted">${event.date} - ${event.time}</small></p>
            </div>
          </div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const sortedEvents = eventsData.sort((a, b) => new Date(b.date) - new Date(a.date));
      const upcomingEvents = sortedEvents.filter(e => new Date(e.date) > currentDate && e.isUpcoming);
      const pastEvents = sortedEvents.filter(e => new Date(e.date) <= currentDate);

      document.getElementById('upcoming-list').innerHTML = upcomingEvents.map(generateUpcomingCard).join('');
      document.getElementById('past-list').innerHTML = pastEvents.map(generatePastCard).join('');

      // REVERSE ONLY
      document.getElementById('saloon-doors-back').addEventListener('click', e => {
        e.preventDefault();
        const overlay = document.getElementById('transition-overlay');
        const reverseVideo = document.getElementById('reverse-video');
        reverseVideo.style.display = 'block';
        document.getElementById('forward-video').style.display = 'none';
        reverseVideo.src = '/video/events-video-reverse.mp4';
        reverseVideo.currentTime = 0;
        reverseVideo.volume = 0.5;
        overlay.style.display = 'block';
        reverseVideo.play().catch(() => {});
        reverseVideo.onended = () => { window.location.href = 'index.html'; };
      });
    });
  </script>
</body>
</html>
