<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Events - Lance Woolie’s Moon Saloon</title>
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/events-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 80px;
    }
    .content-overlay {
      background: rgba(0, 0, 0, 0.78);
      min-height: 100vh;
      padding-top: 100px;
    }

    /* New elongated mini-nav */
    .mini-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 15, 40, 0.95);
      border-bottom: 3px solid #00ffcc;
      z-index: 10000;
      padding: 12px 0;
    }
    .mini-nav-container {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }
    .mini-nav a {
      color: #00ffcc;
      text-decoration: none;
      font-size: 1.1rem;
      padding: 8px 18px;
      border: 2px solid transparent;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .mini-nav a:hover {
      border-color: #ff00aa;
      color: #ff00aa;
      background: rgba(255, 0, 170, 0.1);
    }

    /* Hero */
    .hero-events {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0 50px;
    }
    .hero-events h1 {
      font-size: 3.4rem;
      color: #ff00aa;
      text-shadow: 0 0 40px #ff00aa;
      margin: 0;
      text-align: center;
    }
    .hero-events .lead {
      color: #00ffcc;
      font-size: 1.45rem;
      text-align: center;
      margin-top: 10px;
    }

    /* Sexy cards - matching current style */
    .upcoming-card, .past-card {
      background: rgba(8, 15, 45, 0.96);
      border: 4px solid #00ffcc;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.5);
      transition: all 0.4s ease;
    }
    .upcoming-card:hover, .past-card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 0 80px rgba(0, 255, 204, 0.9);
      border-color: #ff00aa;
    }
    .upcoming-card img, .past-card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }
    .section-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #00ffcc, transparent);
      margin: 60px 0;
    }
  </style>
</head>
<body>
  <!-- NEW ELONGATED MINI-NAV (no "Events" button) -->
  <nav class="mini-nav">
    <div class="mini-nav-container">
      <a href="index.html">Saloon</a>
      <a href="music.html">Music</a>
      <a href="merch.html">Merch</a>
      <a href="origins.html">Origins</a>
      <a href="onlyfans.html">OnlyFans Zone</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <!-- VIDEO TRANSITION OVERLAY -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;overflow:hidden;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

  <div class="content-overlay">
    <div class="content" id="main-content">
      <!-- HERO -->
      <div class="hero-events container">
        <div>
          <h1>LIVE EVENTS</h1>
          <p class="lead">Catch Lance Woolie on the road</p>
        </div>
      </div>

      <div class="container py-5">
        <!-- Upcoming Events -->
        <section id="upcoming-events">
          <h2 class="text-center mb-5" style="color:#00ffcc; text-shadow:0 0 30px #00ffcc;">UPCOMING EVENTS</h2>
          <div id="upcoming-list" class="row g-4"></div>
        </section>

        <div class="section-divider"></div>

        <!-- Past Events -->
        <section id="past-events">
          <h2 class="text-center mb-5" style="color:#ff99cc; text-shadow:0 0 20px #ff99cc;">PAST EVENTS</h2>
          <div id="past-list" class="row g-4"></div>
        </section>

        <div class="text-center mt-5">
          <p class="lead">Want to book Lance for your next event? <a href="contact.html" style="color:#00ffcc;">Get in touch</a> today!</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    // === YOUR ORIGINAL EVENTS DATA - PASTE THE FULL ARRAY HERE ===
    const eventsData = [
      { date: '2026-03-20', eventName: "Lance Woolie Live", venue: "Big J's Side Porch", city: 'Clinton, LA', time: '6pm', description: "Lance & JJ live at Big Js", tickets: 'https://www.facebook.com/events/1615279446373852', imageSrc: 'img/March20th2026WEB.jpg', imageLink: 'https://www.facebook.com/events/1615279446373852' },
      // ... paste ALL the rest of your eventsData array exactly as it was ...
      { date: '2024-07-04', eventName: 'Too Drunk release', venue: '', city: '', time: '12:00 AM', description: 'Release party for Too Drunk single.', tickets: 'https://www.facebook.com/lancewooliemusic/events', imageSrc: 'https://lancewoolie.github.io/El_Groko/img/TooDrunkmenu.jpg' }
    ];

    const currentDate = new Date();
    currentDate.setHours(0, 0, 0, 0);

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function generateUpcomingCard(event) {
      return `
        <div class="col-lg-4 col-md-6 mb-4">
          <div class="upcoming-card">
            <a href="${event.imageLink || event.tickets || '#'}" target="_blank">
              <img src="${event.imageSrc}" class="card-img-top" alt="${event.eventName}">
            </a>
            <div class="card-body p-4">
              <h4 class="card-title text-center mb-3" style="color:#00ffcc;">${event.eventName}</h4>
              <p class="card-text text-center mb-3">${event.description}</p>
              <p class="text-center mb-2"><strong>${formatDate(event.date)} • ${event.time}</strong></p>
              <p class="text-center mb-3">@ ${event.venue || event.city || 'Various Locations'}</p>
              ${event.tickets ? `<a href="${event.tickets}" class="btn btn-success w-100" target="_blank">Tickets / Info</a>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function generatePastCard(event) {
      return `
        <div class="col-lg-4 col-md-6 mb-4">
          <div class="past-card">
            <a href="${event.imageLink || event.tickets || '#'}" target="_blank">
              <img src="${event.imageSrc}" class="card-img-top" alt="${event.eventName}">
            </a>
            <div class="card-body p-4">
              <h5 class="card-title">${event.eventName}</h5>
              <p class="mb-1"><strong>${formatDate(event.date)}</strong></p>
              <p class="mb-1">${event.time || 'Time TBA'}</p>
              <p class="mb-2">@ ${event.venue || event.city || 'Various Locations'}</p>
              <p class="small mb-2">${event.description}</p>
              ${event.tickets ? `<a href="${event.tickets}" class="btn btn-outline-light btn-sm" target="_blank">More Info</a>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const sortedEvents = [...eventsData].sort((a, b) => new Date(b.date) - new Date(a.date));
      const upcoming = sortedEvents.filter(e => new Date(e.date) >= currentDate);
      const past = sortedEvents.filter(e => new Date(e.date) < currentDate);

      document.getElementById('upcoming-list').innerHTML = upcoming.length 
        ? upcoming.map(generateUpcomingCard).join('') 
        : '<p class="text-center lead mt-5">No upcoming events scheduled right now. Check back soon!</p>';

      document.getElementById('past-list').innerHTML = past.length 
        ? past.map(generatePastCard).join('') 
        : '<p class="text-center lead mt-5">No past events to display yet.</p>';

      // Reverse transition when clicking Saloon in mini-nav
      document.querySelectorAll('.mini-nav a[href="index.html"]').forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const overlay = document.getElementById('transition-overlay');
          const reverseVideo = document.getElementById('reverse-video');
          
          overlay.style.display = 'block';
          reverseVideo.style.display = 'block';
          reverseVideo.src = '/video/events-video-reverse.mp4';
          reverseVideo.currentTime = 0;
          reverseVideo.volume = 0.5;
          
          reverseVideo.play().catch(() => { window.location.href = 'index.html'; });

          const safety = setTimeout(() => { window.location.href = 'index.html'; }, 4800);

          reverseVideo.onended = () => {
            clearTimeout(safety);
            window.location.href = 'index.html';
          };
        });
      });
    });
  </script>
</body>
</html>
