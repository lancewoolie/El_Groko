<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    /* 🔒 CHAINED 🌕 Body & Background */
    body {
      margin: 0;
      padding: 0;
      background: #0a0f23;
    }
    .content-overlay {
      background: url('/img/moonsaloon/events-base-bg.jpg') center/cover no-repeat fixed;
      min-height: 100vh;
      padding-top: 95px;
    }
    @media (max-width: 991px) {
      .content-overlay {
        background-attachment: scroll;
        background-size: 130% auto;
        background-position: center top;
      }
    }

    /* 🔒 CHAINED 📱 Mini-Nav - Exact style from OnlyFans */
    .mini-nav {
      position: fixed;
      top: 12px;
      left: 20px;
      z-index: 10000;
      background: rgba(10, 15, 35, 0.92);
      border: 2px solid #00ffcc;
      border-radius: 50px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.6),
                  inset 0 0 20px rgba(255, 0, 170, 0.3);
      backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-80px);
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.6s ease;
    }
    .mini-nav.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .mini-nav.bounce-out {
      transition: transform 0.55s cubic-bezier(0.68, -0.85, 0.32, 1.85) !important;
      transform: translateY(-180px) scale(0.6) rotate(-8deg) !important;
    }
    .mini-nav img {
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 8px #00ffcc);
    }
    .mini-nav img:hover {
      transform: scale(1.15) translateY(-3px);
      filter: drop-shadow(0 0 20px #ff00aa);
    }
    .mini-nav .doors {
      width: 52px;
      height: 46px;
    }

    /* 🔒 CHAINED ✨ Content fade-in */
    .content {
      position: relative;
      z-index: 2;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .content.show { opacity: 1; }

    /* 🔒 CHAINED 🎴 Sexy neon cards */
    .upcoming-card, .past-card {
      background: rgba(8, 15, 45, 0.96);
      border: 4px solid #00ffcc;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 255, 204, 0.5);
      transition: all 0.4s ease;
    }
    .upcoming-card:hover, .past-card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 0 80px rgba(0, 255, 204, 0.9);
      border-color: #ff00aa;
    }
    .upcoming-card img, .past-card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }
    .section-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #00ffcc, transparent);
      margin: 60px 0;
    }
  </style>
</head>
<body>

  <!-- 🔒 CHAINED 📊 Mini-Nav - Icon style from OnlyFans (no current Events icon) -->
  <div class="mini-nav" id="mini-nav">

  <!-- 🔒 CHAINED 🎥 Video Transition Overlay -->
  <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;display:none;overflow:hidden;background:#000;">
    <video id="forward-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;"></video>
    <video id="reverse-video" playsinline preload="auto" style="width:100%;height:100%;object-fit:cover;display:none;"></video>
  </div>

        </div>

          <div id="upcoming-list" class="row g-4"></div>
        </section>

        <div class="section-divider"></div>

        <!-- 🔒 CHAINED 📜 Past Events -->
        <section id="past-events">

    </div>
  </div>

    ];

    const currentDate = new Date();
    currentDate.setHours(0, 0, 0, 0);

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function generateUpcomingCard(event) {
      return `
        <div class="col-lg-4 col-md-6 mb-4">
          <div class="upcoming-card">
            <a href="${event.imageLink || event.tickets || '#'}" target="_blank">
              <img src="${event.imageSrc}" class="card-img-top" alt="${event.eventName}">
            </a>
            <div class="card-body p-4">
              <h4 class="card-title text-center mb-3" style="color:#00ffcc;">${event.eventName}</h4>
              <p class="card-text text-center mb-3">${event.description}</p>
              <p class="text-center mb-2"><strong>${formatDate(event.date)} • ${event.time}</strong></p>
              <p class="text-center mb-3">@ ${event.venue || event.city || 'Various Locations'}</p>
              ${event.tickets ? `<a href="${event.tickets}" class="btn btn-success w-100" target="_blank">Tickets / Info</a>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function generatePastCard(event) {
      return `
        <div class="col-lg-4 col-md-6 mb-4">
          <div class="past-card">
            <a href="${event.imageLink || event.tickets || '#'}" target="_blank">
              <img src="${event.imageSrc}" class="card-img-top" alt="${event.eventName}">
            </a>
            <div class="card-body p-4">
              <h5 class="card-title">${event.eventName}</h5>
              <p class="mb-1"><strong>${formatDate(event.date)}</strong></p>
              <p class="mb-1">${event.time || 'Time TBA'}</p>
              <p class="mb-2">@ ${event.venue || event.city || 'Various Locations'}</p>
              <p class="small mb-2">${event.description}</p>
              ${event.tickets ? `<a href="${event.tickets}" class="btn btn-outline-light btn-sm" target="_blank">More Info</a>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      const forwardVideo = document.getElementById('forward-video');
      const reverseVideo = document.getElementById('reverse-video');
      const content = document.getElementById('main-content');
      const miniNav = document.getElementById('mini-nav');

      // Forward transition on load
      forwardVideo.src = '/video/events-video-transition.mp4';
      reverseVideo.src = '/video/events-video-reverse.mp4';
      overlay.style.display = 'block';
      forwardVideo.style.display = 'block';
      forwardVideo.muted = true;
      forwardVideo.play().catch(() => {});

      // Safety timeout + delayed mini-nav show (exact OnlyFans behavior)
      setTimeout(() => {
        overlay.style.display = 'none';
        content.classList.add('show');
        setTimeout(() => miniNav.classList.add('show'), 400);
      }, 5000);

      // Mini-nav click handler with bounce-out for Saloon
      miniNav.addEventListener('click', (e) => {
        const img = e.target.closest('img');
        if (!img) return;

        const targetLink = img.getAttribute('data-link');
        const type = img.getAttribute('data-type');
        if (!targetLink) return;

        e.preventDefault();

        if (type === 'home') {
          miniNav.classList.add('bounce-out');
          setTimeout(() => {
            overlay.style.display = 'block';
            forwardVideo.style.display = 'none';
            reverseVideo.style.display = 'block';
            reverseVideo.currentTime = 0;
            reverseVideo.volume = 0.5;
            reverseVideo.play()
              .then(() => { reverseVideo.onended = () => window.location.href = targetLink; })
              .catch(() => window.location.href = targetLink);
          }, 520);
        } else {
          window.location.href = targetLink;
        }
      });

      // Populate events
      const sortedEvents = [...eventsData].sort((a, b) => new Date(b.date) - new Date(a.date));
      const upcoming = sortedEvents.filter(e => new Date(e.date) >= currentDate);
      const past = sortedEvents.filter(e => new Date(e.date) < currentDate);

      document.getElementById('upcoming-list').innerHTML = upcoming.length 
        ? upcoming.map(generateUpcomingCard).join('') 
        : '<p class="text-center lead mt-5">No upcoming events scheduled right now. Check back soon!</p>';

      document.getElementById('past-list').innerHTML = past.length 
        ? past.map(generatePastCard).join('') 
        : '<p class="text-center lead mt-5">No past events to display yet.</p>';
    });
  </script>
</body>
