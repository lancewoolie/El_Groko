    body {
      background: url('/img/moonsaloon/events-base-bg.jpg') center/cover no-repeat fixed !important;
      color: #E0E0E0;
      font-family: 'Georgia', serif;
      margin: 0;
      padding-bottom: 100px;
    }
    #intro-video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 9999;
      display: none;
      background: #000;
    }
    .content {
      position: relative;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .content.show { opacity: 1; }
    .content-overlay {
      background: rgba(0, 15, 40, 0.18);
      min-height: 100vh;
      padding-top: 120px;
    }

    /* HERO – Doors static top-left */
    .hero-events {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 60px 0 40px;
      flex-wrap: wrap;
    }
    .hero-events .doors {
      width: 120px;
      flex-shrink: 0;
    }
    .hero-events .title-area {
      text-align: left;
    }
    .hero-events h1 {
      font-size: 3.2rem;
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc, 0 0 40px #ff00aa;
      margin: 0;
    }

    /* Futuristic Cards */
    .card {
      background: rgba(10, 25, 50, 0.75);
      border: 2px solid #00ffcc;
      border-radius: 16px;
      overflow: hidden;
      height: 100%;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.3),
                  inset 0 0 25px rgba(255, 0, 170, 0.15);
      transition: all 0.4s ease;
      backdrop-filter: blur(8px);
    }
    .card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 0 40px rgba(0, 255, 204, 0.6),
                  inset 0 0 40px rgba(255, 0, 170, 0.3);
      border-color: #ff00aa;
    }
    .card h3, .card h5, .card-title {
      color: #f0f0f0 !important;
    }
    .card-body p, .card-text {
      color: #ddd !important;
      line-height: 1.7;
    }

    /* Scrollable lists */
    #upcoming-list, #past-list {
      max-height: 620px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #00ffcc #112233;
    }
    #upcoming-list::-webkit-scrollbar, #past-list::-webkit-scrollbar {
      width: 8px;
    }
    #upcoming-list::-webkit-scrollbar-thumb, #past-list::-webkit-scrollbar-thumb {
      background: #00ffcc;
      border-radius: 10px;
    }
  </style>

    const currentDate = new Date('2025-10-07');

    function generateUpcomingCard(event) {
      return `
        <div class="card mb-4">
          <a href="${event.imageLink}" target="_blank">
            <img src="${event.imageSrc}" alt="${event.eventName}" class="card-img-top" style="height:400px; object-fit:cover;">
          </a>
          <div class="card-body">
            <div class="event-date">${event.date} | ${event.time}</div>
            <div class="event-venue">${event.eventName}</div>
            <div class="event-venue">${event.venue}</div>
            <div class="event-city">${event.city}</div>
            <div class="event-description">${event.description}</div>
            <a href="${event.tickets}" class="btn btn-gold" target="_blank">Get Tickets</a>
          </div>
        </div>
      `;
    }

    function generatePastCard(event) {
      return `
        <div class="col-md-4 mb-4">
          <div class="card">
            <a href="${event.imageLink}" target="_blank">
              <img src="${event.imageSrc}" alt="${event.eventName}" class="card-img-top" style="height:150px; object-fit:cover;">
            </a>
            <div class="card-body">
              <h5 class="card-title">${event.eventName}</h5>
              <p class="card-date">${event.date}</p>
              <p class="card-text">${event.venue}, ${event.city}</p>
              <p class="card-text small">${event.description.substring(0, 100)}...</p>
            </div>
          </div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const sortedEvents = eventsData.sort((a, b) => new Date(b.date) - new Date(a.date));

      const upcomingEvents = sortedEvents.filter(e => new Date(e.date) > currentDate && e.isUpcoming);
      const pastEvents = sortedEvents.filter(e => new Date(e.date) <= currentDate);

      const upcomingContainer = document.getElementById('upcoming-list');
      upcomingEvents.forEach(event => upcomingContainer.innerHTML += generateUpcomingCard(event));

      const pastContainer = document.getElementById('past-list');
      pastEvents.forEach(event => pastContainer.innerHTML += generatePastCard(event));

      // Transition video plays ONLY ONCE per session
      const video = document.getElementById('intro-video');
      const content = document.getElementById('main-content');

      if (!sessionStorage.getItem('eventsIntroPlayed')) {
        video.src = '/video/events-video-transition.mp4';
        video.style.display = 'block';
        video.play();

        video.onended = () => {
          sessionStorage.setItem('eventsIntroPlayed', 'true');
          video.style.transition = 'opacity 1.2s ease';
          video.style.opacity = '0';
          setTimeout(() => {
            video.style.display = 'none';
            content.classList.add('show');
          }, 1200);
        };
      } else {
        // Skip video on repeat visits in same session
        content.classList.add('show');
      }
    });
