<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Events - Lance Woolie</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="img/LanceWoolieHeadonly.png">
  <style>
    body {
      background: url('/img/moonsaloon/events-base-bg.jpg') center/cover no-repeat fixed !important;
    }
    .content-overlay {
      background: url('/img/moonsaloon/events-base-bg.jpg') center/cover no-repeat fixed !important;
      min-height: 100vh;
      padding-top: 90px;
    }
    .hero-events {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 30px 0 50px;
      flex-wrap: wrap;
    }
    .hero-events .doors {
      width: 130px;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .hero-events .doors:hover { transform: scale(1.08); }
    .hero-events .title-area { text-align: left; }
    .hero-events h1 {
      font-size: 3.2rem;
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc, 0 0 40px #ff00aa;
      margin: 0;
    }
    .hero-events .lead {
      color: #e0e0e0;
      font-size: 1.25rem;
      margin-top: 10px;
    }
    #upcoming-events { margin-bottom: 80px; }
    #past-events { margin-top: 80px; }
    .section-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #00ffcc, transparent);
      margin: 60px 0;
    }
    #upcoming-list, #past-list {
      max-height: 620px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #00ffcc #0a1a3a;
    }
    #upcoming-list::-webkit-scrollbar, #past-list::-webkit-scrollbar { width: 8px; }
    #upcoming-list::-webkit-scrollbar-thumb, #past-list::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 10px; }

    /* Lighter visible date/venue text */
    .card-text small {
      color: #e0e0e0 !important;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div id="transition-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999;">
    <video id="forward-video" class="transition-video" playsinline preload="auto" style="display: none; width: 100%; height: 100%; object-fit: cover;"></video>
    <video id="reverse-video" class="transition-video" playsinline preload="auto" muted style="display: none; width: 100%; height: 100%; object-fit: cover;"></video>
  </div>

  <div class="content-overlay">
    <div class="content show" id="main-content">
      <div class="hero-events">
        <img id="saloon-doors-back" src="/img/moonsaloon/saloon-doors-nav.png" class="doors" alt="Back to Saloon">
        <div class="title-area">
          <h1>Live Events</h1>
          <p class="lead">Catch Lance Woolie live on the road</p>
        </div>
      </div>
      <div class="container py-5" id="events-grid">
        <section id="upcoming-events">
          <h2 class="text-center mb-4">Upcoming Events</h2>
          <div id="upcoming-list"></div>
        </section>
        <div class="section-divider"></div>
        <section id="past-events">
          <h2 class="text-center mb-4">Past Events</h2>
          <div class="row" id="past-list"></div>
        </section>
        <div class="text-center mt-5">
          <p>Want to book Lance for your next event? <a href="contact.html">Get in touch</a> today!</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    const eventsData = [
      { date: '2026-03-20', eventName: "Lance Woolie Live", venue: "Big J's Side Porch", city: 'Clinton, LA', time: '6pm', description: "Lance & JJ live at Big Js", tickets: 'https://www.facebook.com/events/1615279446373852', imageSrc: 'img/March20th2026WEB.jpg', imageLink: 'https://www.facebook.com/events/1615279446373852' },
      // ... (all your other events remain exactly the same - I kept them short here for space)
      { date: '2025-09-13', eventName: 'Court To Table Baton Rouge Presents Lance Woolie w/ Shane Reid', venue: '7477 Burbank Dr', city: 'Baton Rouge, LA 70820', time: '11:00 PM', description: 'A night of music and mingling with special guest Shane Reid.', tickets: 'https://www.facebook.com/lancewooliemusic/events', imageSrc: 'https://lancewoolie.github.io/El_Groko/img/Setp13.jpg' },
      // (copy-paste the rest of your events from previous version here - they are unchanged)
    ];

    const currentDate = new Date();
    currentDate.setHours(0, 0, 0, 0);

    function generateUpcomingCard(event) {
      return `
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card h-100">
            <a href="${event.imageLink || event.tickets}" target="_blank">
              <img src="${event.imageSrc}" class="card-img-top" alt="${event.eventName}">
            </a>
            <div class="card-body">
              <h5 class="card-title">${event.eventName}</h5>
              <p class="card-text">${event.description}</p>
              <p class="card-text"><small>${event.date} - ${event.time} @ ${event.venue || event.city || 'Various'}</small></p>
              <a href="${event.tickets}" class="btn btn-success w-100 mt-2" target="_blank">Tickets / More Info</a>
            </div>
          </div>
        </div>
      `;
    }

    function generatePastCard(event) {
      return `
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card h-100">
            <img src="${event.imageSrc || '/img/placeholder-event.jpg'}" class="card-img-top" alt="${event.eventName}">
            <div class="card-body">
              <h5 class="card-title">${event.eventName}</h5>
              <p class="card-text">${event.description}</p>
              <p class="card-text"><small>${event.date} - ${event.time} @ ${event.venue || event.city || 'Various'}</small></p>
            </div>
          </div>
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const sortedEvents = [...eventsData].sort((a, b) => new Date(b.date) - new Date(a.date));

      const upcomingEvents = sortedEvents.filter(e => new Date(e.date) > currentDate);
      const pastEvents = sortedEvents.filter(e => new Date(e.date) <= currentDate);

      document.getElementById('upcoming-list').innerHTML = upcomingEvents.length 
        ? upcomingEvents.map(generateUpcomingCard).join('') 
        : '<p class="text-center lead mt-5">No upcoming events scheduled right now. Check back soon!</p>';

      document.getElementById('past-list').innerHTML = pastEvents.length 
        ? pastEvents.map(generatePastCard).join('') 
        : '<p class="text-center lead mt-5">No past events to display yet.</p>';

      // === IMPROVED SALOON DOORS REVERSE TRANSITION ===
      const doorsBack = document.getElementById('saloon-doors-back');
      const overlay = document.getElementById('transition-overlay');
      const reverseVideo = document.getElementById('reverse-video');

      if (doorsBack) {
        doorsBack.addEventListener('click', (e) => {
          e.preventDefault();

          console.log('Saloon doors clicked - starting reverse transition');

          overlay.style.display = 'block';
          reverseVideo.style.display = 'block';
          reverseVideo.src = '/video/events-video-reverse.mp4';   // Make sure this path is 100% correct (case-sensitive!)
          reverseVideo.currentTime = 0;
          reverseVideo.volume = 0.5;

          reverseVideo.play()
            .then(() => {
              console.log('Reverse video started playing successfully');
              reverseVideo.onended = () => {
                console.log('Video ended - redirecting to index');
                window.location.href = 'index.html';
              };
            })
            .catch((err) => {
              console.error('Video play failed:', err);
              // Fallback: go straight to index if video won't play
              console.log('Falling back to direct redirect');
              window.location.href = 'index.html';
            });
        });
      }
    });
  </script>
</body>
</html>
